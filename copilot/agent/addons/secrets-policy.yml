# Secrets Manager 和 SSM Parameter Store 读取权限
# 用途：允许 ECS ExecutionRole 在容器启动时读取环境变量中的 secrets

Parameters:
  App:
    Type: String
    Description: Your application's name.
  Env:
    Type: String
    Description: The environment name your service, job, or workflow is being deployed to.
  Name:
    Type: String
    Description: Your workload's name.

Resources:
  # IAM Policy for Secrets Access (ExecutionRole)
  SecretsAccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Allow ECS ExecutionRole to read secrets from SSM Parameter Store
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # SSM Parameter Store 权限（Copilot 使用 SSM 存储 secrets）
          - Sid: SSMParameterAccess
            Effect: Allow
            Action:
              - ssm:GetParameters
              - ssm:GetParameter
            Resource:
              - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/copilot/${App}/${Env}/secrets/*'
          
          # KMS 解密权限（如果 secrets 使用 KMS 加密）
          - Sid: KMSDecryptAccess
            Effect: Allow
            Action:
              - kms:Decrypt
            Resource: '*'
            Condition:
              StringEquals:
                'kms:ViaService': 
                  - !Sub 'ssm.${AWS::Region}.amazonaws.com'

Outputs:
  # 关键：使用 *ExecutionRolePolicy 后缀，Copilot 会自动附加到 ExecutionRole
  SecretsAccessExecutionRolePolicy:
    Description: ARN of the Secrets access policy for ExecutionRole
    Value: !Ref SecretsAccessPolicy
