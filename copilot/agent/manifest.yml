# ============================================================
# Zenflux Agent Service - Copilot Manifest
# 部署到 zen0-backend 应用的 staging 环境
# 单容器部署：Nginx + FastAPI + Vue Frontend + gRPC
# ============================================================

name: agent
type: Load Balanced Web Service

# ============================================================
# 镜像配置
# ============================================================
image:
  location: 308470327605.dkr.ecr.ap-southeast-1.amazonaws.com/zen0-backend/agent:latest
  port: 80  # Nginx 监听端口

# ============================================================
# HTTP/HTTPS 配置 (ALB)
# ============================================================
http:
  path: '/'
  healthcheck:
    path: '/health'
    success_codes: '200'
    healthy_threshold: 2
    unhealthy_threshold: 3
    interval: 30s
    timeout: 10s
    grace_period: 120s  # 启动宽限期（2分钟）
  deregistration_delay: 30s

# ============================================================
# gRPC 配置 (NLB with TLS)
# 通过 Network Load Balancer 暴露 gRPC 端口，使用 TLS 加密
# NLB 在 50051 端口终止 TLS，转发明文到容器 50051 端口
# 客户端连接: grpcs://agent.malue.ai:50051
# ============================================================
nlb:
  port: 50051/tls
  target_port: 50051
  alias: agent.malue.ai
  ssl_policy: ELBSecurityPolicy-TLS13-1-2-2021-06
  healthcheck:
    port: 80
    healthy_threshold: 2
    unhealthy_threshold: 2
    interval: 10s

# ============================================================
# 资源配置（默认/Staging）
# ============================================================
cpu: 256       # 0.25 vCPU
memory: 512    # 512 MB (Fargate 最小值)
platform: linux/x86_64

# ============================================================
# 副本和扩展配置
# ============================================================
count:
  range: 1-3
  cooldown:
    in: 60s
    out: 300s
  cpu_percentage: 70
  memory_percentage: 80

# ============================================================
# 执行和调试
# ============================================================
exec: true

# ============================================================
# 网络配置
# ============================================================
network:
  connect: true
  vpc:
    placement: private

# ============================================================
# 存储配置
# ============================================================
storage:
  ephemeral: 20  # 20 GiB 临时存储

# ============================================================
# 日志配置
# ============================================================
logging:
  retention: 30

# ============================================================
# 环境变量（默认值）
# ============================================================
variables:
  LOG_LEVEL: INFO
  MAX_TOKENS: 8192
  TEMPERATURE: "0.7"
  AWS_DEFAULT_REGION: ap-southeast-1
  AWS_S3_BUCKET: dify-storage-zenflux
  ALLOWED_ORIGINS: "*"
  # gRPC 配置
  ENABLE_GRPC: "true"
  GRPC_HOST: "0.0.0.0"
  GRPC_PORT: "50051"
  GRPC_MAX_WORKERS: "10"

# ============================================================
# 环境特定覆盖
# ============================================================
environments:
  staging:
    cpu: 512
    memory: 1024
    
    count:
      range: 1-3
      cooldown:
        in: 60s
        out: 300s
      cpu_percentage: 70
      memory_percentage: 80
    
    http:
      path: '/'
      healthcheck:
        path: /health
        healthy_threshold: 2
        unhealthy_threshold: 3
        interval: 30s
        timeout: 10s
      alias: agent.malue.ai
      hosted_zone: Z09256181GREC1AN4SOOS  # malue.ai 的托管区域 ID
    
    variables:
      LOG_LEVEL: DEBUG
      REDIS_HOST: zen0-backend-staging-redis.w9tdej.0001.apse1.cache.amazonaws.com
      REDIS_PORT: "6379"
      GRPC_HOST: "0.0.0.0"
      GRPC_PORT: "50051"
      ENABLE_GRPC: "true"
    
    # 从 SSM Parameter Store 获取敏感配置
    secrets:
      ANTHROPIC_API_KEY: /copilot/zen0-backend/staging/secrets/ANTHROPIC_API_KEY
      E2B_API_KEY: /copilot/zen0-backend/staging/secrets/E2B_API_KEY
      RAGIE_API_KEY: /copilot/zen0-backend/staging/secrets/RAGIE_API_KEY
      AWS_ACCESS_KEY_ID: /copilot/zen0-backend/staging/secrets/AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: /copilot/zen0-backend/staging/secrets/AWS_SECRET_ACCESS_KEY
      TAVILY_API_KEY: /copilot/zen0-backend/staging/secrets/TAVILY_API_KEY
      EXA_API_KEY: /copilot/zen0-backend/staging/secrets/EXA_API_KEY
      SLIDESPEAK_API_KEY: /copilot/zen0-backend/staging/secrets/SLIDESPEAK_API_KEY
