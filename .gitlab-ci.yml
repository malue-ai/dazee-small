# GitLab CI/CD Pipeline for zenflux-agent
# Purpose: Automated linting, building, and deployment to AWS
#
# GitLab Flow Strategy:
#   - feature/* / hotfix/* → lint only
#   - main → no pipeline (protected branch, merge only)
#   - staging → build + deploy to AWS Staging + verify
#   - production → build + deploy to AWS Production + verify (MR 时需 lint 通过)
#
# Prerequisites:
#   - GitLab Runner with Docker executor
#   - AWS credentials configured in CI/CD Variables
#   - ECR repository created
#   - WECHAT_WEBHOOK_URL / FEISHU_WEBHOOK_URL for notifications (optional)

# ============================================================
# Disable GitLab Auto DevOps and Security Scanning
# ============================================================
include: []

# ============================================================
# Workflow: 自动取消冗余流水线
# ============================================================
workflow:
  auto_cancel:
    on_new_commit: interruptible

# ============================================================
# Global Configuration
# ============================================================

stages:
  - test
  - build
  - deploy
  - verify
  - notify

variables:
  # Disable Auto DevOps and Security Scanning
  AUTO_DEVOPS_ENABLED: "false"
  SAST_DISABLED: "true"
  SECRET_DETECTION_DISABLED: "true"
  CONTAINER_SCANNING_DISABLED: "true"
  DEPENDENCY_SCANNING_DISABLED: "true"
  LICENSE_SCANNING_DISABLED: "true"
  DAST_DISABLED: "true"
  CODE_QUALITY_DISABLED: "true"
  
  # Git optimization
  GIT_DEPTH: "20"
  GIT_STRATEGY: fetch
  GIT_SUBMODULE_STRATEGY: none
  
  # Python configuration
  PIP_CACHE_DIR: "${CI_PROJECT_DIR}/.cache/pip"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  
  # Docker configuration
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  
  # AWS configuration
  AWS_DEFAULT_REGION: ap-southeast-1
  AWS_ACCOUNT_ID: ${AWS_ACCOUNT_ID}
  ECR_REGISTRY: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com
  ECR_REPOSITORY: zen0-backend/agent
  
  # Application configuration
  APP_NAME: zen0-backend
  SERVICE_NAME: agent

# Default settings for all jobs
default:
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ============================================================
# Templates
# ============================================================

# Python environment template
.python_template: &python_template
  image: docker.1ms.run/library/python:3.12-slim
  before_script:
    - pip install --no-cache-dir ruff

# Docker build environment template
.docker_template: &docker_template
  image: docker.1ms.run/library/docker:latest
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - docker info

# AWS CLI template
.aws_template: &aws_template
  image:
    name: docker.1ms.run/amazon/aws-cli:latest
    entrypoint: [""]
  variables:
    ALL_PROXY: "socks5://172.17.0.1:40000"
    HTTPS_PROXY: "socks5://172.17.0.1:40000"
  before_script:
    - yum install -y jq > /dev/null 2>&1 || true
    - aws --version
    - aws sts get-caller-identity

# Notification template
.notify_template: &notify_template
  image: docker.1ms.run/library/alpine:latest
  before_script:
    - apk add --no-cache curl jq

# ============================================================
# Test Stage
# ============================================================

# Lint job - Python code quality check with ruff
lint:
  <<: *python_template
  stage: test
  script:
    - ruff --version
    - echo "Running ruff lint check..."
    - ruff check . --output-format=gitlab
  rules:
    # 只在合并到 production 分支的 MR 时运行
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "production"
    - if: $CI_COMMIT_BRANCH =~ /^(feature|hotfix)\//

# ============================================================
# Build Stage
# ============================================================

# Build and Push Docker image - only on staging/production branches
# 直接推送到 ECR，避免 artifact 大小限制
build:
  <<: *docker_template
  stage: build
  variables:
    IMAGE_TAG: ${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}
    DOCKER_BUILDKIT: "1"
    BUILDKIT_PROGRESS: "plain"
  script:
    - echo "Building image with tag ${IMAGE_TAG}"
    # 安装 AWS CLI 并登录 ECR
    - apk add --no-cache aws-cli > /dev/null 2>&1 || true
    - |
      if [ -n "${AWS_ACCESS_KEY_ID}" ]; then
        aws ecr get-login-password --region ${AWS_DEFAULT_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
      fi
    # 使用 BuildKit 构建
    - |
      CACHE_ARGS=""
      if [ -n "${ECR_REGISTRY}" ]; then
        CACHE_ARGS="--cache-from type=registry,ref=${ECR_REGISTRY}/${ECR_REPOSITORY}:cache"
      fi
      docker build \
        ${CACHE_ARGS} \
        --build-arg REGISTRY=docker.1ms.run/library \
        --build-arg USE_CHINA_MIRROR=true \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        -t ${SERVICE_NAME}:${IMAGE_TAG} \
        -f Dockerfile.production \
        .
    - docker tag ${SERVICE_NAME}:${IMAGE_TAG} ${SERVICE_NAME}:latest
    # 直接推送到 ECR
    - echo "Pushing image to ECR..."
    - docker tag ${SERVICE_NAME}:${IMAGE_TAG} ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
    - docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
    - echo "Image pushed successfully - ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
    - if: $CI_COMMIT_BRANCH == "production"
  needs: []

# ============================================================
# Deploy Stage
# ============================================================

# Deploy to AWS Staging
deploy_staging:
  <<: *aws_template
  stage: deploy
  variables:
    IMAGE_TAG: ${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}
    ENV_NAME: staging
  script:
    - |
      # Get current task definition for potential rollback
      echo "Fetching current deployment info for rollback..."
      
      # 动态查找 ECS 集群（Copilot 创建的集群名称包含随机后缀）
      CLUSTER_PREFIX="${APP_NAME}-${ENV_NAME}-Cluster"
      CLUSTER_NAME=$(aws ecs list-clusters --query 'clusterArns[*]' --output text | tr '\t' '\n' | grep "$CLUSTER_PREFIX" | head -1 | awk -F/ '{print $NF}')
      
      if [ -z "$CLUSTER_NAME" ]; then
        echo "Warning: Could not find ECS cluster, skipping rollback info"
        PREVIOUS_TAG=""
      else
        # 动态查找服务（Copilot 服务名称格式: ${APP_NAME}-${ENV_NAME}-${SERVICE_NAME}-Service-xxx）
        SVC_NAME=$(aws ecs list-services --cluster "$CLUSTER_NAME" --query 'serviceArns[*]' --output text | tr '\t' '\n' | grep "${SERVICE_NAME}" | head -1 | awk -F/ '{print $NF}')
        
        if [ -z "$SVC_NAME" ]; then
          echo "Warning: Could not find service, skipping rollback info"
          PREVIOUS_TAG=""
        else
          CURRENT_IMAGE=$(aws ecs describe-services \
            --cluster "$CLUSTER_NAME" \
            --services "$SVC_NAME" \
            --query 'services[0].taskDefinition' \
            --output text 2>/dev/null | xargs -I {} aws ecs describe-task-definition \
            --task-definition {} \
            --query 'taskDefinition.containerDefinitions[0].image' \
            --output text 2>/dev/null || echo "")
          
          if [ -n "$CURRENT_IMAGE" ]; then
            PREVIOUS_TAG=$(echo "$CURRENT_IMAGE" | awk -F: '{print $NF}')
          else
            PREVIOUS_TAG=""
          fi
        fi
      fi
      
      echo "Previous tag: ${PREVIOUS_TAG:-none}"
      echo "PREVIOUS_TAG=$PREVIOUS_TAG" >> deploy.env
    - echo "Deploying to AWS Staging..."
    - echo "Image - ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
    # 动态修改 manifest 中的镜像标签
    - |
      echo "Updating manifest with image tag: ${IMAGE_TAG}"
      sed -i "s|location: ${ECR_REGISTRY}/${ECR_REPOSITORY}.*|location: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}|" copilot/${SERVICE_NAME}/manifest.yml
      echo "Updated image.location:"
      grep "location:" copilot/${SERVICE_NAME}/manifest.yml | head -1
    - cp /opt/copilot/copilot /usr/local/bin/copilot
    - chmod +x /usr/local/bin/copilot
    - copilot --version
    - |
      if ! copilot svc deploy --name ${SERVICE_NAME} --env ${ENV_NAME}; then
        echo "Deployment failed!"
        if [ -n "$PREVIOUS_TAG" ] && [ "$PREVIOUS_TAG" != "none" ]; then
          echo "Attempting rollback to previous version: $PREVIOUS_TAG"
          sed -i "s|location: ${ECR_REGISTRY}/${ECR_REPOSITORY}.*|location: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${PREVIOUS_TAG}|" copilot/${SERVICE_NAME}/manifest.yml
          copilot svc deploy --name ${SERVICE_NAME} --env ${ENV_NAME} || true
        fi
        exit 1
      fi
    - echo "Staging deployment completed!"
  artifacts:
    reports:
      dotenv: deploy.env
    expire_in: 1 day
  environment:
    name: staging
    url: https://agent.malue.ai
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
  needs:
    - build

# Deploy to AWS Production
