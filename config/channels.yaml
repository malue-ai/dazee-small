# ==================== 渠道集成配置 ====================
#
# 配置各消息渠道（飞书、钉钉、Slack、Telegram 等）
#
# 支持的渠道：
# - feishu: 飞书
# - dingtalk: 钉钉（待实现）
# - slack: Slack（待实现）
# - telegram: Telegram（待实现）
#
# 权限策略：
# - open: 允许所有人
# - pairing: 需要配对验证
# - allowlist: 白名单模式
# - disabled: 禁用
# ============================================================

channels:
  # ==================== 飞书配置 ====================
  feishu:
    enabled: true
    
    accounts:
      # 默认账户
      default:
        # 应用凭证（从环境变量读取）
        app_id: "${FEISHU_APP_ID}"
        app_secret: "${FEISHU_APP_SECRET}"
        verification_token: "${FEISHU_VERIFICATION_TOKEN}"
        encrypt_key: "${FEISHU_ENCRYPT_KEY}"  # 可选，用于消息加密
        
        # 私聊策略
        dm_policy: "open"  # open | pairing | disabled
        allow_from: []     # 私聊白名单（open_id 列表）
        
        # 群聊策略
        group_policy: "open"       # open | allowlist | disabled
        group_allow_from: []       # 群聊白名单（群 ID 列表）
        require_mention: true      # 群聊需要 @机器人
        
        # 群组特定配置
        groups:
          # 示例：特定群组配置
          # "oc_xxxxx":
          #   enabled: true
          #   require_mention: false
          #   allow_from: ["*"]  # 允许所有人
        
        # 高级配置
        history_limit: 20          # 历史消息数限制
        media_max_mb: 20           # 媒体大小限制（MB）
        stream_mode: "edit"        # 流式模式：off | edit
  
  # ==================== 钉钉配置（待实现）====================
