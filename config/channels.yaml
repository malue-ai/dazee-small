# ==================== 全局配置 ====================
global:
  # 默认 Agent ID（不指定时使用）
  default_agent_id: null
  
  # 消息预处理
  preprocessor:
    debounce_ms: 500           # 防抖延迟
    max_messages: 10           # 最大合并消息数
    max_wait_ms: 3000          # 最大等待时间
  
  # 安全配置
  security:
    pairing_timeout_hours: 24  # 配对验证有效期
