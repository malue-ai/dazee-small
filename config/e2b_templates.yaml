# ============================================================
# E2B Code Interpreter 配置
# ============================================================
# 
# 本项目使用 E2B 官方 Code Interpreter 模板，该模板已预装：
# - Jupyter 内核（支持代码执行间的上下文共享）
# - 数据科学包：pandas、numpy、matplotlib、seaborn、plotly 等
# - 网络库：requests、httpx、beautifulsoup4 等
# - 其他常用包：Pillow、openpyxl、scipy、scikit-learn 等
#
# 参考文档: https://e2b.dev/docs/code-interpreting
# ============================================================

# ============================================================
# 沙盒生命周期配置
# ============================================================
sandbox:
  # 沙盒超时时间（秒）
  # 超时后沙盒会自动停止，但可以通过 pause/resume 机制恢复
  # 最大值：Pro 用户 86400（24小时），Hobby 用户 3600（1小时）
  timeout_seconds: 1800  # 30 分钟

  # 沙盒池配置（内存中缓存活跃沙盒）
  pool:
    enabled: true
    max_size: 100  # 最多缓存 100 个沙盒
    idle_timeout_minutes: 30  # 闲置 30 分钟后回收

# ============================================================
# 包管理策略
# ============================================================
package_management:
  # 自动检测策略：从代码中自动检测 import 语句并安装缺失的包
  auto_detect:
    enabled: true
    
  # 包安装超时（秒）
  install_timeout: 120
  
  # 常见包映射（import 名 → pip 包名）
  # Code Interpreter 模板已预装大部分常用包，这里仅作为备用映射
  package_mapping:
    cv2: opencv-python
    PIL: Pillow
    sklearn: scikit-learn
    bs4: beautifulsoup4

# ============================================================
# 文件系统配置
# ============================================================
filesystem:
  # 沙箱目录结构
  sandbox_dirs:
    home: "/home/user"
    input: "/home/user/input_data"
    output: "/home/user/output_data"
    temp: "/home/user/temp"
  
  # 文件大小限制
  max_file_size_mb: 100
  max_total_size_mb: 500

# ============================================================
# 项目运行配置（前端项目预览）
# ============================================================
# Code Interpreter 也支持运行前端项目（React/Vue/Next.js 等）
# 以下是各技术栈的默认端口配置
stack_ports:
  python: 8000
  flask: 5000
  fastapi: 8000
  streamlit: 8501
  gradio: 7860
  nodejs: 3000
  react: 5173
  vue: 5173
  nextjs: 3000

# ============================================================
# 监控和日志
# ============================================================
monitoring:
  # 性能指标
  metrics:
    track_execution_time: true
    track_resource_usage: true
  
  # 日志级别
  log_level: "INFO"
  
  # 保存执行历史
  save_history:
    enabled: true
    max_entries: 100

