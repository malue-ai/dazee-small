# ==================== 统一工具注册配置 ====================
#
# 📌 小搭子：桌面端 AI 搭子
#   - 核心工具始终启用，动态工具按需加载
#   - 所有外部 API 能力通过 Skills + api_calling 实现
#
# 使用方式：
#   from config.tool_registry import get_core_tools, get_frequent_tools
#

# ==================== 核心工具（Level 1）====================
# 始终启用，不暴露给用户配置
core_tools:
  - plan_todo        # 任务规划
  - api_calling      # API 调用（Skills 的执行层）
  - hitl             # 人机确认
  - clue_generation  # 线索生成
  - scheduled_task   # 定时任务/提醒

# ==================== 常用工具（不延迟加载）====================
frequent_tools:
  - plan_todo

# ==================== 工具类别（简写展开）====================
# 用户配置一个类别，自动展开为多个工具
tool_categories:
  # 文档生成类（Anthropic Pre-built Skills）
  document_skills:
    - pptx
    - xlsx
    - docx
    - pdf
