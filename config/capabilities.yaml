    - 演示
    - 高质量
    - 闭环
    - 报告
    - presentation
  input_schema:
    type: object
    properties:
      topic:
        type: string
        description: PPT主题/标题（必需）
      description:
        type: string
        description: 详细需求描述，包括受众、目的、重点内容等
      search_queries:
        type: array
