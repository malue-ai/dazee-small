  priority: 90
  cost:
    time: fast
    money: low
  constraints:
    requires_api: false
  metadata:
    description: |
      定时任务管理工具，支持创建、查看、取消定时任务。
      
      **支持的触发类型**：
      - once: 单次执行（指定具体时间）
      - cron: Cron 表达式（如 "0 9 * * *" 表示每天 9 点）
      - interval: 固定间隔（如每 3600 秒）
      
      **支持的动作类型**：
      - send_message: 发送提醒消息
      - agent_task: 让 AI 执行任务
      
      **使用示例**：
      - "每天早上 9 点提醒我开会" → trigger_type=cron, cron="0 9 * * *"
      - "明天下午 3 点提醒我打电话" → trigger_type=once
      - "每隔 2 小时提醒我喝水" → trigger_type=interval, interval_seconds=7200
    preferred_for:
    - 设置提醒
    - 定时任务
    - 周期性任务
    - 自动化执行
  input_schema:
    type: object
    properties:
      operation:
        type: string
        enum:
        - create
        - list
        - cancel
        - update
        description: 操作类型
      task_id:
        type: string
        description: 任务 ID（更新/取消时必填）
      title:
        type: string
        description: 任务标题
      trigger_type:
        type: string
        enum:
        - once
        - cron
        - interval
        description: 触发类型
      trigger_config:
        type: object
        description: 触发配置
        properties:
          run_at:
            type: string
            description: 执行时间（ISO 格式），trigger_type=once 时使用
          cron:
            type: string
            description: Cron 表达式，trigger_type=cron 时使用
          interval_seconds:
            type: integer
            description: 间隔秒数，trigger_type=interval 时使用
      action:
        type: object
        description: 执行动作配置
        properties:
          type:
            type: string
            enum:
            - send_message
            - agent_task
            description: 动作类型
          content:
            type: string
            description: 提醒内容（send_message 时使用）
          prompt:
            type: string
            description: 任务描述（agent_task 时使用）
    required:
    - operation
