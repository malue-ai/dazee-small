# ==================== 工具分类配置 ====================
#
# 📌 仅包含实际存在的工具模块（tools/ 目录下）
#
tool_classification:
  # 常用工具（不延迟加载）
  frequent_tools:
    - plan

  # 需要注入运行时上下文的工具（如 session_id, user_id 等）
  context_injection_tools:
    - api_calling

  # 必须串行执行的工具（写入共享状态，不能并行）
  serial_only_tools:
    - plan
    - hitl
    - pipeline

  # 简单任务的精简工具集（complexity=simple 时使用，省 token）
  simple_task_tools:
    - nodes
    - api_calling
    - knowledge_search
    - hitl
    - memory_recall

  # 工具类别（简写展开）
  categories:
    # 文档生成能力由 xiaodazi Skills 提供，不使用 Pre-built Skills

# ==================== 能力类别定义 ====================
#
# 📌 小搭子能力分类（精简版）
#   - business: 面向用户的业务能力
#   - internal: 框架内部能力
#
capability_categories:

# ========== 业务能力类别 ==========

- id: ppt_generation
  category_type: business
  description: PPT/演示文稿生成
  use_when: 需要创建 PPT、Slides
  examples:
    - 制作产品 PPT
    - 生成培训材料

- id: document_creation
  category_type: business
  description: 文档生成（Word/PDF/报告）
  use_when: 需要创建文字文档、报告
  examples:
    - 写一份报告
    - 生成 PDF 文档

- id: image_generation
  category_type: business
  description: 图片生成
  use_when: 需要 AI 生成图片、插图
  examples:
    - 生成配图
    - 设计 logo

- id: data_analysis
  category_type: business
  description: 数据分析/统计
  use_when: 需要处理 Excel、分析数据
  examples:
    - 分析表格数据
    - 生成统计报表

- id: audio_processing
  category_type: business
  description: 音频处理（TTS/STT/音频理解）
  use_when: 需要语音合成、语音识别、音频分析
  examples:
    - 把这段话转成语音
    - 帮我听一下这个音频说了什么
    - 分析这段录音

# ========== 框架内部类别 ==========

- id: knowledge_base
  category_type: internal
  description: 知识检索（FTS5 + 语义混合搜索）
  use_when: 需要查找用户本地文档、知识库检索
  examples:
    - 查找我的文档
    - 搜索本地资料

- id: task_planning
  category_type: internal
  description: 任务规划
  internal: true
  use_when: 复杂任务的步骤拆解和进度跟踪

- id: file_operations
  category_type: internal
  description: 文件读写操作
  internal: true
  use_when: 需要读取或保存文件
  examples:
    - 文件管理
    - 整理文件夹

- id: system_control
  category_type: internal
  description: 系统操作（命令执行、通知）
  internal: true
  use_when: 需要执行系统命令或发送通知

- id: screen_observation
  category_type: internal
  description: 屏幕观察
  internal: true
  use_when: 需要查看屏幕内容

- id: task_scheduling
  category_type: internal
  description: 定时任务/提醒
  internal: true
  use_when: 设置提醒或定时任务

- id: api_calling
  category_type: internal
  description: API 调用（框架内部通用实现）
  internal: true

# ==================== 能力定义 ====================
#
# 📌 分层说明：
#   level 1: 核心工具，始终启用
#   level 2: 动态工具，按需加载
#
# invocation_hint:
#   SKILL_CONTAINER: Anthropic Pre-built Skills
#   DIRECT: 标准 tool_use 调用
#

capabilities:

# Anthropic Pre-built Skills（pptx/xlsx/docx/pdf）已移除，效果差。
# PPT/Excel/Word/PDF 能力全部由 xiaodazi Skills 提供。

# ========== 核心工具（Level 1，始终加载）==========

- name: api_calling
  type: TOOL
  subtype: CUSTOM
  provider: user
  level: 1
  state_category: executing
  implementation:
    module: tools.api_calling
    class: APICallingTool
  capabilities:
    - api_calling
  priority: 75
  cost:
    time: variable
    money: variable
  constraints:
    requires_api: false
    requires_network: true
  metadata:
    description: |
      通用 HTTP API 调用工具，配合 Skills 文档使用。
      LLM 从 Skill 文档中了解 API 用法，用本工具发起实际请求。
  input_schema:
    type: object
    properties:
      api_name:
        type: string
        description: 预配置的 API 名称，自动注入 base_url 和认证
      path:
        type: string
        description: API 路径（与 api_name 配合使用）
      url:
        type: string
        description: 完整的 API URL（与 api_name 二选一）
      method:
        type: string
        enum: [GET, POST, PUT, DELETE, PATCH]
        description: HTTP 方法（默认 POST）
      headers:
        type: object
        description: 额外的请求头
      body:
        type: object
        description: 请求体（将自动转为 JSON）
      mode:
        type: string
        enum: [sync, stream, async_poll]
        description: 请求模式 - sync(同步,默认)、stream(SSE流式)、async_poll(异步轮询)
      poll_config:
        type: object
        description: 轮询配置（仅 mode=async_poll 时有效）
    required: []

- name: knowledge_search
  type: TOOL
  subtype: NATIVE
  provider: user
  level: 1
  state_category: searching
  implementation:
    module: tools.knowledge_search
    class: KnowledgeSearchTool
  capabilities:
    - knowledge_base
  priority: 60
  cost:
    time: fast
    money: free
  constraints:
    requires_api: false
    requires_network: false
  metadata:
    description: |
      从用户本地知识库检索信息（FTS5 全文 + 可选向量语义搜索）。
      适用于用户提到"我的文档"、"我上传的资料"、个人知识回忆场景。
    cache_stable: true
  input_schema:
    type: object
    properties:
      query:
        type: string
        description: 搜索查询（自然语言）
      limit:
        type: integer
        description: 返回结果数量（默认 5）
        default: 5
      file_type:
        type: string
        description: 过滤文件类型（如 .md, .txt, .pdf）
    required: [query]

- name: memory_recall
  type: TOOL
  subtype: NATIVE
  provider: user
  level: 1
  state_category: searching
  implementation:
    module: tools.memory_recall
    class: MemoryRecallTool
  capabilities:
    - memory
    - user_profile
  priority: 70
  cost:
    time: fast
    money: free
  constraints:
    requires_api: false
    requires_network: false
  metadata:
    description: |
      检索用户长期记忆（偏好、习惯、历史经验等）。
      支持语义搜索和完整记忆档案读取。
      当用户询问"你记住了什么"、"我的偏好"时使用。
    cache_stable: false
  input_schema:
    type: object
    properties:
      query:
        type: string
        description: 搜索查询（自然语言）
      mode:
        type: string
        enum: [search, full]
        description: "search: 语义搜索；full: 读取完整记忆档案"
        default: search
      limit:
        type: integer
        description: 搜索模式下返回结果数量（默认 10）
        default: 10
    required: [query]

- name: hitl
  type: TOOL
  subtype: CUSTOM
  provider: user
  level: 1
  state_category: executing
  implementation:
    module: tools.request_human_confirmation
    class: HITLTool
  capabilities:
    - human_interaction
    - confirmation
  priority: 100
  cost:
    time: variable
    money: free
  constraints:
    requires_api: false
    requires_user_interaction: true
  metadata:
    description: |
      请求用户确认操作。适用于：
      - 删除文件或数据等危险操作
      - 修改重要配置
      - 执行不可逆操作
      - 需要用户选择方案
  input_schema:
    type: object
    properties:
      type:
        type: string
        enum: [form]
        description: HITL 交互类型
        default: form
      title:
        type: string
        description: 表单标题
      description:
        type: string
        description: 表单描述
      questions:
        type: array
        description: 问题数组（single_choice / multiple_choice）
        items:
          type: object
          properties:
            id:
              type: string
              description: 问题唯一标识
            label:
              type: string
              description: 问题标签
            type:
              type: string
              enum: [single_choice, multiple_choice]
            options:
              type: array
              items:
                type: string
              description: 选项列表
            default:
              type: string
            required:
              type: boolean
              default: true
          required: [id, label, type]
      timeout:
        type: integer
        description: 超时时间（秒）
        default: 120
    required: [title, questions]

- name: configure_instance
  type: TOOL
  subtype: CUSTOM
  provider: user
  level: 2
  implementation:
    module: tools.configure_instance
    class: ConfigureInstanceTool
  capabilities:
    - human_interaction
    - configuration
  constraints:
    requires_api: false
  metadata:
    description: |
      将实例级配置持久化到用户本地 SQLite（按实例隔离，按品类分类）。
      支持四种品类：
        credential — 服务/工具 API Key（切换实例时自动注入 os.environ）
        package    — 已安装包记录（pip install 成功后记录）
        permission — OS 权限授权状态（用户确认后记录）
        setting    — 工具/Skill 配置项
      典型场景：
        用户提供 API Key → configure_instance(category='credential', key='UNSTRUCTURED_API_KEY', value='xxx')
        pip install 成功 → configure_instance(category='package', key='pdfplumber', value='0.11.4')
        用户授权辅助功能 → configure_instance(category='permission', key='accessibility', value='granted')
  input_schema:
    type: object
    properties:
      category:
        type: string
        enum: [credential, package, permission, setting]
        description: |
          配置品类：
          - credential: 服务 API Key（如 UNSTRUCTURED_API_KEY、TAVILY_API_KEY）
          - package: 已安装的包（如 pdfplumber 0.11.4）
          - permission: OS 权限（如 accessibility granted）
          - setting: 工具/Skill 配置项
      key:
        type: string
        description: 配置键名（环境变量名 / 包名 / 权限名 / 设置项名）
      value:
        type: string
        description: 配置值（API Key / 版本号 / granted|denied / 配置值）
      skill_name:
        type: string
        description: 关联的 Skill 名称（可选，用于追溯）
    required: [category, key, value]

- name: plan
  type: TOOL
  subtype: SESSION
  provider: user
  invocation_hint: DIRECT
  level: 1
  state_category: planning
  cache_stable: true
  implementation:
    module: tools.plan_todo_tool
    class: PlanTool
  capabilities:
    - task_planning
    - progress_tracking
  priority: 95
  cost:
    time: fast
    money: free
  constraints:
    requires_api: false
    session_scoped: true
  metadata:
    description: |
      任务计划管理工具。

      数据结构：
      - 顶层：name, overview, plan, todos
      - todo：id, title, content, status, result

      action：
      - create: 创建新计划
      - update: 更新步骤状态
      - rewrite: 重写整个计划
  input_schema:
    type: object
    properties:
      action:
        type: string
        enum: [create, update, rewrite]
      name:
        type: string
        description: 计划名称（create/rewrite 时必需）
      overview:
        type: string
        description: 一句话目标摘要
      plan:
        type: string
        description: 详细计划文档
      todos:
        type: array
        description: 步骤列表（create/rewrite 时必需）
        items:
          type: object
          properties:
            id:
              type: string
            title:
              type: string
            content:
              type: string
            status:
              type: string
              default: pending
              enum: [pending, in_progress, completed, failed]
          required: [title]
      todo_id:
        type: string
        description: 步骤 ID（update 时必需）
      status:
        type: string
        enum: [pending, in_progress, completed, failed]
      result:
        type: string
    required: [action]

- name: nodes
  type: TOOL
  subtype: CUSTOM
  provider: user
  invocation_hint: DIRECT
  level: 1
  state_category: executing
  cache_stable: true
  implementation:
    module: tools.nodes_tool
    class: NodesTool
  capabilities:
    - system_control
    - command_execution
    - notification
  priority: 80
  cost:
    time: fast
    money: free
  constraints:
    requires_api: false
  metadata:
    description: |
      发现和操作本地/远程节点。

      Actions:
      - status: 列出所有节点状态
      - describe: 获取节点详细信息
      - run: 在节点上执行 shell 命令
      - notify: 发送系统通知到节点
      - which: 检查可执行文件是否存在
      - whitelist_add: 将命令加入白名单（需先通过 hitl 征得用户同意）
      - whitelist_info: 查看当前白名单状态

      output_handling 使用规范（run action）:
      - 当你需要阅读、分析、处理命令的输出内容时，设置 output_handling="full"
        例如：读取文件内容、查看日志、检查配置、搜索文本、列出目录内容
      - 当你只需确认命令是否执行成功时，使用默认值 "summary" 即可
        例如：安装依赖、创建文件/目录、复制/移动文件、启动服务
  input_schema:
    type: object
    properties:
      action:
        type: string
        enum: [status, describe, run, notify, which, whitelist_add, whitelist_info]
      node:
        type: string
        description: 目标节点 ID（默认 local）
        default: local
      command:
        type: array
        items:
          type: string
        description: 要执行的命令（run action）
      output_handling:
        type: string
        enum: [full, summary]
        description: >
          输出处理方式（仅 run action）。
          full = 你需要完整输出来分析/处理（如读文件、查日志、查看配置）；
          summary = 你只需确认执行结果（如安装包、创建目录、写文件）。
          默认 summary。
        default: summary
      cwd:
        type: string
        description: 工作目录（run action）
      env:
        type: object
        description: 环境变量（run action）
      timeout_ms:
        type: integer
        default: 30000
      title:
        type: string
        description: 通知标题（notify action）
      message:
        type: string
        description: 通知内容（notify action）
      subtitle:
        type: string
        description: 通知副标题（notify action）
      executable:
        type: string
        description: 可执行文件名（which action）
      executables:
        type: array
        items:
          type: string
        description: 要加入白名单的命令名或完整路径列表（whitelist_add action）
    required: [action]

- name: browser
  type: TOOL
  subtype: CUSTOM
  provider: user
  invocation_hint: DIRECT
  level: 2
  state_category: browsing
  cache_stable: false
  implementation:
    module: tools.browser
    class: BrowserTool
  capabilities:
    - web_interaction
    - browser_automation
    - browser_debugging
  priority: 80
  cost:
    time: fast
    money: free
  constraints:
    requires_api: false
  metadata:
    description: |
      Playwright browser automation: navigate, text snapshot, click/type by ref,
      keyboard, dialogs, file upload, JS eval, console/network debug, PDF export.
      For web pages. Desktop apps use observe_screen + peekaboo instead.
  input_schema:
    type: object
    properties:
      action:
        type: string
        enum: [navigate, go_back, go_forward, snapshot, click, type, fill,
               select, press_key, hover, drag, scroll, handle_dialog,
               upload_file, wait_for, evaluate, screenshot, pdf_save,
               console, network, resize, tabs, new_tab, close]
        description: Browser action to perform
      url:
        type: string
        description: URL (navigate/new_tab)
      ref:
        type: string
        description: Element ref from snapshot, e.g. 'e3'
      text:
        type: string
        description: Text to type/fill/select, or text to wait for
      clear:
        type: boolean
        description: Clear before typing (type, default false)
      submit:
        type: boolean
        description: Press Enter after typing (type, default false)
      double_click:
        type: boolean
        description: Double-click (click, default false)
      key:
        type: string
        description: Key to press (press_key), e.g. 'Enter', 'Escape'
      accept:
        type: boolean
        description: Accept/dismiss dialog (handle_dialog, default true)
      paths:
        type: array
        description: File paths to upload (upload_file)
      expression:
        type: string
        description: JavaScript to evaluate (evaluate)
      tab_id:
        type: string
        description: Tab ID to switch to (tabs)
    required: [action]

- name: observe_screen
  type: TOOL
  subtype: CUSTOM
  provider: user
  invocation_hint: DIRECT
  level: 1
  state_category: executing
  cache_stable: false
  implementation:
    module: tools.observe_screen
    class: ObserveScreenTool
  capabilities:
    - screen_observation
    - ui_understanding
  priority: 85
  cost:
    time: fast
    money: free
  constraints:
    requires_api: false
  metadata:
    description: |
      截取当前屏幕或指定应用窗口的截图，使模型能直接「看到」屏幕内容。
      适用：查看桌面/应用界面、在窗口中查找信息、根据用户描述定位内容。
  input_schema:
    type: object
    properties:
      app:
        type: string
        description: 应用名称（如 Safari），用于定位窗口
      window_title:
        type: string
        description: 窗口标题关键词
      mode:
        type: string
        enum: [screen, window, frontmost]
        default: screen
        description: 截屏范围
      description:
        type: string
        description: 简短说明本次截屏目的
    required: []

- name: open_system_preferences
  type: TOOL
  subtype: CUSTOM
  provider: user
  invocation_hint: DIRECT
  level: 1
  state_category: executing
  cache_stable: true
  implementation:
    module: tools.open_system_preferences
    class: OpenSystemPreferencesTool
  capabilities:
    - system_settings
    - permission_management
  priority: 95
  cost:
    time: fast
    money: free
  constraints:
    requires_api: false
  metadata:
    description: |
      直接打开系统设置面板，让用户授权指定权限。
      权限不足时直接调用，不要用文字描述操作步骤。
  input_schema:
    type: object
    properties:
      permission:
        type: string
        enum: [screen_recording, accessibility, camera, location, full_disk_access, automation, notifications]
        description: 要打开的权限设置类型
    required: [permission]

- name: scheduled_task
  type: TOOL
  subtype: CUSTOM
  provider: user
  invocation_hint: DIRECT
  level: 1
  state_category: planning
  cache_stable: false
  implementation:
    module: tools.scheduled_task_tool
    class: ScheduledTaskTool
  capabilities:
    - task_scheduling
    - reminder
  priority: 90
  cost:
    time: fast
    money: low
  constraints:
    requires_api: false
  metadata:
    description: |
      定时任务管理工具。

      触发类型：
      - once: 单次执行（指定具体时间）
      - cron: Cron 表达式
      - interval: 固定间隔

      动作类型：
      - send_message: 发送提醒消息
      - agent_task: 让 AI 执行任务
  input_schema:
    type: object
    properties:
      operation:
        type: string
        enum: [create, list, cancel, update]
      task_id:
        type: string
        description: 任务 ID（更新/取消时必填）
      title:
        type: string
      trigger_type:
        type: string
        enum: [once, cron, interval]
      trigger_config:
        type: object
        properties:
          run_at:
            type: string
            description: ISO 格式时间（once 时使用）
          cron:
            type: string
            description: Cron 表达式
          interval_seconds:
            type: integer
      action:
        type: object
        properties:
          type:
            type: string
            enum: [send_message, agent_task]
          content:
            type: string
            description: 提醒内容（send_message）
          prompt:
            type: string
            description: 任务描述（agent_task）
    required: [operation]

- name: pipeline
  type: TOOL
  subtype: CUSTOM
  provider: user
  invocation_hint: DIRECT
  level: 1
  state_category: executing
  cache_stable: false
  implementation:
    module: tools.pipeline_tool
    class: PipelineTool
  capabilities:
    - workflow_automation
    - pipeline_execution
  priority: 85
  cost:
    time: variable
    money: free
  constraints:
    requires_api: false
  metadata:
    description: |
      多步骤任务自动执行。当用户的任务可以拆成「先做A，再做B，最后做C」的固定流程时使用。

      适用场景（用户可能这样说）：
      - "帮我搜一下这几家公司的信息，整理成对比报告"
      - "先查资料，再写分析，最后生成 PDF"
      - "跑一遍标准的竞品分析流程"
      - "做完通知我" / "放后台跑吧"（→ 用 run_background）
      - "继续上次没做完的"（→ 用 resume）

      不适用（用这些场景用 plan）：
      - 需要你每步思考和判断的探索性任务
      - 用户只问一个问题
      - 步骤不确定、需要根据中间结果动态调整的任务

      选择依据：步骤能提前确定 → pipeline；需要边做边想 → plan。
  input_schema:
    type: object
    properties:
      action:
        type: string
        enum: [define_and_run, run_background, resume, status]
        description: "define_and_run: 定义并执行; run_background: 后台执行; resume: 断点恢复; status: 查询状态"
      pipeline:
        type: object
        description: 管道定义（define_and_run / run_background 时必需）
        properties:
          name:
            type: string
            description: 管道名称
          steps:
            type: array
            items:
              type: object
              properties:
                id:
                  type: string
                skill:
                  type: string
                  description: Skill 名称（skill/tool/code 三选一）
                tool:
                  type: string
                  description: Tool 名称
                code:
                  type: string
                  description: Python 代码
                params:
                  type: object
                depends_on:
                  type: array
                  items:
                    type: string
                approval:
                  type: boolean
                  description: 是否需要审批
                  default: false
                timeout_seconds:
                  type: integer
                  default: 300
              required: [id]
            description: 步骤列表
        required: [name, steps]
      resume_token:
        type: string
        description: 恢复令牌（resume 时必需）
      task_id:
        type: string
        description: 任务 ID（status 时可选）
      context:
        type: object
        description: 初始上下文数据
    required: [action]

# ========== 动态工具（Level 2，按需加载）==========

- name: audio_processing
  type: TOOL
  subtype: CUSTOM
  provider: user
  invocation_hint: DIRECT
  level: 2
  state_category: executing
  cache_stable: false
  implementation:
    module: tools.audio_processing
    class: AudioProcessingTool
  capabilities:
    - audio_processing
    - tts
    - stt
  priority: 70
  cost:
    time: variable
    money: low
  constraints:
    requires_api: true
    requires_network: true
  metadata:
    description: |
      Audio processing tool: TTS, STT, and audio understanding.
      - tts: Convert text to speech audio file
      - stt: Transcribe audio file to text
      - understand: Analyze audio content with multimodal model
  input_schema:
    type: object
    properties:
      action:
        type: string
        enum: [tts, stt, understand]
        description: "tts = text to speech, stt = speech to text, understand = audio analysis"
      text:
        type: string
        description: Input text (TTS action)
      audio_url:
        type: string
        description: Audio file path or URL (STT/understand actions)
      voice:
        type: string
        description: TTS voice (optional)
      model:
        type: string
        description: Model to use (optional, auto-selected)
      format:
        type: string
        enum: [wav, mp3, opus, aac, flac, pcm]
        description: Output audio format (TTS, default wav)
    required: [action]

