- name: sandbox_write_file
  type: TOOL
  subtype: CUSTOM
  provider: user
  level: 1
  implementation:
    module: tools.sandbox_tools
    class: SandboxWriteFile
  capabilities:
  - sandbox_file_operations
  - content_writing
  priority: 90
  cost:
    time: fast
    money: free
  constraints:
    requires_api: true
    api_name: e2b
    session_scoped: true
  metadata:
    description: |
      写入沙盒文件（目录自动创建）。
      
      【核心原则】用户是非技术人员，最终交付物必须是可直接使用的界面。
      
      【最佳实践】
      1. 任何"系统/管理/平台"类项目必须包含前端界面（index.html 或 Vue/React）
      2. 纯展示/小游戏用单文件 index.html（内嵌 CSS/JS）
      3. 需要数据存储的系统必须同时创建：前端界面 + 后端 API
      
      【典型工作流 - 招聘系统】
      1. sandbox_write_file("backend/main.py", FastAPI 后端代码)
      2. sandbox_write_file("frontend/index.html", 完整的管理界面)  ← 用户能看到的界面！
      3. sandbox_run_command 启动后端 (background=true, port=8000)
      4. sandbox_run_command 启动前端 (background=true, port=3000)
      5. 告知用户"系统已启动"，系统自动发送前端链接
      
      【关键检查】
      任务完成前问自己：用户点击链接后能看到可操作的界面吗？
      - 如果只有后端 API → 任务未完成，必须补充前端界面
      - 如果用户需要懂代码才能用 → 任务失败
    keywords: [sandbox, 沙盒, 写入, 文件]
  input_schema:
    type: object
    properties:
      conversation_id: {type: string, description: 对话 ID}
      path: {type: string, description: 文件路径}
      content: {type: string, description: 文件内容}
    required: [conversation_id, path, content]
- name: sandbox_run_command
  type: TOOL
  subtype: CUSTOM
  provider: user
  level: 1
  implementation:
    module: tools.sandbox_tools
    class: SandboxRunCommand
  capabilities:
  - sandbox_file_operations
  - code_execution
  - command_execution
  priority: 90
  cost:
    time: fast
    money: low
  constraints:
    requires_api: true
    api_name: e2b
    session_scoped: true
  metadata:
    description: |
      执行终端命令。支持后台运行服务器。
      
      【核心原则】用户是非技术人员，他们需要可点击访问的链接，而不是命令行输出。
      
      【启动服务 - 最佳实践】
      1. 设置 background=true + port 参数
      2. 系统会自动返回公开 URL（https://xxx.e2b.dev）
      3. 用户点击链接即可访问，无需任何技术操作
      4. 服务必须监听 0.0.0.0（不是 127.0.0.1 或 localhost）
      
      【典型用法】
      
      静态 HTML 项目：
        sandbox_run_command(command="python3 -m http.server 8000", background=true, port=8000)
      
      Vue/React 项目：
        sandbox_run_command(command="npm run dev -- --host 0.0.0.0", background=true, port=5173)
      
      FastAPI 后端：
        sandbox_run_command(command="uvicorn main:app --host 0.0.0.0 --port 8000", background=true, port=8000)
      
      Node.js/Express 后端：
        sandbox_run_command(command="node server.js", background=true, port=3000)
      
      【完整系统（前端+后端）工作流】
      1. 启动后端：sandbox_run_command("uvicorn main:app --host 0.0.0.0 --port 8000", background=true, port=8000, cwd="backend")
      2. 启动前端：sandbox_run_command("python3 -m http.server 3000", background=true, port=3000, cwd="frontend")
      3. 告知用户"系统已启动，您可以开始使用了"
      4. 系统自动发送前端预览链接（用户点击即可访问界面）
      
      【注意】localhost:3000 是沙盒内部地址，用户无法访问！必须使用 port 参数获取公开 URL。
    keywords: [sandbox, 沙盒, 命令, bash, shell, 启动服务器]
  input_schema:
    type: object
    properties:
      conversation_id: {type: string, description: 对话 ID}
      command: {type: string, description: 命令}
      background: {type: boolean, description: 是否后台运行（启动服务器时使用）, default: false}
      port: {type: integer, description: 服务端口（background=true 时指定，自动返回公开 URL，用户可直接访问）}
      timeout: {type: integer, description: 超时秒数, default: 120}
    required: [conversation_id, command]
