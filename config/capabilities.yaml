task_type_mappings:
  information_query:
  - web_search
  - knowledge_base
  - file_operations
  - task_planning
  content_generation:
  - document_creation
  - ppt_generation
  - file_operations
  - code_execution
  - task_planning
  data_analysis:
  - data_analysis
  - file_operations
  - code_sandbox
  - code_execution
  - task_planning
  code_task:
  - code_execution
  - code_sandbox
  - app_generation
  - file_operations
  - task_planning
  app_creation:
  - app_generation
  - code_sandbox
  - data_visualization
  - task_planning
  other:
  - file_operations
  - code_execution
  - task_planning
capability_categories:
- id: knowledge_base
  description: 个人知识库检索
  use_when: 需要查找用户之前上传的文档、笔记、资料
  examples:
  - 查找我的文档
  - 检索个人笔记
  - 搜索上传的资料
- id: web_search
  description: 搜索互联网信息
  use_when: 需要查找资料、新闻、数据、实时信息
  examples:
  - 搜索市场数据
  - 查找行业报告
  - 获取最新新闻
- id: ppt_generation
  description: 生成演示文稿
  use_when: 需要创建 PowerPoint/Slides
  examples:
  - 制作产品PPT
  - 生成培训材料
  - 创建汇报文档
- id: document_creation
  description: 生成文档
  use_when: 需要创建 Word/PDF 文档
  examples:
  - 撰写报告
  - 生成合同
  - 创建说明书
- id: data_analysis
  description: 数据处理和分析
  use_when: 需要处理 Excel、统计分析、数据可视化
  examples:
  - 分析销售数据
  - 生成统计报表
  - 数据清洗
- id: file_operations
  description: 文件读写操作
  use_when: 需要读取或保存文件
  examples:
  - 读取配置文件
  - 保存结果
  - 文件管理
- id: code_execution
  description: 执行代码和脚本
  use_when: 需要运行Python/Bash脚本、计算逻辑
  examples:
  - 数据转换
  - 自动化任务
  - 计算处理
- id: code_sandbox
  description: 在安全沙箱中执行Python代码（支持网络、第三方包、文件持久化）
  use_when: 需要网络访问、第三方Python包、文件持久化
  examples:
  - 爬取网页数据
  - 使用pandas分析CSV
  - 调用REST API
- id: app_generation
  description: 生成完整的Web应用（Streamlit/Gradio/Next.js）并返回预览URL
  use_when: 需要创建完整的交互式应用，用户可通过浏览器访问
  examples:
  - 创建数据可视化应用
  - 生成ML模型界面
  - 创建Web应用
- id: api_calling
  description: 调用外部API服务
  use_when: 需要与外部服务交互
  examples:
  - 调用渲染服务
  - 访问第三方API
  - 云服务集成
- id: task_planning
  description: 任务规划和进度管理
  use_when: 需要制定计划、追踪进度
  examples:
  - 创建任务计划
  - 更新步骤状态
  - 管理待办事项
