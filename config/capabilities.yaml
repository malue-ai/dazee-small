        description: 是否包含图表。默认：true
        default: true
      include_images:
        type: boolean
        description: 是否包含图片。默认：true
        default: true
      materials:
        type: array
        description: 预提供的素材（可选）。如已有搜索结果，可直接传入
        items:
          type: object
          properties:
            title:
