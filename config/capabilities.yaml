  implementation:
    module: tools.slidespeak
    class: SlideSpeakTool
  capabilities:
  - ppt_rendering
  - ppt_generation
  - api_calling
  priority: 40
  cost:
    time: medium
    money: low
  constraints:
    requires_api: true
    api_name: slidespeak
  metadata:
    description: |
      使用 SlideSpeak API 渲染高质量 PPT。
      
      支持：
      - 复杂布局（ITEMS, COMPARISON, TIMELINE, BIG_NUMBER, CHART, TABLE, SWOT等）
      - 自动图片获取
      - 专业模板应用
      - 高质量渲染
      
      输入：SlideSpeak 配置（包含 slides 数组）
      输出：PPT 文件下载链接
    note: 🎨 底层渲染工具，通常由 ppt_generator 内部调用，也可直接使用
    used_by: ppt_generator
    preferred_for:
    - 直接渲染 PPT
    - 自定义 SlideSpeak 配置
    - 专业布局控制
    keywords:
    - ppt
    - presentation
    - slidespeak
    - professional
    - 专业
    - 渲染
  input_schema:
    type: object
    properties:
      config:
        type: object
        description: 完整的SlideSpeak配置。参考：https://docs.slidespeak.co/basics/api-references/slide-by-slide/
        properties:
          template:
            type: string
            description: 模板名称，如'DEFAULT'。查看可用模板：GET /api/v1/templates
          language:
            type: string
            description: 语言代码，如'CHINESE'、'ENGLISH'。默认：'ORIGINAL'（从内容推断）
          fetch_images:
            type: boolean
            description: 是否包含库存图片。默认：true
          verbosity:
            type: string
            enum:
            - concise
            - standard
            - text-heavy
            description: 文本详细程度。默认：'standard'
          include_cover:
            type: boolean
            description: 是否包含封面。默认：true
          include_table_of_contents:
            type: boolean
            description: 是否包含目录。默认：true
          add_speaker_notes:
            type: boolean
            description: 是否添加演讲者备注。默认：false
          slides:
            type: array
            description: 幻灯片配置数组，每个slide必须包含layout、title、item_amount和content
            items:
              type: object
              properties:
                title:
                  type: string
                  description: 幻灯片标题（简洁，8-15字）
                layout:
                  type: string
                  enum:
                  - ITEMS
                  - BIG_NUMBER
                  - COMPARISON
                  - TIMELINE
                  - TABLE
                  - CHART
                  - SWOT
                  - PESTEL
                  - THANKS
                  description: 布局类型（必选）。根据内容类型选择最合适的布局
                item_amount:
                  type: integer
                  description: 项目数量
                content:
                  type: string
                  description: 幻灯片内容
                images:
                  type: array
                  description: 可选：图片配置（目前仅支持单图布局，只使用第一张图片）
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum:
                        - stock
                        - url
                        - ai
                        description: 图片来源：stock=库存搜索（推荐）, url=直接链接, ai=AI生成
                      data:
                        type: string
                        description: stock=英文搜索关键词 | url=图片URL | ai=生成提示
                    required:
                    - type
                    - data
                chart:
                  type: object
                  description: 可选：图表配置（仅CHART布局需要）。参考：https://docs.slidespeak.co/basics/layouts/charts/
                table:
                  type: array
                  description: 可选：表格数据（仅TABLE布局需要）。二维字符串数组，第一行为表头
                  items:
                    type: array
                    items:
                      type: string
              required:
              - title
              - layout
              - item_amount
              - content
        required:
        - template
        - slides
      save_dir:
        type: string
        description: 保存PPT文件的目录路径（可选，默认./workspace/outputs/ppt）
    required:
    - config
