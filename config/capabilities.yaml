# ============================================================
# Agent V3 能力注册表配置
# ============================================================
#
# 此文件定义了Agent可以使用的所有能力（Skills/Tools/MCP/Code）
# 每个能力的优先级、约束条件、成本等信息都在这里统一管理
#
# 参考文档: docs/v3/02-CAPABILITY-ROUTING.md
# ============================================================

# ============================================================
# 🆕 能力分类定义（唯一数据源）
# ============================================================
# 说明：
# - 这是抽象的能力分类，LLM 在 Plan 阶段只需要知道这些分类
# - Router 负责将分类映射到具体工具（见下方 capabilities 定义）
# - 新增分类后，System Prompt 和 plan_todo Schema 会自动更新
# ============================================================

# ============================================================
# 🆕 任务类型 → 能力映射（通用能力推断）
# ============================================================
# 说明：
# - 作为能力推断的「初始值」，适用于所有任务（简单/复杂）
# - 优先级：
#   1. 有 Plan → 从 Plan 提取（更精确，Sonnet 分析后的结果）
#   2. 无 Plan → 从这里推断（首轮任务的初始能力集）
# - 好处：
#   - 复杂任务首轮也能筛选工具，不再"传入所有工具"
#   - 配置即时生效，无需修改代码
# ============================================================

task_type_mappings:
  information_query:
    - web_search
    - knowledge_base
    - file_operations
    - task_planning
  
  content_generation:
    - document_creation
    - ppt_generation
    - file_operations
    - code_execution
    - task_planning
  
  data_analysis:
    - data_analysis
    - file_operations
    - code_sandbox      # 🆕 优先使用沙箱（支持第三方包）
    - code_execution
    - task_planning
  
  code_task:
    - code_execution
    - code_sandbox
    - app_generation
    - file_operations
    - task_planning
  
  app_creation:
    - app_generation
    - code_sandbox
    - data_visualization
    - task_planning
  
  other:
    - file_operations
    - code_execution
    - task_planning

capability_categories:
  - id: knowledge_base
    description: "个人知识库检索"
    use_when: "需要查找用户之前上传的文档、笔记、资料"
    examples: ["查找我的文档", "检索个人笔记", "搜索上传的资料"]
  
  - id: web_search
    description: "搜索互联网信息"
    use_when: "需要查找资料、新闻、数据、实时信息"
    examples: ["搜索市场数据", "查找行业报告", "获取最新新闻"]
    
  - id: ppt_generation
    description: "生成演示文稿"
    use_when: "需要创建 PowerPoint/Slides"
    examples: ["制作产品PPT", "生成培训材料", "创建汇报文档"]
    
  - id: document_creation
    description: "生成文档"
    use_when: "需要创建 Word/PDF 文档"
    examples: ["撰写报告", "生成合同", "创建说明书"]
    
  - id: data_analysis
    description: "数据处理和分析"
    use_when: "需要处理 Excel、统计分析、数据可视化"
    examples: ["分析销售数据", "生成统计报表", "数据清洗"]
    
  - id: file_operations
    description: "文件读写操作"
    use_when: "需要读取或保存文件"
    examples: ["读取配置文件", "保存结果", "文件管理"]
    
  - id: code_execution
    description: "执行代码和脚本"
    use_when: "需要运行Python/Bash脚本、计算逻辑"
    examples: ["数据转换", "自动化任务", "计算处理"]
  
  - id: code_sandbox
    description: "在安全沙箱中执行Python代码（支持网络、第三方包、文件持久化）"
    use_when: "需要网络访问、第三方Python包、文件持久化"
    examples: ["爬取网页数据", "使用pandas分析CSV", "调用REST API"]
  
  - id: app_generation
    description: "生成完整的Web应用（Streamlit/Gradio/Next.js）并返回预览URL"
    use_when: "需要创建完整的交互式应用，用户可通过浏览器访问"
    examples: ["创建数据可视化应用", "生成ML模型界面", "创建Web应用"]
    
  - id: api_calling
    description: "调用外部API服务"
    use_when: "需要与外部服务交互"
    examples: ["调用渲染服务", "访问第三方API", "云服务集成"]
    
  - id: task_planning
    description: "任务规划和进度管理"
    use_when: "需要制定计划、追踪进度"
    examples: ["创建任务计划", "更新步骤状态", "管理待办事项"]

# ============================================================
# 能力定义（工具/Skills/MCP）
# ============================================================
# 说明：
# - capabilities 字段引用上面的 capability_categories ID
# - Router 根据 Plan 的 capability 需求匹配这些工具
#
# 🆕 工具分层（Manus Context Engineering）：
# - level: 1 = 核心工具（始终可用，高频）
# - level: 2 = 按需工具（根据任务动态加载）
# - level: 3 = 高级工具（复杂场景）
# - cache_stable: true = 不会导致 LLM cache 失效
#
# 🆕 结果精简（Result Compaction）：
# - compaction: 配置工具返回结果的精简策略
#   字段说明：
#   - strategy: 精简策略（必填）
#     * none: 不精简（默认）
#     * reference: 只返回引用（URL/文件路径）+ 提示
#     * truncate: 截断到指定大小
#     * summarize: 总结关键信息（未实现）
#     * structured: 结构化摘要（提取关键字段）
#     * custom: 自定义精简（如搜索结果特殊处理）
#   - result_type: 结果类型（可选，默认 "mixed"）
#     * file: 文件内容
#     * url: 网页内容
#     * text: 纯文本
#     * json: JSON 数据
#     * dataframe: 表格数据
#     * search_results: 搜索结果
#     * mixed: 混合类型
#   - max_size: 精简后最大大小（字符数，默认 10000）
#   - summary_chars: 摘要保留字符数（默认 200）
#   - max_items: 列表最多保留条目数（默认 10）
#
# 示例：
#   compaction:
#     strategy: custom
#     result_type: search_results
#     max_size: 3000
#     summary_chars: 200
#     max_items: 5
# ============================================================

capabilities:
  # ==================== Pre-built Skills (Anthropic官方) ====================
  
  - name: pptx
    type: SKILL
    subtype: PREBUILT
    provider: anthropic
    capabilities:
      - ppt_generation
      - presentation_creation
      - slide_editing
    priority: 60
    cost:
      time: fast
      money: free
    constraints:
      requires_api: false
      min_quality: medium
    metadata:
      description: "Create presentations, edit slides, analyze presentation content"
      preferred_for:
        - quick PPT
        - draft slides
        - simple presentation
      keywords:
        - 快速
        - 草稿
        - 简单
  
  - name: xlsx
    type: SKILL
    subtype: PREBUILT
    provider: anthropic
    capabilities:
      - data_analysis
      - spreadsheet_creation
      - chart_generation
    priority: 70
    cost:
      time: fast
      money: free
    constraints:
      requires_api: false
      min_quality: medium
    metadata:
      description: "Create spreadsheets, analyze data, generate reports with charts"
      preferred_for:
        - Excel operations
        - data analysis
        - standard spreadsheets
      keywords:
        - Excel
        - 数据分析
        - 表格
  
  - name: docx
    type: SKILL
    subtype: PREBUILT
    provider: anthropic
    capabilities:
      - document_creation
      - text_editing
      - formatting
    priority: 70
    cost:
      time: fast
      money: free
    constraints:
      requires_api: false
      min_quality: medium
    metadata:
      description: "Create documents, edit content, format text"
      preferred_for:
        - Word documents
        - standard documents
        - text editing
      keywords:
        - Word
        - 文档
        - 编辑
  
  - name: pdf
    type: SKILL
    subtype: PREBUILT
    provider: anthropic
    capabilities:
      - pdf_generation
      - document_creation
    priority: 75
    cost:
      time: fast
      money: free
    constraints:
      requires_api: false
      min_quality: high
    metadata:
      description: "Generate formatted PDF documents and reports"
      preferred_for:
        - PDF output
        - final deliverables
        - print documents
      keywords:
        - PDF
        - 打印
        - 交付

  # ==================== Custom Skills (用户定制) ====================
  # 
  # 说明：Custom Skills 现在只在 skills/library/ 目录中管理
  # - Skills 是指导性文档（SKILL.md），通过 bash cat 读取
  # - 不再在 capabilities.yaml 中定义为工具
  # - Skills 通过 SkillsManager 自动发现和注入到 System Prompt
  # 
  # 示例 Skills：
  # - skills/library/slidespeak-generator/SKILL.md (引用 slidespeak_render 工具)
  # - skills/library/planning-task/SKILL.md (提供任务规划指导)
  # 
  # ⚠️ 注意：如果需要调用工具，在 SKILL.md 中通过 references_tools 字段引用

  # ==================== Tools ====================
  
  # 🔍 知识库检索工具
  - name: knowledge_search
    type: TOOL
    subtype: CUSTOM
    provider: user
    
    # 工具实现配置
    implementation:
      module: "tools.knowledge_search"
      class: "KnowledgeSearchTool"
    
    # 🔑 工具输入定义（必须！）
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: "检索查询文本，描述你想要找到的信息"
        top_k:
          type: integer
          description: "返回的结果数量，默认 5"
          default: 5
        metadata_filter:
          type: object
          description: "元数据过滤条件（可选），如 {\"tags\": [\"important\"], \"source\": \"upload\"}"
      required:
        - query
    
    capabilities:
      - knowledge_base
      - semantic_search
      - personal_documents
      - information_retrieval
    priority: 95  # 高优先级 - 优先使用个人知识库
    cost:
      time: fast
      money: low
    constraints:
      requires_api: true
      requires_network: true
      api_name: ragie
      user_isolation: true  # 用户隔离
    metadata:
      description: "从用户的个人知识库中检索相关信息（基于 Ragie）"
      preferred_for:
        - 查找用户上传的文档
        - 检索个人笔记和资料
        - 搜索历史上传的内容
        - 个人知识回忆
      keywords:
        - 知识库
        - 个人文档
        - 检索
        - 搜索
        - 我的文档
        - 上传的资料
      note: |
        特性：
        - 每个用户有独立的知识空间（Partition）
        - 自动从 WorkingMemory 获取 user_id
        - 支持语义搜索和元数据过滤
        - 返回格式化的摘要供 LLM 使用
        
        使用场景：
        - "帮我找一下之前上传的产品文档"
        - "我记得有份关于XX的资料"
        - "查一下我的笔记里有没有XX"
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: "检索查询文本，描述想要找到的信息"
        top_k:
          type: integer
          description: "返回结果数量（1-20，默认5）"
          default: 5
          minimum: 1
          maximum: 20
        metadata_filter:
          type: object
          description: "元数据过滤条件（可选），如 {\"tags\": [\"important\"]}"
          additionalProperties: true
      required:
        - query
  
  # 🆕 通用 API 调用工具
  - name: api_calling
    type: TOOL
    subtype: CUSTOM
    provider: user
    
    # 工具实现配置
    implementation:
      module: "tools.api_calling"
      class: "APICallingTool"
    
    capabilities:
      - api_calling
      - http_request
      - async_polling
      - file_download
    priority: 75
    cost:
      time: variable
      money: variable
    constraints:
      requires_api: false  # 本身不需要 API,但用于调用其他 API
      requires_network: true
    metadata:
      description: "通用 HTTP API 调用工具,配合 Skills 文档使用,无需为每个 API 编写专门工具"
      preferred_for:
        - 调用外部 REST API
        - 异步任务处理
        - 文件上传下载
        - 动态 API 调用
      keywords:
        - api
        - http
        - rest
        - 调用
        - 通用
      note: |
        使用方式:
        1. LLM 从 Skill 文档中了解 API 使用方法
        2. 使用本工具发起实际的 HTTP 请求
        3. 无需为每个 API 单独编写工具
        
        示例场景:
        - slidespeak-generator skill 提供 SlideSpeak API 文档
        - LLM 使用 api_calling 调用 SlideSpeak API
        - 不需要 slidespeak_render 工具
    input_schema:
      type: object
      properties:
        url:
          type: string
          description: "API 端点 URL (完整的 HTTP(S) 地址)"
        method:
          type: string
          enum: ["GET", "POST", "PUT", "DELETE", "PATCH"]
          description: "HTTP 方法 (默认 POST)"
        headers:
          type: object
          description: "请求头字典"
        body:
          type: object
          description: "请求体 (将自动转为 JSON)"
        auth:
          type: object
          description: "认证配置"
          properties:
            type:
              type: string
              enum: ["api_key", "bearer", "basic"]
            credentials:
              type: object
        poll_for_result:
          type: boolean
          description: "是否轮询异步任务结果"
        poll_config:
          type: object
          description: "轮询配置"
        download_url_field:
          type: string
          description: "响应中下载链接的字段名"
        save_dir:
          type: string
          description: "文件保存目录"
      required:
        - url
  
  - name: file_read
    type: TOOL
    subtype: NATIVE
    provider: system
    capabilities:
      - file_operations
      - content_reading
    priority: 90
    cost:
      time: fast
      money: free
    constraints:
      requires_api: false
    metadata:
      description: "Read file contents from the file system"
    input_schema:
      type: object
      properties:
        path:
          type: string
          description: "The file path to read"
      required:
        - path
  
  - name: web_search
    type: TOOL
    subtype: NATIVE
    provider: system
    level: 2              # 🆕 按需加载
    cache_stable: true    # 🆕 不会导致 cache 失效
    
    # 🆕 结果精简配置（Manus 原则）
    compaction:
      strategy: custom           # 搜索结果使用自定义精简
      result_type: search_results
      max_size: 3000            # 精简后最大 3KB
      summary_chars: 200        # 每个结果保留 200 字符摘要
      max_items: 10             # 最多 10 个结果
    
    capabilities:
      - information_retrieval
      - web_search
    priority: 85
    cost:
      time: medium
      money: low
    constraints:
      requires_api: true
      requires_network: true
    metadata:
      description: "Search the web for information"
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: "The search query string"
      required:
        - query
  
  - name: exa_search
    type: TOOL
    subtype: CUSTOM
    provider: user
    level: 2              # 🆕 按需加载
    cache_stable: true    # 🆕 不会导致 cache 失效
    
    # 🆕 结果精简配置
    compaction:
      strategy: custom    # 使用自定义精简（URL + 摘要）
      max_size: 3000      # 精简后最大 3KB
      summary_chars: 200  # 每个结果保留 200 字符摘要
    
    # 🎯 工具实现配置 - 支持自动加载
    implementation:
      module: "tools.exa_search"
      class: "ExaSearchTool"
    
    capabilities:
      - information_retrieval
      - web_search
      - semantic_search
      - research
    priority: 90  # 高优先级，作为增强的搜索工具
    cost:
      time: fast
      money: low
    constraints:
      requires_api: true
      requires_network: true
      api_name: exa
    metadata:
      description: "High-quality semantic search using Exa API with content extraction"
      keywords:
        - search
        - research
        - semantic
        - web
        - papers
        - news
        - articles
      note: "比web_search更强大，支持语义理解和内容提取"
    # Tool的input_schema定义（用于Claude API）
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: "搜索查询（支持自然语言）"
        num_results:
          type: integer
          description: "返回结果数量（1-10，默认10）"
          default: 10
        category:
          type: string
          description: "内容分类过滤"
          enum: ["papers", "news", "github", "company", "personal_site", "pdf", "tweet"]
        include_text:
          type: boolean
          description: "是否包含网页正文内容"
          default: true
        start_published_date:
          type: string
          description: "开始发布日期（ISO格式，如'2024-01-01'）"
      required:
        - query
  
  # 🧪 实验：禁用具体的 SlideSpeak 工具，改用动态 api_calling + Skills
  - name: slidespeak_render
    type: TOOL
    subtype: CUSTOM
    provider: user
    
    # 🎯 工具实现配置 - 支持自动加载
    implementation:
      module: "tools.slidespeak"
      class: "SlideSpeakTool"
    
    capabilities:
      - ppt_rendering
      - ppt_generation
      - api_calling
    priority: 40
    cost:
      time: medium
      money: low
    constraints:
      requires_api: true
      api_name: slidespeak
    metadata:
      description: "SlideSpeak API rendering tool for professional PPT generation"
      note: "🎨 Generates high-quality presentations with professional layouts and designs"
      used_by: "slidespeak-generator"
      keywords:
        - ppt
        - presentation
        - slidespeak
        - professional
        - 专业
    # 🆕 完整的 input_schema（根据 SlideSpeak API 官方文档）
    # 参考：https://docs.slidespeak.co/basics/api-references/slide-by-slide/
    input_schema:
      type: object
      properties:
        config:
          type: object
          description: "完整的SlideSpeak配置。参考：https://docs.slidespeak.co/basics/api-references/slide-by-slide/"
          properties:
            template:
              type: string
              description: "模板名称，如'DEFAULT'。查看可用模板：GET /api/v1/templates"
            language:
              type: string
              description: "语言代码，如'CHINESE'、'ENGLISH'。默认：'ORIGINAL'（从内容推断）"
            fetch_images:
              type: boolean
              description: "是否包含库存图片。默认：true"
            verbosity:
              type: string
              enum: ["concise", "standard", "text-heavy"]
              description: "文本详细程度。默认：'standard'"
            include_cover:
              type: boolean
              description: "是否包含封面。默认：true"
            include_table_of_contents:
              type: boolean
              description: "是否包含目录。默认：true"
            add_speaker_notes:
              type: boolean
              description: "是否添加演讲者备注。默认：false"
            slides:
              type: array
              description: "幻灯片配置数组，每个slide必须包含layout、title、item_amount和content"
              items:
                type: object
                properties:
                  title:
                    type: string
                    description: "幻灯片标题（简洁，8-15字）"
                  layout:
                    type: string
                    enum: ["ITEMS", "BIG_NUMBER", "COMPARISON", "TIMELINE", "TABLE", "CHART", "SWOT", "PESTEL", "THANKS"]
                    description: "布局类型（必选）。根据内容类型选择最合适的布局"
                  item_amount:
                    type: integer
                    description: "项目数量"
                  content:
                    type: string
                    description: "幻灯片内容"
                  images:
                    type: array
                    description: "可选：图片配置（目前仅支持单图布局，只使用第一张图片）"
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: ["stock", "url", "ai"]
                          description: "图片来源：stock=库存搜索（推荐）, url=直接链接, ai=AI生成"
                        data:
                          type: string
                          description: "stock=英文搜索关键词 | url=图片URL | ai=生成提示"
                      required: ["type", "data"]
                  chart:
                    type: object
                    description: "可选：图表配置（仅CHART布局需要）。参考：https://docs.slidespeak.co/basics/layouts/charts/"
                  table:
                    type: array
                    description: "可选：表格数据（仅TABLE布局需要）。二维字符串数组，第一行为表头"
                    items:
                      type: array
                      items:
                        type: string
                required:
                  - title
                  - layout
                  - item_amount
                  - content
          required:
            - template
            - slides
        save_dir:
          type: string
          description: "保存PPT文件的目录路径（可选，默认./workspace/outputs/ppt）"
      required:
        - config


  # ==================== MCP Servers ====================
  # (示例配置，根据实际部署的MCP服务器添加)
  
