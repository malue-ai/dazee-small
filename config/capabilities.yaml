  - name: e2b_python_sandbox
    type: TOOL
    subtype: CUSTOM
    provider: user
    level: 2              # 🆕 按需加载
    cache_stable: true    # 🆕 不会导致 cache 失效
    
    # 🆕 结果精简配置
    compaction:
      strategy: truncate        # 截断长输出
      result_type: mixed
      max_size: 10000           # stdout/stderr 截断到 10KB
    
    implementation:
      module: "tools.e2b_sandbox"
      class: "E2BPythonSandbox"
    
    capabilities:
      - code_sandbox
      - code_execution
      - data_analysis
      - web_scraping
      - api_calling
      - file_operations
    
    priority: 85
    
    cost:
      time: fast
      money: low
    
    constraints:
      requires_api: true
      requires_network: true
      api_name: e2b
      session_scoped: true
      supports_persistence: true
    
    metadata:
      description: |
        在安全的E2B沙箱中执行Python代码。
        
        核心特性：
        • ✅ 完整网络访问（requests, httpx等）
        • ✅ 任意第三方包（pip install或自动检测）
        • ✅ 文件系统持久化（跨调用保持）
        • ✅ 长时间运行（最长24小时）
        • ✅ 多轮交互（会话级沙箱复用）
        • ✅ 流式输出（实时显示stdout/stderr）
        • ✅ 后台任务（支持长时运行任务）
      
      preferred_for:
        - 网络请求和API调用
        - 数据爬取和网页抓取
        - 使用第三方Python包（pandas, numpy, requests等）
        - 需要文件持久化的任务
        - 长时间运行的任务
        - 多步骤代码执行（需要保持状态）
        - 数据可视化（生成图表）
      
      keywords:
        - sandbox
        - python
        - network
        - pip
        - requests
        - pandas
        - 沙箱
        - 网络
        - 爬虫
        - 数据分析
      
      note: |
        文件系统规范：
        - 读取文件：/home/user/input_data/文件名
        - 保存文件：/home/user/output_data/文件名（会自动下载）
        - workspace/inputs/ 会自动同步到沙箱
        - 沙箱中的 output_data/ 会自动下载到 workspace/outputs/
    
    input_schema:
      type: object
      properties:
        code:
          type: string
          description: |
            要执行的Python代码。
            
            提示：
            • 可以使用任意Python包（会自动检测并安装）
            • 支持网络访问
            • 读取文件：/home/user/input_data/文件名
            • 保存文件：/home/user/output_data/文件名（会自动下载）
            • 使用 print() 输出结果
        
        template:
          type: string
          enum: ["base", "data-analysis", "web-scraping"]
          description: |
            沙箱模板（可选，默认根据任务类型自动选择）。
            • base: 纯净环境，按需安装
            • data-analysis: 预装 pandas/numpy/matplotlib
            • web-scraping: 预装 requests/beautifulsoup4
        
        enable_stream:
          type: boolean
          description: "是否启用流式输出（默认true）"
          default: true
        
        auto_install:
          type: boolean
          description: "是否自动检测并安装缺失的包（默认true）"
          default: true
        
        timeout:
          type: integer
          description: "代码执行超时时间（秒），默认300秒（5分钟）"
          default: 300
          minimum: 10
          maximum: 3600
        
        background:
          type: boolean
          description: "是否在后台运行（适合长时任务）"
          default: false
        
        return_files:
          type: array
          items:
            type: string
          description: |
            需要返回的文件路径列表（可选）。
            文件会自动下载到 workspace/outputs/
            
            示例: ["/home/user/output_data/result.csv", "/home/user/output_data/chart.png"]
      
      required:
        - code

# ============================================================
# 配置说明
# ============================================================
#
# 字段说明:
#   name: 能力名称（唯一标识符）
#   type: 能力类型 (SKILL/TOOL/MCP/CODE)
#   subtype: 子类型 (PREBUILT/CUSTOM/NATIVE/EXTERNAL/DYNAMIC)
#   provider: 提供者 (anthropic/user/system/external)
#   capabilities: 能力标签列表（用于匹配用户请求）
#   priority: 基础优先级 (0-100)
#   cost:
#     time: 执行时间 (fast/medium/slow)
#     money: 成本 (free/low/medium/high)
#   constraints: 约束条件
#     requires_api: 是否需要外部API
#     api_name: API名称
#     requires_auth: 是否需要认证
#     min_quality: 最低质量要求 (low/medium/high)
#   metadata: 扩展信息
#     description: 描述
#     preferred_for: 优先使用场景
#     keywords: 关键词列表
#
# 添加新能力:
#   1. 复制上面的模板
#   2. 修改name和capabilities
#   3. 调整priority（参考其他同类能力）
#   4. 填写metadata.preferred_for和keywords
#   5. 保存后重启Agent

