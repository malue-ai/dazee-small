# ==================== 任务类型 → 能力映射 ====================
#
# 📌 设计原则：
#   1. task_type 是用户意图的粗分类（由意图分析器识别）
#   2. 每个 task_type 映射到一组 capability_categories 的 ID
#   3. 所有 ID 必须在 capability_categories 中有定义
#
# 🔗 与 capability_categories 的关系：
#   task_type_mappings[xxx] → [能力ID列表] → 在 capability_categories 中查找定义
#
task_type_mappings:

  # 信息查询类任务
  information_query:
    - news_search          # 新闻搜索
    - academic_search      # 学术搜索
    - market_data          # 市场数据
    - knowledge_base       # 个人知识库检索

  # 内容生成类任务
  content_generation:
    - document_creation    # 文档生成
    - ppt_generation       # PPT 生成
    - chart_generation     # 图表生成
    - image_generation     # 图片生成

  # 数据处理类任务
  data_analysis:
    - data_analysis        # 数据分析
    - data_visualization   # 数据可视化
    - file_conversion      # 文件转换

  # 应用开发类任务
  app_creation:
    - app_generation       # 应用生成（internal，框架内置）

  # 业务集成类任务
  business_integration:
    - crm_integration      # CRM 集成
    - erp_integration      # ERP 集成
    - notification         # 消息通知

  # 通用/其他
  other: []

# ==================== 工具分类配置（合并自 tool_registry.yaml）====================
#
# 📌 设计原则：
#   1. 所有工具分类配置集中在此文件
#   2. 各模块从此配置读取，避免分散定义
#   3. 修改工具分类时只需编辑此文件
#
tool_classification:
  # 常用工具（不延迟加载）
  # 用于：Tool Search 模式下不延迟加载的工具
  frequent_tools:
    - tavily_search
    - plan
    - nodes
  
  # 工具类别（简写展开）
  # 用户配置一个类别，自动展开为多个工具
  categories:
    # 文档生成类（Claude Skills）
    document_skills:
      - pptx
      - xlsx
      - docx
      - pdf
    
    # PPT 生成类
    ppt_tools:
      - ppt_generator
      - slidespeak_render
    
    # 文档解析类
    document_partition:
      - document_partition_tool

# ==================== 能力类别定义 ====================
#
# 🆕 V4.6 分类体系：
#
# 📌 设计原则：
#   1. 业务能力类别（business）：面向 FDE/运营配置外部工具，描述"能解决什么业务问题"
#   2. 框架内部类别（internal）：框架内部使用，FDE 无需关心
#
# ⚠️ FDE 配置 MCP/API 工具时，只需使用 business 类别
#
capability_categories:

# ========== 业务能力类别（FDE/运营配置使用）==========
# 这些类别用于 instances/xxx/config.yaml 中的 capability 字段

# --- 内容生成类 ---
- id: ppt_generation
  category_type: business
  description: PPT/演示文稿生成
  use_when: 需要创建 PowerPoint、Slides、Keynote
  examples:
  - 制作产品PPT
  - 生成培训材料
  - 创建汇报文档

- id: document_creation
  category_type: business
  description: 文档生成（Word/PDF/报告）
  use_when: 需要创建文字文档、报告、合同
  examples:
  - 撰写报告
  - 生成合同
  - 创建说明书

- id: chart_generation
  category_type: business
  description: 图表生成（flowchart/架构图/思维导图）
  use_when: 需要创建流程图、架构图、关系图
  examples:
  - 生成 flowchart
  - 绘制系统架构图
  - 创建思维导图

- id: image_generation
  category_type: business
  description: 图片生成
  use_when: 需要 AI 生成图片、插图
  examples:
  - 生成产品图
  - 创建配图
  - 设计 logo

- id: video_generation
  category_type: business
  description: 视频生成
  use_when: 需要生成视频内容
  examples:
  - 生成宣传视频
  - 创建教程视频

# --- 信息获取类 ---

- id: news_search
  category_type: business
  description: 新闻资讯搜索
  use_when: 需要获取最新新闻、行业动态
  examples:
  - 获取行业新闻
  - 搜索公司动态
  - 追踪热点事件

- id: academic_search
  category_type: business
  description: 学术论文搜索
  use_when: 需要查找学术论文、研究报告
  examples:
  - 搜索论文
  - 查找研究数据

- id: market_data
  category_type: business
  description: 市场数据获取
  use_when: 需要获取市场、金融、统计数据
  examples:
  - 获取股票数据
  - 查询市场报告

# --- 数据处理类 ---
- id: data_analysis
  category_type: business
  description: 数据分析/统计
  use_when: 需要处理 Excel、进行统计分析
  examples:
  - 分析销售数据
  - 生成统计报表

- id: data_visualization
  category_type: business
  description: 数据可视化
  use_when: 需要生成图表、仪表盘
  examples:
  - 创建图表
  - 生成报表

- id: file_conversion
  category_type: business
  description: 文件格式转换
  use_when: 需要转换文件格式
  examples:
  - PDF 转 Word
  - 图片格式转换

# --- 业务集成类 ---
- id: crm_integration
  category_type: business
  description: CRM 系统集成
  use_when: 需要与 CRM 系统交互
  examples:
  - 查询客户信息
  - 更新销售线索

- id: erp_integration
  category_type: business
  description: ERP 系统集成
  use_when: 需要与 ERP 系统交互
  examples:
  - 查询库存
  - 获取订单信息

- id: notification
  category_type: business
  description: 消息通知
  use_when: 需要发送通知（邮件/短信/钉钉）
  examples:
  - 发送邮件
  - 推送消息

# ========== 框架内部类别（FDE 无需关心）==========
# 这些类别由框架内部使用，不暴露给配置人员

- id: knowledge_base
  category_type: internal
  description: 个人知识库检索（框架内置）
  use_when: 需要查找用户上传的文档
  examples:
  - 查找我的文档
  - 检索个人笔记

- id: app_generation
  category_type: internal
  description: Web 应用生成（框架内置）
  use_when: 需要创建交互式应用
  examples:
  - 创建数据应用
  - 生成 Web 界面

- id: task_planning
  category_type: internal
  description: 任务规划（框架内部）
  internal: true
  use_when: 框架内部任务编排

- id: file_operations
  category_type: internal
  description: 文件读写操作（框架内部）
  internal: true
  use_when: 需要读取或保存文件（作为其他意图的支撑）
  examples:
  - 读取配置文件
  - 保存结果
  - 文件管理

- id: api_calling
  category_type: internal
  description: API 调用（框架内部通用实现）
  internal: true
# ==================== 能力分层说明 ====================
# invocation_hint 字段说明：
# - SKILL_CONTAINER: Claude Skills 机制，通过 container.skills 配置
# - DIRECT: 标准 tool_use 调用，由 Claude 自主推理选择
# - PROGRAMMATIC: 程序化多工具调用（多工具编排场景）
# ===========================================================

capabilities:
- name: pptx
  type: SKILL
  subtype: PREBUILT
  provider: anthropic
  invocation_hint: SKILL_CONTAINER  # 🆕 V4.4: Claude Skills 机制
  fallback_tool: slidespeak_render
  capabilities:
  - ppt_generation
  - presentation_creation
  - slide_editing
  priority: 60
  cost:
    time: fast
    money: free
  constraints:
    requires_api: false
    min_quality: medium
    requires_claude_code_execution: true
  metadata:
    description: Create presentations, edit slides, analyze presentation content
    preferred_for:
    - quick PPT
    - draft slides
    - simple presentation
    keywords:
    - 快速
    - 草稿
    - 简单
- name: xlsx
  type: SKILL
  subtype: PREBUILT
  provider: anthropic
  invocation_hint: SKILL_CONTAINER  # 🆕 V4.4: Claude Skills 机制
  capabilities:
  - data_analysis
  - spreadsheet_creation
  - chart_generation
  priority: 70
  cost:
    time: fast
    money: free
  constraints:
    requires_api: false
    min_quality: medium
    requires_claude_code_execution: true
  metadata:
    description: Create spreadsheets, analyze data, generate reports with charts
    preferred_for:
    - Excel operations
    - data analysis
    - standard spreadsheets
    keywords:
    - Excel
    - 数据分析
    - 表格
- name: docx
  type: SKILL
  subtype: PREBUILT
  provider: anthropic
  invocation_hint: SKILL_CONTAINER  # 🆕 V4.4: Claude Skills 机制
  capabilities:
  - document_creation
  - text_editing
  - formatting
  priority: 70
  cost:
    time: fast
    money: free
  constraints:
    requires_api: false
    min_quality: medium
    requires_claude_code_execution: true
  metadata:
    description: Create documents, edit content, format text
    preferred_for:
    - Word documents
    - standard documents
    - text editing
    keywords:
    - Word
    - 文档
    - 编辑
- name: pdf
  type: SKILL
  subtype: PREBUILT
  provider: anthropic
  invocation_hint: SKILL_CONTAINER  # 🆕 V4.4: Claude Skills 机制
  capabilities:
  - pdf_generation
  - document_creation
  priority: 75
  cost:
    time: fast
    money: free
  constraints:
    requires_api: false
    min_quality: high
    requires_claude_code_execution: true
  metadata:
    description: Generate formatted PDF documents and reports
    preferred_for:
    - PDF output
    - final deliverables
    - print documents
    keywords:
    - PDF
    - 打印
    - 交付
- name: api_calling
  type: TOOL
  subtype: CUSTOM
  provider: user
  level: 1  # 核心工具，始终启用
  implementation:
    module: tools.api_calling
    class: APICallingTool
  capabilities:
  - api_calling
  - http_request
  - async_polling
  - file_download
  priority: 75
  cost:
    time: variable
    money: variable
  constraints:
    requires_api: false
    requires_network: true
  metadata:
    description: 通用 HTTP API 调用工具,配合 Skills 文档使用,无需为每个 API 编写专门工具
    preferred_for:
    - 调用外部 REST API
    - 异步任务处理
    - 文件上传下载
    - 动态 API 调用
    keywords:
    - api
    - http
    - rest
    - 调用
    - 通用
    note: '使用方式:

      1. LLM 从 Skill 文档中了解 API 使用方法

      2. 使用本工具发起实际的 HTTP 请求

      3. 无需为每个 API 单独编写工具


      示例场景:

      - slidespeak-generator skill 提供 SlideSpeak API 文档

      - LLM 使用 api_calling 调用 SlideSpeak API

      - 不需要 slidespeak_render 工具

      '
  input_schema:
    type: object
    properties:
      # 方式1: 使用预配置 API（推荐）
      api_name:
        type: string
        description: 预配置的 API 名称（如 coze_api、dify_api），自动注入 base_url 和认证
      path:
        type: string
        description: API 路径（与 api_name 配合使用），例如 /workflow/stream_run
      # 方式2: 直接指定 URL
      url:
        type: string
        description: 完整的 API URL（与 api_name 二选一）
      # 通用参数
      method:
        type: string
        enum:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        description: HTTP 方法 (默认 POST)
      headers:
        type: object
        description: 额外的请求头（会与预配置的 headers 合并）
      body:
        type: object
        description: 请求体 (将自动转为 JSON)
      # 请求模式（三选一）
      mode:
        type: string
        enum:
        - sync
        - stream
        - async_poll
        description: 请求模式 - sync(同步,默认)、stream(SSE流式)、async_poll(异步轮询)
      # 轮询配置
      poll_config:
        type: object
        description: 轮询配置（仅 mode=async_poll 时有效）
    required: []  # api_name 或 url 至少一个，在代码中校验
- name: tavily_search
  type: TOOL
  subtype: CUSTOM
  provider: user
  invocation_hint: DIRECT
  level: 2
  cache_stable: true
  compaction:
    strategy: custom
    result_type: search_results
    max_size: 3000
    summary_chars: 200
    max_items: 10
  implementation:
    module: tools.tavily_search
    class: TavilySearchTool
  capabilities:
  - information_retrieval
  - news_search
  - academic_search
  - market_data
  priority: 85
  cost:
    time: medium
    money: low
  constraints:
    requires_api: true
    requires_network: true
    api_name: tavily
    api_key_env: TAVILY_API_KEY
  metadata:
    description: |
      使用 Tavily API 进行通用网络搜索。
      
      特点：
      - 通用搜索：快速获取互联网信息
      - AI 摘要：自动生成搜索结果的智能摘要
      - 深度搜索：basic（快速）或 advanced（深入）
      - 域名过滤：可指定包含或排除的域名
      
      适用场景：
      - 快速查询事实信息
      - 获取最新新闻动态
      - 搜索产品/公司信息
      - 通用知识检索
    preferred_for:
    - 快速搜索信息
    - 获取最新新闻
    - 通用知识检索
    - 事实查询
    keywords:
    - 搜索
    - search
    - 查询
    - 新闻
    - 信息
    note: 与 exa_search 互补：tavily_search 适合快速通用搜索，exa_search 适合语义搜索和高质量资源定位
  input_schema:
    type: object
    properties:
      query:
        type: string
        description: 搜索查询（支持自然语言）
      search_depth:
        type: string
        description: 搜索深度：basic（快速）或 advanced（深入，更多结果）
        enum: [basic, advanced]
        default: basic
      max_results:
        type: integer
        description: 返回结果数量（默认5，最大20）
        default: 5
      include_answer:
        type: boolean
        description: 是否包含 AI 生成的摘要答案（默认true）
        default: true
      include_raw_content:
        type: boolean
        description: 是否包含网页原始内容（默认false，会增加响应大小）
        default: false
      include_domains:
        type: array
        items:
          type: string
        description: 只搜索这些域名（可选），如 ['github.com', 'stackoverflow.com']
      exclude_domains:
        type: array
        items:
          type: string
        description: 排除这些域名（可选），如 ['pinterest.com']
      topic:
        type: string
        description: 搜索主题类型：general（通用）或 news（新闻）
        enum: [general, news]
        default: general
    required:
    - query
- name: exa_search
  type: TOOL
  subtype: CUSTOM
  provider: user
  invocation_hint: DIRECT  # 🆕 V4.4: 标准 tool_use，Claude 自主推理选择
  level: 2
  cache_stable: true
  compaction:
    strategy: custom
    max_size: 3000
    summary_chars: 200
  implementation:
    module: tools.exa_search
    class: ExaSearchTool
  capabilities:
  - information_retrieval
  - semantic_search
  - research
  priority: 90
  cost:
    time: fast
    money: low
  constraints:
    requires_api: true
    requires_network: true
    api_name: exa
  metadata:
    description: |
      使用 Exa API 进行高质量的语义搜索。
      
      特点：
      - 语义理解：理解查询意图，返回最相关内容
      - 网页内容提取：自动提取网页正文内容
      - 时间过滤：支持按发布时间过滤结果
      - 分类搜索：支持按类别过滤（papers, news, github等）
      
      适用场景：
      - 学术论文搜索
      - 深度研究和调研
      - 高质量资源定位
      - 语义相关内容发现
    preferred_for:
    - 学术论文搜索
    - 深度研究
    - 高质量资源定位
    - 语义搜索
    keywords:
    - search
    - research
    - semantic
    - web
    - papers
    - news
    - articles
    - 搜索
    - 研究
    - 语义
    note: 与 tavily_search 互补：exa_search 适合语义搜索和高质量资源定位，tavily_search 适合快速通用搜索
  input_schema:
    type: object
    properties:
      query:
        type: string
        description: 搜索查询（支持自然语言）
      num_results:
        type: integer
        description: 返回结果数量（默认10，最大10）
        default: 10
      category:
        type: string
        description: 内容分类（papers/news/github/company/personal_site/pdf/tweet）
        enum:
        - papers
        - news
        - github
        - company
        - personal_site
        - pdf
        - tweet
      include_text:
        type: boolean
        description: 是否包含网页正文内容（默认true）
        default: true
      start_published_date:
        type: string
        description: 开始发布日期（ISO格式，如'2024-01-01'）
    required:
    - query
- name: ppt_generator
  type: TOOL
  subtype: CUSTOM
  provider: user
  invocation_hint: DIRECT  # 🆕 V4.4: 标准 tool_use，Claude 自主推理选择
  level: 2
  cache_stable: false
  implementation:
    module: tools.ppt_generator
    class: PPTGeneratorTool
  capabilities:
  - ppt_generation
  - content_generation
  priority: 95
  cost:
    time: medium
    money: low
  constraints:
    requires_api: true
    requires_network: true
    api_name: slidespeak
  metadata:
    description: '高质量闭环PPT生成工具 - 整合素材搜索、内容规划、PPT渲染的完整流程。

      🎯 核心能力：
      - 自动搜索相关素材（可选）
      - 智能内容规划
      - 专业PPT渲染（SlideSpeak API）
      - 多重质量检查

      📋 使用场景：
      - 基于主题快速生成专业PPT
      - 需要搜索最新资料的报告
      - 高质量演示文稿

      ⚡ 完整流程：
      1. 需求分析 → 2. 素材搜集 → 3. 内容规划 → 4. PPT渲染 → 5. 质量检查 → 6. 交付
      '
    preferred_for:
    - 高质量PPT生成
    - 需要搜索素材的报告
    - 专业演示文稿
    - 闭环PPT任务
    keywords:
    - ppt
    - 演示
    - 高质量
    - 闭环
    - 报告
    - presentation
  input_schema:
    type: object
    properties:
      topic:
        type: string
        description: PPT主题/标题（必需）
      description:
        type: string
        description: 详细需求描述，包括受众、目的、重点内容等
      search_queries:
        type: array
        items:
          type: string
        description: 搜索查询列表（可选）。提供后会自动搜索素材
      style:
        type: string
        enum:
        - professional
        - academic
        - creative
        - minimal
        - corporate
        description: PPT风格。默认：professional
        default: professional
      slide_count:
        type: integer
        description: 期望的幻灯片数量（不含封面和结尾）。默认：8-12
        minimum: 5
        maximum: 30
      language:
        type: string
        enum:
        - CHINESE
        - ENGLISH
        - ORIGINAL
        description: PPT语言。默认：根据内容自动判断
        default: ORIGINAL
      time_context:
        type: string
        description: 时间上下文，如'2024年'、'最近一年'。影响搜索时效性
      audience:
        type: string
        description: 目标受众，如'技术团队'、'管理层'、'投资人'
      custom_outline:
        type: array
        items:
          type: string
        description: 自定义大纲（可选）。提供后将按此结构生成
      include_charts:
        type: boolean
        description: 是否包含图表。默认：true
        default: true
      include_images:
        type: boolean
        description: 是否包含图片。默认：true
        default: true
      materials:
        type: array
        description: 预提供的素材（可选）。如已有搜索结果，可直接传入
        items:
          type: object
          properties:
            title:
              type: string
            content:
              type: string
            source:
              type: string
            date:
              type: string
    required:
    - topic
- name: slidespeak_render
  type: TOOL
  subtype: CUSTOM
  provider: user
  level: 1  # 🆕 设为核心工具，始终加载
  implementation:
    module: tools.slidespeak
    class: SlideSpeakTool
  capabilities:
  - ppt_rendering
  - ppt_generation
  - api_calling
  priority: 40
  cost:
    time: medium
    money: low
  constraints:
    requires_api: true
    api_name: slidespeak
  metadata:
    description: |
      使用 SlideSpeak API 渲染高质量 PPT。
      
      支持：
      - 复杂布局（ITEMS, COMPARISON, TIMELINE, BIG_NUMBER, CHART, TABLE, SWOT等）
      - 自动图片获取
      - 专业模板应用
      - 高质量渲染
      
      输入：SlideSpeak 配置（包含 slides 数组）
      输出：PPT 文件下载链接
    note: 🎨 底层渲染工具，通常由 ppt_generator 内部调用，也可直接使用
    used_by: ppt_generator
    preferred_for:
    - 直接渲染 PPT
    - 自定义 SlideSpeak 配置
    - 专业布局控制
    keywords:
    - ppt
    - presentation
    - slidespeak
    - professional
    - 专业
    - 渲染
  input_schema:
    type: object
    properties:
      config:
        type: object
        description: 完整的SlideSpeak配置。参考：https://docs.slidespeak.co/basics/api-references/slide-by-slide/
        properties:
          template:
            type: string
            description: 模板名称，如'DEFAULT'。查看可用模板：GET /api/v1/templates
          language:
            type: string
            description: 语言代码，如'CHINESE'、'ENGLISH'。默认：'ORIGINAL'（从内容推断）
          fetch_images:
            type: boolean
            description: 是否包含库存图片。默认：true
          verbosity:
            type: string
            enum:
            - concise
            - standard
            - text-heavy
            description: 文本详细程度。默认：'standard'
          include_cover:
            type: boolean
            description: 是否包含封面。默认：true
          include_table_of_contents:
            type: boolean
            description: 是否包含目录。默认：true
          add_speaker_notes:
            type: boolean
            description: 是否添加演讲者备注。默认：false
          slides:
            type: array
            description: 幻灯片配置数组，每个slide必须包含layout、title、item_amount和content
            items:
              type: object
              properties:
                title:
                  type: string
                  description: 幻灯片标题（简洁，8-15字）
                layout:
                  type: string
                  enum:
                  - ITEMS
                  - BIG_NUMBER
                  - COMPARISON
                  - TIMELINE
                  - TABLE
                  - CHART
                  - SWOT
                  - PESTEL
                  - THANKS
                  description: 布局类型（必选）。根据内容类型选择最合适的布局
                item_amount:
                  type: integer
                  description: 项目数量
                content:
                  type: string
                  description: 幻灯片内容
                images:
                  type: array
                  description: 可选：图片配置（目前仅支持单图布局，只使用第一张图片）
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum:
                        - stock
                        - url
                        - ai
                        description: 图片来源：stock=库存搜索（推荐）, url=直接链接, ai=AI生成
                      data:
                        type: string
                        description: stock=英文搜索关键词 | url=图片URL | ai=生成提示
                    required:
                    - type
                    - data
                chart:
                  type: object
                  description: 可选：图表配置（仅CHART布局需要）。参考：https://docs.slidespeak.co/basics/layouts/charts/
                table:
                  type: array
                  description: 可选：表格数据（仅TABLE布局需要）。二维字符串数组，第一行为表头
                  items:
                    type: array
                    items:
                      type: string
              required:
              - title
              - layout
              - item_amount
              - content
        required:
        - template
        - slides
      save_dir:
        type: string
        description: 保存PPT文件的目录路径（可选，默认./workspace/outputs/ppt）
    required:
    - config

