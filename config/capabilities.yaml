- name: knowledge_search
  type: TOOL
  subtype: CUSTOM
  provider: user
  implementation:
    module: tools.knowledge_search
    class: KnowledgeSearchTool
  input_schema:
    type: object
    properties:
      query:
        type: string
        description: 检索查询文本，描述想要找到的信息
      top_k:
        type: integer
        description: 返回结果数量（1-20，默认5）
        default: 5
        minimum: 1
        maximum: 20
      metadata_filter:
        type: object
        description: '元数据过滤条件（可选），如 {"tags": ["important"]}'
        additionalProperties: true
    required:
    - query
  capabilities:
  - knowledge_base
  - semantic_search
  - personal_documents
  - information_retrieval
  priority: 95
  cost:
    time: fast
    money: low
  constraints:
    requires_api: true
    requires_network: true
    api_name: ragie
    user_isolation: true
  metadata:
    description: 从用户的个人知识库中检索相关信息（基于 Ragie）
    preferred_for:
    - 查找用户上传的文档
    - 检索个人笔记和资料
    - 搜索历史上传的内容
    - 个人知识回忆
    keywords:
    - 知识库
    - 个人文档
    - 检索
    - 搜索
    - 我的文档
    - 上传的资料
    note: '特性：

      - 每个用户有独立的知识空间（Partition）

      - 自动从 WorkingMemory 获取 user_id

      - 支持语义搜索和元数据过滤

      - 返回格式化的摘要供 LLM 使用


      使用场景：

      - "帮我找一下之前上传的产品文档"

      - "我记得有份关于XX的资料"

      - "查一下我的笔记里有没有XX"

      '
- name: api_calling
  type: TOOL
  subtype: CUSTOM
  provider: user
  implementation:
    module: tools.api_calling
    class: APICallingTool
  capabilities:
  - api_calling
  - http_request
  - async_polling
  - file_download
  priority: 75
  cost:
    time: variable
    money: variable
  constraints:
    requires_api: false
    requires_network: true
  metadata:
    description: 通用 HTTP API 调用工具,配合 Skills 文档使用,无需为每个 API 编写专门工具
    preferred_for:
    - 调用外部 REST API
    - 异步任务处理
    - 文件上传下载
    - 动态 API 调用
    keywords:
    - api
    - http
    - rest
    - 调用
    - 通用
    note: '使用方式:

      1. LLM 从 Skill 文档中了解 API 使用方法

      2. 使用本工具发起实际的 HTTP 请求

      3. 无需为每个 API 单独编写工具


      示例场景:

      - slidespeak-generator skill 提供 SlideSpeak API 文档

      - LLM 使用 api_calling 调用 SlideSpeak API

      - 不需要 slidespeak_render 工具

      '
  input_schema:
    type: object
    properties:
      url:
        type: string
        description: API 端点 URL (完整的 HTTP(S) 地址)
      method:
        type: string
        enum:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        description: HTTP 方法 (默认 POST)
      headers:
        type: object
        description: 请求头字典
      body:
        type: object
        description: 请求体 (将自动转为 JSON)
      auth:
        type: object
        description: 认证配置
        properties:
          type:
            type: string
            enum:
            - api_key
            - bearer
            - basic
          credentials:
            type: object
      poll_for_result:
        type: boolean
        description: 是否轮询异步任务结果
      poll_config:
        type: object
        description: 轮询配置
      download_url_field:
        type: string
        description: 响应中下载链接的字段名
      save_dir:
        type: string
        description: 文件保存目录
    required:
    - url
