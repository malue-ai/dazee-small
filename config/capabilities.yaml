      通常不需要单独调用此工具。
      
      【最佳实践】
      - 优先在 sandbox_run_command 中指定 port 参数，直接获取 URL
      - 此工具用于：之前启动了服务但忘记指定 port、需要再次获取 URL
      
      【常用端口】
      - 静态 HTML (python -m http.server): 8000
      - Vite (React/Vue): 5173
      - Next.js / Node.js / Express: 3000
      - FastAPI / Flask: 8000 / 5000
      
      【注意】用户是非技术人员，获取 URL 后系统会自动发送给前端，
      只需告知用户"系统已启动"即可，无需在回复中展示技术细节。
    preferred_for: [获取URL, 预览链接, 公开URL]
    keywords: [sandbox, 沙盒, url, 预览, public]
  input_schema:
    type: object
    properties:
      conversation_id: {type: string, description: 对话 ID}
      port: {type: integer, description: 服务端口, default: 3000}
    required: [conversation_id]
- name: sandbox_upload_file
  type: TOOL
  subtype: CUSTOM
  provider: user
  level: 1
  implementation:
    module: tools.sandbox_tools
    class: SandboxUploadFile
  capabilities:
  - sandbox_file_operations
  - file_upload
  - s3_storage
  priority: 90
  cost:
    time: medium
    money: low
  constraints:
    requires_api: true
    api_name: e2b
    session_scoped: true
  metadata:
