    note: |
      Node.js 项目文件结构示例：
      my_app/
      ├── server.js      # Express 服务器（已配置静态文件服务）
      ├── package.json
      └── public/        # 静态文件目录
          ├── index.html # 入口页面
          ├── game.js    # 游戏逻辑
          └── style.css  # 样式文件
