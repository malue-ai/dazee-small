- name: knowledge_search
  type: TOOL
  subtype: CUSTOM
  provider: user
  implementation:
    module: tools.knowledge_search
    class: KnowledgeSearchTool
  input_schema:
    type: object
    properties:
      query:
        type: string
        description: 检索查询文本，描述想要找到的信息
      top_k:
        type: integer
        description: 返回结果数量（1-20，默认5）
        default: 5
        minimum: 1
        maximum: 20
      metadata_filter:
        type: object
        description: '元数据过滤条件（可选），如 {"tags": ["important"]}'
        additionalProperties: true
    required:
    - query
  capabilities:
  - knowledge_base
  - semantic_search
  - personal_documents
  - information_retrieval
  priority: 95
  cost:
    time: fast
    money: low
  constraints:
    requires_api: true
    requires_network: true
    api_name: ragie
    user_isolation: true
  metadata:
    description: |
      🔍 从用户的个人知识库中检索相关信息（专业 RAG 检索）
      
      **适用场景**：
      - 用户询问「我的文档中...」
      - 需要基于用户上传的资料回答问题
      - 引用用户的专业文档、笔记、报告等
      
      **返回格式**：
      - 按相关性评分排序的文档片段
      - 每个片段包含来源文档名称
      - 自动生成引用标记 [1], [2], [3]
      - 包含可直接使用的摘要文本
      
      **重要提示**：
      - ✅ 必须基于检索结果回答，禁止编造内容
      - ✅ 回答时需包含引用标记（如：根据文档[1]...）
      - ✅ 如果未找到相关内容，明确告知用户
      
      每个用户有独立的知识空间，只能检索自己的内容。
    preferred_for:
    - 查找用户上传的文档
    - 检索个人笔记和资料
    - 搜索历史上传的内容
    - 个人知识回忆
    - 基于文档回答问题
    keywords:
    - 知识库
    - 个人文档
    - 检索
    - 搜索
    - 我的文档
    - 上传的资料
    - RAG
    note: |
      特性：
      - 每个用户有独立的知识空间（Partition）
      - 自动从 WorkingMemory 获取 user_id
      - 支持语义搜索和元数据过滤
      - 返回格式化的摘要供 LLM 使用
      - 自动生成引用标记，便于追溯来源
      
      使用场景：
      - "帮我找一下之前上传的产品文档"
      - "我记得有份关于XX的资料"
      - "查一下我的笔记里有没有XX"
- name: api_calling
  type: TOOL
  subtype: CUSTOM
  provider: user
  level: 1  # 核心工具，始终启用
  implementation:
    module: tools.api_calling
    class: APICallingTool
  capabilities:
  - api_calling
  - http_request
  - async_polling
  - file_download
  priority: 75
  cost:
    time: variable
    money: variable
  constraints:
    requires_api: false
    requires_network: true
  metadata:
    description: 通用 HTTP API 调用工具,配合 Skills 文档使用,无需为每个 API 编写专门工具
    preferred_for:
    - 调用外部 REST API
    - 异步任务处理
    - 文件上传下载
    - 动态 API 调用
    keywords:
    - api
    - http
    - rest
    - 调用
    - 通用
    note: '使用方式:

      1. LLM 从 Skill 文档中了解 API 使用方法

      2. 使用本工具发起实际的 HTTP 请求

      3. 无需为每个 API 单独编写工具


      示例场景:

      - slidespeak-generator skill 提供 SlideSpeak API 文档

      - LLM 使用 api_calling 调用 SlideSpeak API

      - 不需要 slidespeak_render 工具

      '
  input_schema:
    type: object
    properties:
      # 方式1: 使用预配置 API（推荐）
      api_name:
        type: string
        description: 预配置的 API 名称（如 coze_api、dify_api），自动注入 base_url 和认证
      path:
        type: string
        description: API 路径（与 api_name 配合使用），例如 /workflow/stream_run
      # 方式2: 直接指定 URL
      url:
        type: string
        description: 完整的 API URL（与 api_name 二选一）
      # 通用参数
      method:
        type: string
        enum:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        description: HTTP 方法 (默认 POST)
      headers:
        type: object
        description: 额外的请求头（会与预配置的 headers 合并）
      body:
        type: object
        description: 请求体 (将自动转为 JSON)
      # 请求模式（三选一）
      mode:
        type: string
        enum:
        - sync
        - stream
        - async_poll
        description: 请求模式 - sync(同步,默认)、stream(SSE流式)、async_poll(异步轮询)
      # 轮询配置
      poll_config:
        type: object
        description: 轮询配置（仅 mode=async_poll 时有效）
    required: []  # api_name 或 url 至少一个，在代码中校验
- name: tavily_search
  type: TOOL
  subtype: CUSTOM
  provider: user
  invocation_hint: DIRECT
  level: 2
  cache_stable: true
  compaction:
    strategy: custom
    result_type: search_results
    max_size: 3000
    summary_chars: 200
    max_items: 10
  implementation:
    module: tools.tavily_search
    class: TavilySearchTool
  capabilities:
  - information_retrieval
  - web_search
  - news_search
  priority: 85
  cost:
    time: medium
    money: low
  constraints:
    requires_api: true
    requires_network: true
    api_name: tavily
    api_key_env: TAVILY_API_KEY
  metadata:
    description: |
      使用 Tavily API 进行通用网络搜索。
      
      特点：
      - 通用搜索：快速获取互联网信息
      - AI 摘要：自动生成搜索结果的智能摘要
      - 深度搜索：basic（快速）或 advanced（深入）
      - 域名过滤：可指定包含或排除的域名
      
      适用场景：
      - 快速查询事实信息
      - 获取最新新闻动态
      - 搜索产品/公司信息
      - 通用知识检索
    preferred_for:
    - 快速搜索信息
    - 获取最新新闻
    - 通用知识检索
    - 事实查询
    keywords:
    - 搜索
    - search
    - 查询
    - 新闻
    - 信息
    note: 与 exa_search 互补：tavily_search 适合快速通用搜索，exa_search 适合语义搜索和高质量资源定位
  input_schema:
    type: object
    properties:
      query:
        type: string
        description: 搜索查询（支持自然语言）
      search_depth:
        type: string
        description: 搜索深度：basic（快速）或 advanced（深入，更多结果）
        enum: [basic, advanced]
        default: basic
      max_results:
        type: integer
        description: 返回结果数量（默认5，最大20）
        default: 5
      include_answer:
        type: boolean
        description: 是否包含 AI 生成的摘要答案（默认true）
        default: true
      include_raw_content:
        type: boolean
        description: 是否包含网页原始内容（默认false，会增加响应大小）
        default: false
      include_domains:
        type: array
        items:
          type: string
        description: 只搜索这些域名（可选），如 ['github.com', 'stackoverflow.com']
      exclude_domains:
        type: array
        items:
          type: string
        description: 排除这些域名（可选），如 ['pinterest.com']
      topic:
        type: string
        description: 搜索主题类型：general（通用）或 news（新闻）
        enum: [general, news]
        default: general
    required:
    - query
- name: exa_search
  type: TOOL
  subtype: CUSTOM
  provider: user
  invocation_hint: DIRECT  # 🆕 V4.4: 标准 tool_use，Claude 自主推理选择
  level: 2
  cache_stable: true
  compaction:
    strategy: custom
    max_size: 3000
    summary_chars: 200
  implementation:
    module: tools.exa_search
    class: ExaSearchTool
  capabilities:
  - information_retrieval
  - web_search
  - semantic_search
  - research
  priority: 90
  cost:
    time: fast
    money: low
  constraints:
    requires_api: true
    requires_network: true
    api_name: exa
  metadata:
    description: |
      使用 Exa API 进行高质量的语义搜索。
      
      特点：
      - 语义理解：理解查询意图，返回最相关内容
      - 网页内容提取：自动提取网页正文内容
      - 时间过滤：支持按发布时间过滤结果
      - 分类搜索：支持按类别过滤（papers, news, github等）
      
      适用场景：
      - 学术论文搜索
      - 深度研究和调研
      - 高质量资源定位
      - 语义相关内容发现
    preferred_for:
    - 学术论文搜索
    - 深度研究
    - 高质量资源定位
    - 语义搜索
    keywords:
    - search
    - research
    - semantic
    - web
    - papers
    - news
    - articles
    - 搜索
    - 研究
    - 语义
    note: 与 tavily_search 互补：exa_search 适合语义搜索和高质量资源定位，tavily_search 适合快速通用搜索
  input_schema:
    type: object
    properties:
      query:
        type: string
        description: 搜索查询（支持自然语言）
      num_results:
        type: integer
        description: 返回结果数量（默认10，最大10）
        default: 10
      category:
        type: string
        description: 内容分类（papers/news/github/company/personal_site/pdf/tweet）
        enum:
        - papers
        - news
        - github
        - company
        - personal_site
        - pdf
        - tweet
      include_text:
        type: boolean
        description: 是否包含网页正文内容（默认true）
        default: true
      start_published_date:
        type: string
        description: 开始发布日期（ISO格式，如'2024-01-01'）
    required:
    - query
- name: ppt_generator
  type: TOOL
  subtype: CUSTOM
  provider: user
  invocation_hint: DIRECT  # 🆕 V4.4: 标准 tool_use，Claude 自主推理选择
  level: 2
  cache_stable: false
  implementation:
    module: tools.ppt_generator
    class: PPTGeneratorTool
  capabilities:
  - ppt_generation       # 🆕 V4.4 修正：只声明能提供的能力
  - content_generation   # web_search 是内部依赖，不是对外能力
  priority: 95
  cost:
    time: medium
    money: low
  constraints:
    requires_api: true
    requires_network: true
    api_name: slidespeak
  metadata:
    description: '高质量闭环PPT生成工具 - 整合素材搜索、内容规划、PPT渲染的完整流程。

      🎯 核心能力：
      - 自动搜索相关素材（可选）
      - 智能内容规划
      - 专业PPT渲染（SlideSpeak API）
      - 多重质量检查

      📋 使用场景：
      - 基于主题快速生成专业PPT
      - 需要搜索最新资料的报告
      - 高质量演示文稿

      ⚡ 完整流程：
      1. 需求分析 → 2. 素材搜集 → 3. 内容规划 → 4. PPT渲染 → 5. 质量检查 → 6. 交付
      '
    preferred_for:
    - 高质量PPT生成
    - 需要搜索素材的报告
    - 专业演示文稿
    - 闭环PPT任务
    keywords:
