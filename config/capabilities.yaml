  metadata:
    description: |
      初始化项目骨架（Initialize project）。
      
      【重要：Node.js 项目静态文件配置】
      nodejs 技术栈默认配置了 express.static 中间件：
      - 静态文件（HTML/CSS/JS/图片）放在 public/ 目录下（推荐）
      - 也支持直接放在项目根目录
      - 创建游戏/Web应用时，将 index.html 和 JS 文件放在 public/ 目录
      - 访问 http://host/ 会自动寻找 index.html
      
      【常见错误避免】
      ❌ 错误：创建 index.html 后直接访问，只看到 "Hello from Node.js"
      ✅ 正确：将 index.html 放在 public/ 目录或项目根目录
    preferred_for: [初始化项目, 创建项目, 快速开始, 创建游戏, Web应用]
