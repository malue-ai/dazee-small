      - 修改重要配置

      - 执行不可逆操作

      - 选择方案/参数


      工作机制：

      1. LLM 调用此工具 → 发送 SSE 事件到前端

      2. 前端显示确认对话框

      3. 用户通过 HTTP POST 提交响应

      4. 工具获取响应后返回给 LLM

