- name: exa_search
  type: TOOL
  subtype: CUSTOM
  provider: user
  level: 2
  cache_stable: true
  compaction:
    strategy: custom
    max_size: 3000
    summary_chars: 200
  implementation:
    module: tools.exa_search
    class: ExaSearchTool
  capabilities:
  - information_retrieval
  - web_search
  - semantic_search
  - research
  priority: 90
  cost:
    time: fast
    money: low
  constraints:
    requires_api: true
    requires_network: true
    api_name: exa
  metadata:
    description: High-quality semantic search using Exa API with content extraction
    keywords:
    - search
    - research
    - semantic
    - web
    - papers
    - news
    - articles
    note: 比web_search更强大，支持语义理解和内容提取
  input_schema:
    type: object
    properties:
      query:
        type: string
        description: 搜索查询（支持自然语言）
      num_results:
        type: integer
        description: 返回结果数量（1-10，默认10）
        default: 10
      category:
        type: string
        description: 内容分类过滤
        enum:
        - papers
        - news
        - github
        - company
        - personal_site
        - pdf
        - tweet
      include_text:
        type: boolean
        description: 是否包含网页正文内容
        default: true
      start_published_date:
        type: string
        description: 开始发布日期（ISO格式，如'2024-01-01'）
    required:
    - query
- name: ppt_generator
  type: TOOL
  subtype: CUSTOM
  provider: user
  level: 2
  cache_stable: false
  implementation:
    module: tools.ppt_generator
    class: PPTGeneratorTool
  capabilities:
  - ppt_generation
  - content_generation
  - web_search
  - data_analysis
  priority: 95
  cost:
    time: medium
    money: low
  constraints:
    requires_api: true
    requires_network: true
    api_name: slidespeak
  metadata:
    description: '高质量闭环PPT生成工具 - 整合素材搜索、内容规划、PPT渲染的完整流程。

      🎯 核心能力：
      - 自动搜索相关素材（可选）
      - 智能内容规划
      - 专业PPT渲染（SlideSpeak API）
      - 多重质量检查

      📋 使用场景：
      - 基于主题快速生成专业PPT
      - 需要搜索最新资料的报告
      - 高质量演示文稿

      ⚡ 完整流程：
      1. 需求分析 → 2. 素材搜集 → 3. 内容规划 → 4. PPT渲染 → 5. 质量检查 → 6. 交付
      '
    preferred_for:
    - 高质量PPT生成
    - 需要搜索素材的报告
    - 专业演示文稿
    - 闭环PPT任务
    keywords:
    - ppt
    - 演示
    - 高质量
    - 闭环
    - 报告
    - presentation
  input_schema:
    type: object
    properties:
      topic:
        type: string
        description: PPT主题/标题（必需）
      description:
        type: string
        description: 详细需求描述，包括受众、目的、重点内容等
      search_queries:
        type: array
        items:
          type: string
        description: 搜索查询列表（可选）。提供后会自动搜索素材
      style:
        type: string
        enum:
        - professional
        - academic
        - creative
        - minimal
        - corporate
        description: PPT风格。默认：professional
        default: professional
      slide_count:
        type: integer
        description: 期望的幻灯片数量（不含封面和结尾）。默认：8-12
        minimum: 5
        maximum: 30
      language:
        type: string
        enum:
        - CHINESE
        - ENGLISH
        - ORIGINAL
        description: PPT语言。默认：根据内容自动判断
        default: ORIGINAL
      time_context:
        type: string
        description: 时间上下文，如'2024年'、'最近一年'。影响搜索时效性
      audience:
        type: string
        description: 目标受众，如'技术团队'、'管理层'、'投资人'
      custom_outline:
        type: array
        items:
          type: string
        description: 自定义大纲（可选）。提供后将按此结构生成
      include_charts:
        type: boolean
        description: 是否包含图表。默认：true
        default: true
      include_images:
        type: boolean
        description: 是否包含图片。默认：true
        default: true
      materials:
        type: array
        description: 预提供的素材（可选）。如已有搜索结果，可直接传入
        items:
          type: object
          properties:
            title:
              type: string
            content:
              type: string
            source:
              type: string
            date:
              type: string
    required:
    - topic
- name: slidespeak_render
  type: TOOL
  subtype: CUSTOM
  provider: user
  implementation:
    module: tools.slidespeak
    class: SlideSpeakTool
  capabilities:
  - ppt_rendering
  - ppt_generation
  - api_calling
  priority: 40
  cost:
    time: medium
    money: low
  constraints:
    requires_api: true
    api_name: slidespeak
  metadata:
    description: SlideSpeak API rendering tool for professional PPT generation
    note: 🎨 Generates high-quality presentations with professional layouts and designs
    used_by: slidespeak-generator
    keywords:
    - ppt
    - presentation
    - slidespeak
    - professional
    - 专业
  input_schema:
    type: object
    properties:
      config:
        type: object
        description: 完整的SlideSpeak配置。参考：https://docs.slidespeak.co/basics/api-references/slide-by-slide/
        properties:
          template:
            type: string
            description: 模板名称，如'DEFAULT'。查看可用模板：GET /api/v1/templates
          language:
            type: string
            description: 语言代码，如'CHINESE'、'ENGLISH'。默认：'ORIGINAL'（从内容推断）
          fetch_images:
            type: boolean
            description: 是否包含库存图片。默认：true
          verbosity:
            type: string
            enum:
            - concise
            - standard
            - text-heavy
            description: 文本详细程度。默认：'standard'
          include_cover:
            type: boolean
            description: 是否包含封面。默认：true
          include_table_of_contents:
            type: boolean
            description: 是否包含目录。默认：true
          add_speaker_notes:
            type: boolean
            description: 是否添加演讲者备注。默认：false
          slides:
            type: array
            description: 幻灯片配置数组，每个slide必须包含layout、title、item_amount和content
            items:
              type: object
              properties:
                title:
                  type: string
                  description: 幻灯片标题（简洁，8-15字）
                layout:
                  type: string
                  enum:
                  - ITEMS
                  - BIG_NUMBER
                  - COMPARISON
                  - TIMELINE
                  - TABLE
                  - CHART
                  - SWOT
                  - PESTEL
                  - THANKS
                  description: 布局类型（必选）。根据内容类型选择最合适的布局
                item_amount:
                  type: integer
                  description: 项目数量
                content:
                  type: string
                  description: 幻灯片内容
                images:
                  type: array
                  description: 可选：图片配置（目前仅支持单图布局，只使用第一张图片）
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum:
                        - stock
                        - url
                        - ai
                        description: 图片来源：stock=库存搜索（推荐）, url=直接链接, ai=AI生成
                      data:
                        type: string
                        description: stock=英文搜索关键词 | url=图片URL | ai=生成提示
                    required:
                    - type
                    - data
                chart:
                  type: object
                  description: 可选：图表配置（仅CHART布局需要）。参考：https://docs.slidespeak.co/basics/layouts/charts/
                table:
                  type: array
                  description: 可选：表格数据（仅TABLE布局需要）。二维字符串数组，第一行为表头
                  items:
                    type: array
                    items:
                      type: string
              required:
              - title
              - layout
              - item_amount
              - content
        required:
        - template
        - slides
      save_dir:
        type: string
        description: 保存PPT文件的目录路径（可选，默认./workspace/outputs/ppt）
    required:
    - config
- name: request_human_confirmation
  type: TOOL
  subtype: CUSTOM
  provider: user
  implementation:
    module: tools.request_human_confirmation
    class: RequestHumanConfirmationTool
  capabilities:
  - human_interaction
  - confirmation
  - hitl
  - user_approval
  priority: 100
  cost:
    time: variable
    money: free
  constraints:
    requires_api: false
    requires_user_interaction: true
  metadata:
    description: '请求用户确认操作。适用于以下场景：

      - 删除文件或数据等危险操作

      - 修改重要配置

      - 执行不可逆操作

      - 需要用户选择方案或参数

      - 任何需要人工干预的决策


      调用此工具后，会暂停执行并等待用户响应。

      用户可以确认、取消或选择其他选项。

      '
    preferred_for:
    - 危险操作确认
    - 重要决策审批
    - 方案选择
    - 参数确认
    keywords:
    - 确认
    - 授权
    - 人工干预
    - HITL
    - 审批
    - 选择
    note: '使用场景：

      - 删除文件/数据

      - 修改重要配置

      - 执行不可逆操作

      - 选择方案/参数


      工作机制：

      1. LLM 调用此工具 → 发送 SSE 事件到前端

      2. 前端显示确认对话框

      3. 用户通过 HTTP POST 提交响应

      4. 工具获取响应后返回给 LLM

      '
  input_schema:
    type: object
    properties:
      question:
        type: string
        description: 要询问用户的问题，应该清晰描述操作内容和影响
      options:
        type: array
        items:
          type: string
        description: 可选项列表，默认 ['confirm', 'cancel']。可以自定义选项如 ['商务风格', '学术风格', '创意风格']
        default:
        - confirm
        - cancel
      timeout:
        type: integer
        description: 超时时间（秒），默认 60 秒
        default: 60
      confirmation_type:
        type: string
        enum:
        - yes_no
        - single_choice
        - multiple_choice
        - text_input
        description: 确认类型，默认 yes_no
        default: yes_no
      metadata:
        type: object
        description: 额外信息，用于前端展示（如操作详情、影响范围等）
    required:
    - question
- name: plan_todo
  type: TOOL
  subtype: SESSION
  provider: system
  level: 1
  cache_stable: true
  implementation:
    module: tools.plan_todo_tool
    class: PlanTodoTool
  capabilities:
  - task_planning
  - progress_tracking
  - session_memory
  - plan_crud
  - todo_crud
  - replan
  - adaptive_planning
  priority: 95
  cost:
    time: instant
    money: free
  constraints:
    requires_api: false
    session_scoped: true
  metadata:
    description: '任务规划工具（智能版本）- 内部调用 Claude + Extended Thinking


      核心能力：

      - create_plan: 智能生成任务计划（调用 Claude + Extended Thinking）

      - update_step: 更新步骤状态

      - add_step: 动态添加步骤

      - replan: 🆕 重新生成计划（保留已完成步骤或全量重规划）

      - get_plan: 获取当前计划状态


      重新规划（replan）触发场景：

      - 多个步骤连续失败

      - 发现原计划遗漏关键信息

      - 用户需求发生变化

      - 执行过程中发现更优方案


      策略选项：

      - incremental: 保留已完成步骤，只重新生成剩余步骤（默认）

      - full: 全量重新生成计划

      '
    keywords:
    - plan
    - todo
    - 计划
    - 任务
    - 进度
    - replan
    - 重新规划
    - 自适应
    note: 'V4.2.1 新增 replan 能力：

      - Claude 可在 RVR 循环中自主决定是否调用 replan

      - 支持 incremental（增量）和 full（全量）两种重规划策略

      - 最大重规划次数限制：3 次

      '
  input_schema:
    type: object
    properties:
      operation:
        type: string
        description: 操作类型
        enum:
        - create_plan
        - update_step
        - get_plan
        - add_step
        - replan
        - clear
      data:
        type: object
        description: 操作数据
        properties:
          user_query:
            type: string
            description: 用户原始需求（create_plan 时必需）
          goal:
            type: string
            description: 任务目标（create_plan 可选，会自动生成）
          steps:
            type: array
            description: 步骤列表（create_plan 可选，会自动生成）
          step_index:
            type: integer
            description: 步骤索引（update_step 时必需）
          status:
            type: string
            description: 步骤状态（update_step 时必需）
            enum:
            - pending
            - in_progress
            - completed
            - failed
          result:
            type: string
            description: 步骤结果（update_step 时可选）
          reason:
            type: string
            description: 重新规划原因（replan 时必需）
          strategy:
            type: string
            description: 重规划策略（replan 时可选）
            enum:
            - full
            - incremental
            default: incremental
    required:
    - operation
