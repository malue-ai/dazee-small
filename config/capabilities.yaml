      将沙盒中的文件上传到 S3 并返回下载链接。
      
      用途：
      - 将沙盒中生成的文件（Excel、PDF、图片等）持久化存储
      - 让前端用户可以下载沙盒中生成的文件
      
      典型工作流：
      1. sandbox_execute_python 生成文件
      2. sandbox_upload_file 上传到 S3 获取 URL
      3. send_files 发送下载链接给前端
