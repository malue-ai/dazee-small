- name: document_partition_tool
  type: TOOL
  subtype: CUSTOM
  provider: user
  invocation_hint: DIRECT
  level: 1
  cache_stable: true  # 相同文档的解析结果可以缓存
  implementation:
    module: tools.partition
    class: DocumentPartitionTool
  capabilities:
  - document_creation
  - file_conversion
  - document_parsing
  - content_extraction
  priority: 75
  cost:
    time: medium
    money: paid  # 调用外部 API，需要付费
  constraints:
    requires_api: true
    requires_network: true
    api_name: unstructured
    api_key_env: UNSTRUCTURED_API_KEY
  metadata:
    description: '文档解析工具 - 将网络文档转为结构化数据（基于 Unstructured Partition API）

      核心功能：
      • ✅ 解析多种格式：PDF、Word(.docx)、PowerPoint(.pptx)、Excel(.xlsx)、文本等
      • ✅ 仅支持 URL 输入（不支持本地文件路径）
      • ✅ 智能解析策略（auto/fast/hi_res）
      • ✅ 自动缓存解析结果（可配置）
      • ✅ 提取文字、表格、标题等结构化元素
      
      解析策略：
      • auto：自动选择最佳策略（推荐）
      • fast：快速提取纯文本（适合简单文档）
      • hi_res：高精度解析（适合复杂文档，含表格、图表）
      
      输出格式：
      • json：结构化 JSON 格式（包含元素类型、文本、元数据）
      • text：纯文本拼接（适合直接阅读）
      
      环境变量配置：
      • UNSTRUCTURED_API_KEY：必需，API 密钥
      • UNSTRUCTURED_API_URL：可选，API 地址
      • PARTITION_CACHE_ENABLED：可选，是否启用缓存（true/false）
      • PARTITION_CACHE_DIR：可选，缓存目录路径
      '
    preferred_for:
    - 解析文档内容
    - 提取 PDF 文字
    - 分析 Word 文档
    - 提取 PPT 内容
    - 文档格式转换
    - 批量文档处理
    keywords:
    - 文档
    - 解析
    - PDF
    - Word
    - PPT
    - docx
    - pptx
    - 提取
    - 分析
    - Partition
    note: '使用 Unstructured Partition API，需要配置 UNSTRUCTURED_API_KEY。仅支持 URL 输入，不支持本地文件路径。支持缓存以节省 API 调用。'
  input_schema:
    type: object
    properties:
      source:
        type: string
        description: 文档URL（必需），如 'https://example.com/doc.pdf'。仅支持HTTP/HTTPS协议，不支持本地文件路径
      strategy:
        type: string
        description: 解析策略
        enum:
        - auto
        - fast
        - hi_res
        default: auto
      use_cache:
        type: boolean
        description: 是否使用缓存（重复解析相同文档时可加速）
        default: true
      output_format:
        type: string
        description: 输出格式
        enum:
        - json
        - text
        default: json
    required:
    - source
  result_compaction:
    enabled: true
    strategy: summarize
    max_length: 2000
    trigger_condition:
      element_count_gt: 100  # 超过 100 个元素时精简
- name: clue_generation
  type: TOOL
  subtype: CUSTOM
  provider: user
  invocation_hint: DIRECT
  level: 2  # 降级为动态工具，按需加载
  cache_stable: false
  implementation:
    module: tools.clue_generation
    class: ClueGenerationTool
  capabilities:
  - user_guidance
  - task_suggestion
  - conversation_analysis
  priority: 80
  cost:
    time: fast
    money: low
  constraints:
    requires_api: false
  metadata:
    description: |
      提交后续操作建议（线索），工具负责验证和格式化。
      
      **何时使用此工具**：
      1. 完成用户的主要任务后，需要提供延伸操作建议时
      2. 助手给出了可转发/分享的内容（如报告、方案、总结）
      3. 对话中存在需要用户确认或做出选择的情况
      4. 用户的问题需要后续跟进操作
      5. 生成了文件、报告等交付物，需要引导用户下一步操作
      
      **不要使用的情况**：
      - 简单的问答对话（用户只是咨询问题）
      - 对话尚未完成，还在执行中
      - 用户明确表示不需要更多帮助
      
      **线索类型（act）**：
      - reply: 需要用户回复确认的问题
      - forward: 可以转发/分享的内容
      - confirm: 需要用户确认的操作
      - upload: 需要用户上传文件
    preferred_for:
    - 任务完成后的延伸建议
    - 引导用户下一步操作
    - 生成可操作的建议列表
    keywords:
    - 线索
    - 建议
    - 操作
    - 后续
    - clue
    - suggestion
    note: |
      工具会自动通过 SSE 将线索推送到前端，前端会渲染为可点击的操作按钮。
      每次最多生成 4 个线索，每个线索文本不超过 30 字。
  input_schema:
    type: object
    properties:
      tasks:
        type: array
        description: 线索列表，由 Agent 直接生成
        items:
          type: object
          properties:
            text:
              type: string
              description: 线索描述文本（不超过 30 字）
            act:
              type: string
              description: 操作类型
              enum:
              - reply
              - forward
              - confirm
              - upload
              default: reply
            id:
              type: string
              description: 线索 ID（可选，不提供则自动生成）
            payload:
              type: object
              description: 附加数据（可选）
          required:
          - text
    required:
    - tasks

# ==================== Nodes 工具 ====================
- name: nodes
  type: TOOL
  subtype: CUSTOM
  provider: user
  invocation_hint: DIRECT
  level: 1  # 核心工具
  cache_stable: true
  implementation:
    module: tools.nodes_tool
    class: NodesTool
  capabilities:
  - system_control
  - command_execution
  - notification
  priority: 80
  cost:
    time: fast
    money: free
  constraints:
    requires_api: false
  metadata:
    description: |
      发现和操作本地/远程节点。
      
      **Actions**:
      - status: 列出所有节点状态
      - describe: 获取节点详细信息
      - run: 在节点上执行 shell 命令
      - notify: 发送系统通知到节点
      - which: 检查可执行文件是否存在
      
      **示例**:
      - nodes status: 查看所有节点状态
      - nodes run --command ["ls", "-la"]: 执行命令
      - nodes notify --title "提醒" --message "任务完成"
      - nodes which --executable "python3": 检查 python3 是否存在
    preferred_for:
    - 执行系统命令
    - 发送系统通知
    - 检查可执行文件
  input_schema:
    type: object
    properties:
      action:
        type: string
        enum:
        - status
        - describe
        - run
        - notify
        - which
        description: 操作类型
      node:
        type: string
        description: 目标节点 ID（默认 'local'）
        default: local
      command:
        type: array
        items:
          type: string
        description: 要执行的命令（run action）
      cwd:
        type: string
        description: 工作目录（run action）
      env:
        type: object
        description: 环境变量（run action）
      timeout_ms:
        type: integer
        description: 超时毫秒数
        default: 30000
      title:
        type: string
        description: 通知标题（notify action）
      message:
        type: string
        description: 通知内容（notify action）
      subtitle:
        type: string
        description: 通知副标题（notify action）
      executable:
        type: string
        description: 可执行文件名（which action）
    required:
    - action

