- name: hitl
  type: TOOL
  subtype: CUSTOM
  provider: user
  level: 1
  implementation:
    module: tools.request_human_confirmation
    class: HITLTool
  capabilities:
  - human_interaction
  - confirmation
  - hitl
  - user_approval
  priority: 100
  cost:
    time: variable
    money: free
  constraints:
    requires_api: false
    requires_user_interaction: true
  metadata:
    description: '请求用户确认操作。适用于以下场景：

      - 删除文件或数据等危险操作

      - 修改重要配置

      - 执行不可逆操作

      - 需要用户选择方案或参数

      - 任何需要人工干预的决策


      调用此工具后，会暂停执行并等待用户响应。

      用户可以确认、取消或选择其他选项。

      '
    preferred_for:
    - 危险操作确认
    - 重要决策审批
    - 方案选择
    - 参数确认
    keywords:
    - 确认
    - 授权
    - 人工干预
    - HITL
    - 审批
    - 选择
    note: '使用场景：

      - 删除文件/数据

      - 修改重要配置

      - 执行不可逆操作

      - 选择方案/参数


      工作机制：

      1. LLM 调用此工具 → 发送 SSE 事件到前端

      2. 前端显示确认对话框

      3. 用户通过 HTTP POST 提交响应

      4. 工具获取响应后返回给 LLM

      '
  input_schema:
    type: object
    properties:
      type:
        type: string
        enum:
        - form
        description: HITL 交互类型（目前仅支持 form）
        default: form
      title:
        type: string
        description: 表单标题，简要说明本次交互的目的
      description:
        type: string
        description: 表单描述，补充说明或上下文信息
      questions:
        type: array
        description: |
          问题数组。支持两种问题类型：
          - single_choice: 单选（包括 yes/no 确认，options 文本可自定义）
          - multiple_choice: 多选
        items:
          type: object
          properties:
            id:
              type: string
              description: 问题唯一标识，用于返回结果的 key
            label:
              type: string
              description: 问题标签/显示文本
            type:
              type: string
              enum:
              - single_choice
              - multiple_choice
              # - text_input  # 暂未支持
              description: 问题类型
            options:
              type: array
              items:
                type: string
              description: 选项列表（single_choice/multiple_choice 必需），文本可自定义如 ["确认删除", "取消操作"]
            default:
              type: string
              description: 默认选中值
            required:
              type: boolean
              description: 是否必填
              default: true
            # hint:  # 暂未支持
            #   type: string
            #   description: 输入提示/占位符（text_input 用）
          required:
          - id
          - label
          - type
      timeout:
        type: integer
        description: 超时时间（秒），默认 120 秒
        default: 120
    required:
    - title
    - questions

- name: plan
  type: TOOL
  subtype: SESSION
  provider: user
  invocation_hint: DIRECT
  level: 1
  cache_stable: true
  implementation:
    module: tools.plan_todo_tool
    class: PlanTool
  capabilities:
  - task_planning
  - progress_tracking
  priority: 95
  cost:
    time: fast
    money: free
  constraints:
    requires_api: false
    session_scoped: true
  metadata:
    description: |
      任务计划管理工具 v2
      
      数据结构：
      - 顶层：name, overview（一句话目标）, plan（详细计划文档）, todos
      - todo：id, title（步骤标题）, content（详细描述）, status, result
      
      action 说明：
      - create: 创建新计划，需要 name + todos，可选 overview + plan
      - update: 更新步骤状态，需要 todo_id + status，可选 result
      - rewrite: 重写整个计划，需要 name + todos，可选 overview + plan
    keywords:
    - plan
    - 计划
    - 任务
    - 进度
  input_schema:
    type: object
    properties:
      action:
        type: string
        description: 操作类型
        enum: [create, update, rewrite]
      name:
        type: string
        description: 计划名称（create/rewrite 时必需）
      overview:
        type: string
        description: 一句话目标摘要（create/rewrite 时可选，会注入 prompt）
      plan:
        type: string
        description: 详细计划文档（create/rewrite 时可选，仅存储不注入 prompt）
      todos:
        type: array
        description: 步骤列表（create/rewrite 时必需）
        items:
          type: object
          properties:
            id:
              type: string
              description: 步骤 ID
            title:
              type: string
              description: 步骤标题（简短，会注入 prompt）
            content:
              type: string
              description: 步骤详细描述（可选，仅存储不注入 prompt）
            status:
              type: string
              default: pending
              enum: [pending, in_progress, completed, failed]
          required: [title]
      todo_id:
        type: string
        description: 步骤 ID（update 时必需）
      status:
        type: string
        description: 新状态（update 时必需）
        enum: [pending, in_progress, completed, failed]
      result:
        type: string
        description: 完成结果说明（update 时可选）
    required: [action]
