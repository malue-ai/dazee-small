  # ==================== Session Tools (会话级工具) ====================
  #
  # 架构关系（参考图示）：
  #   User Query → Agent → (载入/写入) → Short Memory → (CRUD) → plan_todo Tool
  #                          ↓
  #                    LLM 生成 plan.json 和 todo.md
  #                          ↓
  #                    调用工具后写入 Memory
  #
  # 核心原则：写入 Short Memory 避免多轮 input/output 的 LLM tokens 消耗
  
  - name: plan_todo
    type: TOOL
    subtype: SESSION
    provider: system
    
    # 工具实现配置
    implementation:
      module: "agent_v3.tools.plan_todo_tool"
      class: "PlanTodoTool"
    
    capabilities:
      - task_planning
      - progress_tracking
      - session_memory
      - plan_crud          # 🆕 Plan CRUD 操作
      - todo_crud          # 🆕 Todo CRUD 操作
    priority: 95  # 高优先级，让LLM优先考虑使用
    cost:
      time: instant
      money: free
    constraints:
      requires_api: false
      session_scoped: true  # 会话级别，不持久化
    metadata:
      description: |
        任务规划工具 - 存储到 WorkingMemory（Short Memory）
        
        架构特点：
        - plan.json 和 todo.md 存储在 Short Memory，避免多轮 tokens 消耗
        - LLM 通过 CRUD 操作管理计划，不需要每次传递完整计划
        - Agent 在执行前从 Memory 读取计划上下文
        
        输出格式：
        - plan_json: JSON 格式（内部 RVR 调度）
        - todo_md: Markdown 格式（状态追踪 + 用户展示）
        - display: 终端友好的即时反馈
      keywords:
        - plan
        - todo
        - 计划
        - 任务
        - 进度
        - short_memory
        - crud
      note: "存储在 WorkingMemory 中，会话结束后自动清除"
    input_schema:
      type: object
      properties:
        operation:
          type: string
          description: "CRUD 操作类型"
          enum: ["create_plan", "update_step", "get_plan", "add_step", "clear"]
        data:
          type: object
          description: "操作数据"
          properties:
            goal:
              type: string
              description: "任务目标（create_plan）"
            steps:
              type: array
              description: "步骤列表（create_plan）"
            step_index:
              type: integer
              description: "步骤索引（update_step）"
            status:
              type: string
              description: "步骤状态（update_step）"
              enum: ["pending", "in_progress", "completed", "failed"]
            result:
              type: string
              description: "步骤结果（update_step）"
      required:
        - operation

  # ==================== Code as Tools ====================
  
  - name: code_execution
    type: CODE
    subtype: DYNAMIC
    provider: anthropic
    capabilities:
      - dynamic_execution
      - custom_logic
      - api_exploration
    priority: 40
    cost:
      time: variable
      money: free
    constraints:
      requires_api: false
    metadata:
      description: "Execute Python code dynamically via code_execution"
      preferred_for:
        - exploration
        - custom logic
        - API investigation
        - one-off tasks
      keywords:
        - 探索
        - 自定义
        - 动态

# ============================================================
# 配置说明
# ============================================================
#
# 字段说明:
#   name: 能力名称（唯一标识符）
#   type: 能力类型 (SKILL/TOOL/MCP/CODE)
#   subtype: 子类型 (PREBUILT/CUSTOM/NATIVE/EXTERNAL/DYNAMIC)
#   provider: 提供者 (anthropic/user/system/external)
#   capabilities: 能力标签列表（用于匹配用户请求）
#   priority: 基础优先级 (0-100)
#   cost:
#     time: 执行时间 (fast/medium/slow)
#     money: 成本 (free/low/medium/high)
#   constraints: 约束条件
#     requires_api: 是否需要外部API
#     api_name: API名称
#     requires_auth: 是否需要认证
#     min_quality: 最低质量要求 (low/medium/high)
#   metadata: 扩展信息
#     description: 描述
#     preferred_for: 优先使用场景
#     keywords: 关键词列表
#
# 添加新能力:
#   1. 复制上面的模板
#   2. 修改name和capabilities
#   3. 调整priority（参考其他同类能力）
#   4. 填写metadata.preferred_for和keywords
#   5. 保存后重启Agent

