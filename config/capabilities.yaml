- name: sandbox_init_project
  type: TOOL
  subtype: CUSTOM
  provider: user
  level: 1
  implementation:
    module: tools.sandbox_tools
    class: SandboxInitProject
  capabilities:
  - sandbox_file_operations
  - content_writing
  priority: 95
  cost:
    time: fast
    money: free
  constraints:
    requires_api: true
    api_name: e2b
    session_scoped: true
  metadata:
    description: |
      【神器】一键初始化专业项目脚手架（包含前端+后端+设计文档）。
      
      【强烈推荐】
      开发任何系统/应用前，先用这个工具初始化项目！模板包含：
      - 完整的目录结构（components/、pages/、hooks/、lib/）
      - 前后端分离架构
      - TypeScript 类型定义
      - TailwindCSS 样式
      - IDEAS.md 设计文档（帮你理解项目结构）
      
      【支持的模板】
      1. react_fullstack (推荐): Vite + React + TypeScript + TailwindCSS + Express
         - 前端端口: 5173
         - 后端端口: 3000
      
      【使用方法】
      1. 调用 sandbox_init_project(template="react_fullstack")
      2. 工具自动写入所有文件（package.json, 组件, 页面, API 等）
      3. 查看返回的 startup_hint 执行启动命令
      4. 阅读 IDEAS.md 了解项目结构
      5. 在现有代码基础上修改业务逻辑
      
      【关键优势】
      - 不用从零写代码，在成熟脚手架上"装修"
      - 保证有完整的前端界面（用户能看到）
      - 目录结构清晰，便于维护
    keywords: [sandbox, 沙盒, 初始化, 模板, 脚手架, react, vite, typescript]
  input_schema:
    type: object
    properties:
      conversation_id: {type: string, description: 对话 ID}
      template: {type: string, description: 模板名称 (react_fullstack | node_fullstack | static_html), default: react_fullstack}
    required: [conversation_id]
- name: document_partition_tool
  type: TOOL
  subtype: CUSTOM
  provider: user
  invocation_hint: DIRECT
  level: 1
  cache_stable: true  # 相同文档的解析结果可以缓存
  implementation:
    module: tools.partition
    class: DocumentPartitionTool
  capabilities:
  - document_creation
  - file_conversion
  - document_parsing
  - content_extraction
  priority: 75
  cost:
    time: medium
    money: paid  # 调用外部 API，需要付费
  constraints:
    requires_api: true
    requires_network: true
    api_name: unstructured
    api_key_env: UNSTRUCTURED_API_KEY
  metadata:
    description: '文档解析工具 - 将网络文档转为结构化数据（基于 Unstructured Partition API）

      核心功能：
      • ✅ 解析多种格式：PDF、Word(.docx)、PowerPoint(.pptx)、Excel(.xlsx)、文本等
      • ✅ 仅支持 URL 输入（不支持本地文件路径）
      • ✅ 智能解析策略（auto/fast/hi_res）
      • ✅ 自动缓存解析结果（可配置）
      • ✅ 提取文字、表格、标题等结构化元素
      
      解析策略：
      • auto：自动选择最佳策略（推荐）
      • fast：快速提取纯文本（适合简单文档）
      • hi_res：高精度解析（适合复杂文档，含表格、图表）
      
      输出格式：
      • json：结构化 JSON 格式（包含元素类型、文本、元数据）
      • text：纯文本拼接（适合直接阅读）
      
      环境变量配置：
      • UNSTRUCTURED_API_KEY：必需，API 密钥
      • UNSTRUCTURED_API_URL：可选，API 地址
      • PARTITION_CACHE_ENABLED：可选，是否启用缓存（true/false）
      • PARTITION_CACHE_DIR：可选，缓存目录路径
      '
    preferred_for:
    - 解析文档内容
    - 提取 PDF 文字
    - 分析 Word 文档
    - 提取 PPT 内容
    - 文档格式转换
    - 批量文档处理
    keywords:
    - 文档
    - 解析
    - PDF
    - Word
    - PPT
    - docx
    - pptx
    - 提取
    - 分析
    - Partition
    note: '使用 Unstructured Partition API，需要配置 UNSTRUCTURED_API_KEY。仅支持 URL 输入，不支持本地文件路径。支持缓存以节省 API 调用。'
  input_schema:
    type: object
    properties:
      source:
        type: string
        description: 文档URL（必需），如 'https://example.com/doc.pdf'。仅支持HTTP/HTTPS协议，不支持本地文件路径
      strategy:
        type: string
        description: 解析策略
        enum:
        - auto
        - fast
        - hi_res
        default: auto
      use_cache:
        type: boolean
        description: 是否使用缓存（重复解析相同文档时可加速）
        default: true
      output_format:
        type: string
        description: 输出格式
        enum:
        - json
        - text
        default: json
    required:
    - source
  result_compaction:
    enabled: true
    strategy: summarize
    max_length: 2000
    trigger_condition:
      element_count_gt: 100  # 超过 100 个元素时精简