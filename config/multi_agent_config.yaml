# 多智能体配置文件
# V7.1: 强弱配对策略（Anthropic 启发）

# 默认配置：Opus 4.5 (Orchestrator) + Sonnet 4.5 (Workers)
default:
  orchestrator:
    model: "claude-opus-4-5-20251101"
    enable_thinking: true
    max_tokens: 16384
    thinking_budget: 10000
    temperature: 0.3
  
  worker:
    model: "claude-sonnet-4-5-20250929"
    enable_thinking: true
    max_tokens: 8192
    thinking_budget: 5000
    temperature: 0.5
  
  execution:
    max_total_turns: 30
    timeout_seconds: 300
    enable_final_summary: true
    fail_fast: false
    retry_on_failure: true
    max_retries: 2

# 成本优化配置：Sonnet (Orchestrator) + Haiku (Workers)
cost_optimized:
  orchestrator:
    model: "claude-sonnet-4-5-20250929"
    enable_thinking: false
    max_tokens: 8192
    temperature: 0.3
  
  worker:
    model: "claude-haiku-4"
    enable_thinking: false
    max_tokens: 4096
    temperature: 0.5
  
  execution:
    max_total_turns: 20
    timeout_seconds: 180
    enable_final_summary: true
    fail_fast: true
    retry_on_failure: false
    max_retries: 0

# 高质量配置：Opus 4.5 (Orchestrator) + Opus 4.5 (Workers)
high_quality:
  orchestrator:
    model: "claude-opus-4-5-20251101"
    enable_thinking: true
    max_tokens: 16384
    thinking_budget: 10000
    temperature: 0.2
  
  worker:
    model: "claude-opus-4-5-20251101"
    enable_thinking: true
    max_tokens: 16384
    thinking_budget: 10000
    temperature: 0.3
  
  execution:
    max_total_turns: 50
    timeout_seconds: 600
    enable_final_summary: true
    fail_fast: false
    retry_on_failure: true
    max_retries: 3

# 快速原型配置：Sonnet (Orchestrator) + Sonnet (Workers)
prototype:
  orchestrator:
    model: "claude-sonnet-4-5-20250929"
    enable_thinking: false
    max_tokens: 4096
    temperature: 0.5
  
  worker:
    model: "claude-sonnet-4-5-20250929"
    enable_thinking: false
    max_tokens: 4096
    temperature: 0.7
  
  execution:
    max_total_turns: 15
    timeout_seconds: 120
    enable_final_summary: false
    fail_fast: true
    retry_on_failure: false
    max_retries: 0
