  #   # 自定义输出格式模板
  #   template:
  #     event_type: "{{ type }}"
  #     payload: "{{ data }}"
  #     source: "zenflux"
  #     session: "{{ session_id }}"
  #     timestamp: "{{ timestamp }}"

