# ==================== 外部事件订阅配置 ====================
#
# 配置 Zenflux Agent 向外部系统发送事件通知
#
# 支持的适配器类型：
# - webhook: 通用 Webhook（支持自定义模板）
# - slack: Slack 机器人
# - dingtalk: 钉钉机器人
# - feishu: 飞书机器人
#
# 支持的事件类型：
# - session_start, session_end, session_stopped
# - conversation_start, conversation_delta, conversation_stop
# - message_start, message_delta, message_stop
# - content_start, content_delta, content_stop
# - error, done
# - message_delta:confirmation_request  (HITL 确认请求)
# - message_delta:plan                  (计划更新)
# - message_delta:recommended           (推荐问题)
#
# 使用 "*" 订阅所有事件（不推荐，会产生大量请求）
# ============================================================

subscriptions:
  # ==================== 示例 1: Slack ====================
  # - name: "slack_notifications"
  #   adapter: "slack"
  #   endpoint: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
  #   enabled: false
  #   channel: "#agent-notifications"  # 可选
  #   events:
  #     - "message_delta:confirmation_request"
  #     - "session_end"
  #     - "error"
  #   timeout: 5.0
  #   retry_count: 2

  # ==================== 示例 2: 钉钉 ====================
  # - name: "dingtalk_alerts"
  #   adapter: "dingtalk"
  #   endpoint: "https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN"
  #   enabled: false
  #   at_mobiles: []           # 需要 @ 的手机号
  #   at_all: false            # 是否 @ 所有人
  #   events:
  #     - "message_delta:confirmation_request"
  #     - "error"
  #   timeout: 5.0
  #   retry_count: 2

  # ==================== 示例 3: 飞书 ====================
  # - name: "feishu_notifications"
  #   adapter: "feishu"
  #   endpoint: "https://open.feishu.cn/open-apis/bot/v2/hook/YOUR_HOOK_ID"
  #   enabled: false
  #   at_users: []             # 需要 @ 的用户 ID
  #   events:
  #     - "message_delta:confirmation_request"
  #     - "session_end"
  #   timeout: 5.0
  #   retry_count: 2

  # ==================== 示例 4: 自定义 Webhook ====================
  # - name: "custom_erp"
