# ============================================================
# LLM 调用配置文件示例（含多模型容灾配置）
# ============================================================
#
# 🆕 V7.10+ 新增功能：
# - 多模型容灾（fallbacks）
# - 健康监控与熔断
# - 后台异步探测
#
# 使用方式：
#   1. 复制此文件为 profiles.yaml
#   2. 根据实际情况修改配置
#   3. 配置环境变量中的 API Key
#
# ============================================================

# ==================== 健康探测全局配置 ====================
health_probe:
  # 条件探测（V7.11：后台健康则跳过，不健康则确认）
  request_probe:
    timeout_seconds: 5.0
    max_retries: 1
  
  # 后台健康探测（定期探测所有模型）
  background_probe:
    enabled: true
    interval_seconds: 120  # 2 分钟探测一次
    timeout_seconds: 10
    profiles:
      - main_agent
      - intent_analyzer

# ============================================================
# Profile 配置
# ============================================================

profiles:
  # ==================== 主 Agent 对话（多模型容灾示例）====================
  main_agent:
    description: "主 Agent 对话处理，支持多模型容灾"
    
    # 主模型配置
    provider: "claude"
    model: "claude-sonnet-4-5-20250929"
    api_key_env: "ANTHROPIC_API_KEY"  # 主 API Key
    base_url: "https://api.anthropic.com"  # 可选
    max_tokens: 64000
    temperature: 1.0
    enable_thinking: true
    thinking_budget: 10000
    enable_caching: true
    timeout: 120.0
    max_retries: 3
    
    # 🆕 V7.10: 备选模型列表（按优先级排序）
    fallbacks:
      # 优先级 1：同模型，Provider A（备用账号/代理商）
      - provider: "claude"
        model: "claude-sonnet-4-5-20250929"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
        max_tokens: 64000
        temperature: 1.0
        enable_thinking: true
        thinking_budget: 10000
        enable_caching: true
        timeout: 120.0
        max_retries: 3
      
      # 优先级 2：同模型，Provider B（另一代理商）
      - provider: "claude"
        model: "claude-sonnet-4-5-20250929"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://anthropic-proxy-b.example.com/v1"
        max_tokens: 64000
        temperature: 1.0
        enable_thinking: true
        thinking_budget: 10000
        enable_caching: true
        timeout: 120.0
        max_retries: 3
    
    # 🆕 V7.10: 路由策略配置
    policy:
      max_failures: 2           # 最大失败次数（超过进入冷却）
      cooldown_seconds: 600     # 冷却时间（默认 10 分钟）

  # ==================== 意图分析（无容灾示例）====================
  intent_analyzer:
    description: "分析用户意图，使用轻量模型"
    model: "claude-haiku-4-5"
    max_tokens: 2048
    temperature: 0
    enable_thinking: false
    enable_caching: true
    timeout: 60.0
    max_retries: 2
    # 注意：未配置 fallbacks，将创建单个 LLM 服务

# ============================================================
# 环境变量配置说明
# ============================================================
#
# 需要在 .env 文件中配置以下 API Key：
#
# # 主 API Key（必需）
# ANTHROPIC_API_KEY=sk-ant-api03-xxx
#
# # 备用 API Key（可选，用于多模型容灾）
# CLAUDE_API_KEY_VENDOR_A=sk-ant-api03-yyy
# CLAUDE_API_KEY_VENDOR_B=sk-ant-api03-zzz
#
# # 健康探测配置（可选，覆盖 profiles.yaml）
# LLM_HEALTH_PROBE_ENABLED=true
# LLM_HEALTH_PROBE_INTERVAL=120
# LLM_HEALTH_PROBE_TIMEOUT=10
# LLM_HEALTH_PROBE_PROFILES=main_agent,intent_analyzer
#
# # 路由策略配置（可选，覆盖 policy 配置）
# LLM_ROUTER_MAX_FAILURES=2
# LLM_ROUTER_COOLDOWN_SECONDS=600
#
# # 健康监控策略（可选）
# LLM_HEALTH_WINDOW_SECONDS=300
# LLM_HEALTH_MIN_SAMPLES=5
# LLM_HEALTH_ERROR_RATE_THRESHOLD=0.3
# LLM_HEALTH_AVG_LATENCY_MS_THRESHOLD=15000
#
# ============================================================
