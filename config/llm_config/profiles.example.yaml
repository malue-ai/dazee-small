# ============================================================
# LLM 配置文件示例
# ============================================================
#
# 复制此文件为 llm_profiles.yaml 并根据需要修改
#
# ============================================================

profiles:
  # ==================== 示例 1: 高性能配置 ====================
  # 适用于复杂推理任务
  complex_reasoning:
    description: "复杂推理任务，需要最强模型"
    model: "claude-sonnet-4-5-20250929"
    max_tokens: 32000
    temperature: 1.0
    enable_thinking: true
    thinking_budget: 10000
    enable_caching: true    # 启用缓存节省成本
    timeout: 180.0
    max_retries: 3

  # ==================== 示例 2: 快速响应配置 ====================
  # 适用于简单快速任务
  fast_response:
    description: "快速响应任务，使用轻量模型"
    model: "claude-haiku-4-5-20251001"
    max_tokens: 1024
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 30.0
    max_retries: 2

  # ==================== 示例 3: 确定性输出配置 ====================
  # 适用于结构化数据生成
  structured_output:
    description: "结构化输出任务，需要确定性"
    model: "claude-haiku-4-5-20251001"
    max_tokens: 2048
    temperature: 0          # 确定性输出
    enable_thinking: false
    enable_caching: false
    timeout: 60.0
    max_retries: 2

  # ==================== 示例 4: 创意生成配置 ====================
  # 适用于内容创作
  creative_generation:
    description: "创意内容生成，需要随机性"
    model: "claude-sonnet-4-5-20250929"
    max_tokens: 8192
    temperature: 0.9        # 高温度，更有创意
    enable_thinking: false
    enable_caching: false
    timeout: 120.0
    max_retries: 2

  # ==================== 示例 5: 成本优化配置 ====================
  # 适用于成本敏感场景
  cost_optimized:
    description: "成本优化配置，使用最便宜的模型"
    model: "claude-haiku-4-5-20251001"
    max_tokens: 512         # 限制输出长度
    temperature: 0.3
    enable_thinking: false
    enable_caching: true    # 启用缓存
    timeout: 30.0
    max_retries: 1          # 减少重试

# ============================================================
# 配置技巧
# ============================================================
#
# 1. 模型选择:
#    - claude-sonnet-4-5-20250929: 最强能力，适合复杂任务
#    - claude-haiku-4-5-20251001: 快速便宜，适合简单任务
#
# 2. 温度设置:
#    - 0: 最确定（结构化输出、工具调用）
#    - 0.3-0.5: 平衡（一般对话）
#    - 0.7-1.0: 创意（内容生成、头脑风暴）
#
# 3. max_tokens:
#    - 根据实际需要设置，避免浪费
#    - 观察日志中的实际使用量
#
# 4. enable_thinking:
#    - 仅 Sonnet 支持
#    - 适合需要深度推理的任务
#
# 5. enable_caching:
#    - 系统提示词长且不常变化时启用
#    - 可显著降低成本
#
# 6. timeout:
#    - 简单任务: 30-60s
#    - 复杂任务: 120-180s
#    - 考虑网络延迟
#
# ============================================================
