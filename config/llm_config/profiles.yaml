# ============================================================
# LLM 调用配置文件
# ============================================================
#
# 集中管理项目中所有 LLM 调用点的超参数配置
# 开发人员可在此调整各模块的 LLM 行为，无需修改代码
#
# ============================================================

# Qwen 扩展参数默认值建议（未设置时不透传，避免影响提示词驱动）
# - enable_search: false
# - search_options: {"search_mode": "auto"}  # enable_search=true 时
# - incremental_output: true  # stream=true 时推荐
# - n: 1  # tools 时固定
# - response_format: {"type": "text"}  # JSON 输出场景再设置
# - logprobs/top_logprobs: false/0
# - top_k/seed/stop: 默认不设
# - vl_high_resolution_images/vl_enable_image_hw_output: false
# - enable_code_interpreter: false（仅 qwen3-max-preview 思考模式）
# 详细说明见 config/llm_config/qwen_recommended_configs.md

profiles:
  # ==================== 主 Agent 对话 ====================
  main_agent:
    description: "主 Agent 对话处理，需要最强推理能力和大输出窗口"
    provider: "claude"
    model: "claude-sonnet-4-5-20250929"
    max_tokens: 64000
    temperature: 1.0
    enable_thinking: true
    thinking_budget: 10000
    enable_caching: true  # 启用多层 Prompt Caching（节省 88% 成本）
    timeout: 120.0
    max_retries: 3
    fallbacks:
      # 同模型多服务商：同一 provider + model，不同 base_url/api_key_env
      - provider: "claude"
        model: "claude-sonnet-4-5-20250929"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
        max_tokens: 64000
        temperature: 1.0
        enable_thinking: true
        thinking_budget: 10000
        enable_caching: true
        timeout: 120.0
        max_retries: 3
      - provider: "claude"
        model: "claude-sonnet-4-5-20250929"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://anthropic-proxy-b.example.com/v1"
        max_tokens: 64000
        temperature: 1.0
        enable_thinking: true
        thinking_budget: 10000
        enable_caching: true
        timeout: 120.0
        max_retries: 3
      # 跨厂商主备：不同 provider
      # Qwen-Max: 最强国产模型，作为SimpleAgent备选（稳定工具调用、指令遵循）
      # 注意：复杂推理和工具调用可能不如Claude，需要充分测试
      - provider: "qwen"
        model: "qwen-max"
        api_key_env: "QWEN_API_KEY"
        base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
        temperature: 0.8  # 略低于Claude，在创造性和稳定性间平衡
        top_p: 0.9
        max_tokens: 32000  # Qwen-Max最大输出可能小于Claude，根据实际调整
        result_format: "message"
        # 工具调用优化（如果支持）
        # tool_choice: "auto"
        # parallel_tool_calls: true
        repetition_penalty: 1.05  # 降低重复
      - provider: "openai"
        model: "deepseek-chat"
        api_key_env: "DEEPSEEK_API_KEY"
        base_url: "https://api.deepseek.com/v1"
    policy:
      max_failures: 2
      cooldown_seconds: 120

  # ==================== 意图分析 ====================
  intent_analyzer:
    description: "分析用户意图，需要快速响应，使用轻量模型"
    provider: "claude"
    model: "claude-haiku-4-5-20251001"
    max_tokens: 2048
    temperature: 0
    enable_thinking: false
    enable_caching: true  # 启用 Prompt Caching（意图识别提示词 1h 缓存）
    timeout: 60.0
    max_retries: 2
    fallbacks:
      # 同模型多服务商：同一 provider + model，不同 base_url/api_key_env
      - provider: "claude"
        model: "claude-haiku-4-5-20251001"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
        max_tokens: 2048
        temperature: 0
        enable_thinking: false
        enable_caching: true
        timeout: 60.0
        max_retries: 2
      - provider: "claude"
        model: "claude-haiku-4-5-20251001"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://anthropic-proxy-b.example.com/v1"
        max_tokens: 2048
        temperature: 0
        enable_thinking: false
        enable_caching: true
        timeout: 60.0
        max_retries: 2
      # 跨厂商主备：不同 provider
      # Qwen-Plus: 高性价比，适合意图分析（低延迟、准确意图理解）
      - provider: "qwen"
        model: "qwen-plus"
        api_key_env: "QWEN_API_KEY"
        base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
        temperature: 0  # 确定性输出，保证意图识别准确性
        top_p: 0.9
        max_tokens: 2048
        result_format: "message"
    policy:
      max_failures: 2
      cooldown_seconds: 120

  # ==================== 多智能体 Lead ====================
  lead_agent:
    description: "多智能体 LeadAgent 任务分解与汇总"
    provider: "claude"
    model: "claude-opus-4-5-20251101"
    max_tokens: 16384
    temperature: 0.3
    enable_thinking: true
    thinking_budget: 10000
    enable_caching: false
    timeout: 120.0
    max_retries: 2
    fallbacks:
      # 同模型多服务商：同一 provider + model，不同 base_url/api_key_env
      - provider: "claude"
        model: "claude-opus-4-5-20251101"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
        max_tokens: 16384
        temperature: 0.3
        enable_thinking: true
        thinking_budget: 10000
        enable_caching: false
        timeout: 120.0
        max_retries: 2
      - provider: "claude"
        model: "claude-opus-4-5-20251101"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://anthropic-proxy-b.example.com/v1"
        max_tokens: 16384
        temperature: 0.3
        enable_thinking: true
        thinking_budget: 10000
        enable_caching: false
        timeout: 120.0
        max_retries: 2
      # 跨厂商主备：不同 provider
      # Qwen-Max: 最强国产模型，强推理能力、任务分解能力，良好长上下文支持
      - provider: "qwen"
        model: "qwen-max"
        api_key_env: "QWEN_API_KEY"
        base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
        temperature: 0.3  # 与主模型保持一致，保证任务分解的准确性
        top_p: 0.9
        max_tokens: 16384
        result_format: "message"
        # 注意：Qwen3系列支持enable_thinking，但当前使用qwen-max，暂不启用
        # enable_thinking: true
        # thinking_budget: 8000  # 略低于Claude，考虑性能差距
      - provider: "openai"
        model: "deepseek-reasoner"
        api_key_env: "DEEPSEEK_API_KEY"
        base_url: "https://api.deepseek.com/v1"
    policy:
      max_failures: 2
      cooldown_seconds: 180

  # ==================== 多智能体 Worker ====================
  worker_agent:
    description: "多智能体 Worker 执行任务"
    provider: "claude"
    model: "claude-sonnet-4-5-20250929"
    max_tokens: 8192
    temperature: 0.5
    enable_thinking: true
    thinking_budget: 5000
    enable_caching: false
    timeout: 90.0
    max_retries: 2
    fallbacks:
      # 同模型多服务商：同一 provider + model，不同 base_url/api_key_env
      - provider: "claude"
        model: "claude-sonnet-4-5-20250929"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
        max_tokens: 8192
        temperature: 0.5
        enable_thinking: true
        thinking_budget: 5000
        enable_caching: false
        timeout: 90.0
        max_retries: 2
      - provider: "claude"
        model: "claude-sonnet-4-5-20250929"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://anthropic-proxy-b.example.com/v1"
        max_tokens: 8192
        temperature: 0.5
        enable_thinking: true
        thinking_budget: 5000
        enable_caching: false
        timeout: 90.0
        max_retries: 2
      # 跨厂商主备：不同 provider
      # Qwen-Max: 能力最接近Claude Sonnet，稳定执行、工具调用
      # 注意：工具调用格式可能不同，需要适配
      - provider: "qwen"
        model: "qwen-max"
        api_key_env: "QWEN_API_KEY"
        base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
        temperature: 0.5  # 与主模型保持一致
        top_p: 0.9
        max_tokens: 8192
        result_format: "message"
        # 工具调用优化参数（如果支持）
        # tool_choice: "auto"  # 自动选择工具
        # parallel_tool_calls: true  # 并行工具调用提升效率
        repetition_penalty: 1.05  # 降低重复，提升执行质量
      - provider: "openai"
        model: "deepseek-chat"
        api_key_env: "DEEPSEEK_API_KEY"
        base_url: "https://api.deepseek.com/v1"
    policy:
      max_failures: 2
      cooldown_seconds: 120

  # ==================== 多智能体 Critic ====================
  critic_agent:
    description: "多智能体 Critic 质量评估"
    provider: "claude"
    model: "claude-sonnet-4-5-20250929"
    max_tokens: 4096
    temperature: 0.3
    enable_thinking: true
    thinking_budget: 4000
    enable_caching: false
    timeout: 90.0
    max_retries: 2
    fallbacks:
      # 同模型多服务商：同一 provider + model，不同 base_url/api_key_env
      - provider: "claude"
        model: "claude-sonnet-4-5-20250929"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
        max_tokens: 4096
        temperature: 0.3
        enable_thinking: true
        thinking_budget: 4000
        enable_caching: false
        timeout: 90.0
        max_retries: 2
      - provider: "claude"
        model: "claude-sonnet-4-5-20250929"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://anthropic-proxy-b.example.com/v1"
        max_tokens: 4096
        temperature: 0.3
        enable_thinking: true
        thinking_budget: 4000
        enable_caching: false
        timeout: 90.0
        max_retries: 2
      # 跨厂商主备：不同 provider
      # Qwen-Max: 强评审能力，低幻觉率（相比Claude可能略高，但已是最佳选择）
      - provider: "qwen"
        model: "qwen-max"
        api_key_env: "QWEN_API_KEY"
        base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
        temperature: 0.2  # 更低温度，降低幻觉，提升评审准确性
        top_p: 0.9
        max_tokens: 4096
        result_format: "message"
        repetition_penalty: 1.05  # 降低重复
        presence_penalty: 0.3  # 轻微降低内容重复度
    policy:
      max_failures: 2
      cooldown_seconds: 120

  # ==================== 语义推理 ====================
  semantic_inference:
    description: "工具调用时机判断，需要确定性输出"
    model: "claude-haiku-4-5-20251001"
    max_tokens: 500
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 30.0
    max_retries: 2

  # ==================== 提示词分析 ====================
  llm_analyzer:
    description: "分析运营写的原始提示词，生成结构化 Schema（支持超长 prompt）"
    model: "claude-sonnet-4-5-20250929"
    max_tokens: 64000
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 600.0  # 10 分钟，支持超长 prompt 分析
    max_retries: 3

  # ==================== Schema 生成 ====================
  schema_generator:
    description: "根据 Prompt 动态生成 Agent Schema"
    model: "claude-sonnet-4-5-20250929"
    max_tokens: 4096
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 90.0
    max_retries: 2

  # ==================== 提示词智能合并 ====================
  prompt_merger:
    description: "智能合并框架规则与运营 prompt（支持超长 prompt）"
    model: "claude-sonnet-4-5-20250929"
    max_tokens: 64000
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 600.0  # 10 分钟，支持超长 prompt 合并
    max_retries: 3

  # ==================== 🆕 V5.5 场景化提示词分解 ====================
  prompt_decomposer:
    description: "将运营 prompt 分解为场景化提示词（意图/简单/中等/复杂）"
    model: "claude-sonnet-4-5-20250929"
    max_tokens: 60000  # Claude Sonnet 4.5 max output = 64000
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 300.0  # 5 分钟，单个分解任务
    max_retries: 2

  # ==================== 工具能力推断 ====================
  tool_capability_inference:
    description: "推断工具的业务能力分类，用于智能工具选择"
    model: "claude-haiku-4-5-20251001"
    max_tokens: 100
    temperature: 0.3
    enable_thinking: false
    enable_caching: false
    timeout: 30.0
    max_retries: 2

  # ==================== 后台任务 ====================
  background_task:
    description: "后台任务（如对话标题生成），使用轻量模型"
    model: "claude-haiku-4-5-20251001"
    max_tokens: 100
    temperature: 0.7
    enable_thinking: false
    enable_caching: false
    timeout: 30.0
    max_retries: 1

  # ==================== Dazee 碎片记忆提取 ====================
  fragment_extractor:
    description: "从对话中提取隐性信息（任务、情绪、待办等），使用轻量模型快速推理"
    model: "claude-haiku-4-5-20251001"
    max_tokens: 1024
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 30.0
    max_retries: 2

  # ==================== Dazee 行为分析 ====================
  behavior_analyzer:
    description: "分析用户工作规律和 5W1H 行为模式，需要深度推理"
    model: "claude-haiku-4-5-20251001"
    max_tokens: 2048
    temperature: 0.3
    enable_thinking: false
    enable_caching: false
    timeout: 60.0
    max_retries: 2

  # ==================== 记忆更新阶段 ====================
  memory_update:
    description: "记忆更新阶段（过滤/冲突/更新决策），使用语义理解"
    model: "claude-haiku-4-5-20251001"
    max_tokens: 1024
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 30.0
    max_retries: 2

  # ==================== 计划管理 ====================
  plan_manager:
    description: "智能任务规划和管理，需要深度推理能力"
    provider: "claude"
    model: "claude-sonnet-4-5-20250929"
    max_tokens: 8192
    temperature: 1.0
    enable_thinking: true
    thinking_budget: 5000
    enable_caching: false
    timeout: 120.0
    max_retries: 2
    fallbacks:
      # 同模型多服务商：同一 provider + model，不同 base_url/api_key_env
      - provider: "claude"
        model: "claude-sonnet-4-5-20250929"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
        max_tokens: 8192
        temperature: 1.0
        enable_thinking: true
        thinking_budget: 5000
        enable_caching: false
        timeout: 120.0
        max_retries: 2
      - provider: "claude"
        model: "claude-sonnet-4-5-20250929"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://anthropic-proxy-b.example.com/v1"
        max_tokens: 8192
        temperature: 1.0
        enable_thinking: true
        thinking_budget: 5000
        enable_caching: false
        timeout: 120.0
        max_retries: 2
      # 跨厂商主备：不同 provider
      - provider: "qwen"
        model: "qwen-max"
        api_key_env: "QWEN_API_KEY"
        base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"

# ============================================================
# 配置说明
# ============================================================
#
# 参数说明：
# - model: 模型名称
#   - claude-sonnet-4-5-20250929: 最强推理能力，适合复杂任务
#   - claude-haiku-4-5-20251001: 轻量快速，适合简单任务
#
# - max_tokens: 最大输出 token 数
#   - 根据任务复杂度调整：简单任务 100-500，复杂任务 2048-64000
#
# - temperature: 温度参数（0-1）
#   - 0: 确定性输出，适合结构化任务
#   - 0.7-1.0: 创意输出，适合对话和内容生成
#
# - enable_thinking: 是否启用 Extended Thinking
#   - true: 启用深度推理（仅 Sonnet 支持）
#   - false: 禁用（Haiku 不支持）
#
# - thinking_budget: Thinking token 预算
#   - 仅当 enable_thinking=true 时有效
#   - 推荐值：5000-10000
#
# - enable_caching: 是否启用 Prompt Caching
#   - true: 启用缓存（节省成本）
#   - false: 禁用缓存
#
# - timeout: 请求超时时间（秒）
#   - 根据任务复杂度调整：简单任务 30s，复杂任务 120s
#
# - max_retries: 最大重试次数
#   - 推荐值：1-3
#
# ============================================================
