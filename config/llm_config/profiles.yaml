# ============================================================
# LLM 调用配置文件
# ============================================================
#
# 集中管理项目中所有 LLM 调用点的超参数配置
# 开发人员可在此调整各模块的 LLM 行为，无需修改代码
#
# ============================================================

profiles:
  # ==================== 主 Agent 对话 ====================
  main_agent:
    description: "主 Agent 对话处理，需要最强推理能力和大输出窗口"
    provider: "qwen"
    model: "qwen3-max"
    api_key_env: "DASHSCOPE_API_KEY"
    region: "singapore"
    max_tokens: 32768
    temperature: 0.7
    enable_thinking: true
    thinking_budget: 10000
    enable_caching: false
    timeout: 120.0
    max_retries: 3

  # ==================== 意图分析 ====================
  intent_analyzer:
    description: "分析用户意图，需要快速响应，使用轻量模型"
    provider: "qwen"
    model: "qwen-plus"
    api_key_env: "DASHSCOPE_API_KEY"
    region: "singapore"
    max_tokens: 2048
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 60.0
    max_retries: 2

  # ==================== 语义推理 ====================
  semantic_inference:
    description: "工具调用时机判断，需要确定性输出"
    provider: "qwen"
    model: "qwen-plus"
    api_key_env: "DASHSCOPE_API_KEY"
    region: "singapore"
    max_tokens: 500
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 30.0
    max_retries: 2

  # ==================== 提示词分析 ====================
  llm_analyzer:
    description: "分析运营写的原始提示词，生成结构化 Schema（支持超长 prompt）"
    provider: "qwen"
    model: "qwen3-max"
    api_key_env: "DASHSCOPE_API_KEY"
    region: "singapore"
    max_tokens: 32000
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 600.0
    max_retries: 3

  # ==================== Schema 生成 ====================
  schema_generator:
    description: "根据 Prompt 动态生成 Agent Schema"
    provider: "qwen"
    model: "qwen3-max"
    api_key_env: "DASHSCOPE_API_KEY"
    region: "singapore"
    max_tokens: 4096
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 90.0
    max_retries: 2

  # ==================== 提示词智能合并 ====================
  prompt_merger:
    description: "智能合并框架规则与运营 prompt（支持超长 prompt）"
    provider: "qwen"
    model: "qwen3-max"
    api_key_env: "DASHSCOPE_API_KEY"
    region: "singapore"
    max_tokens: 32000
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 600.0
    max_retries: 3

  # ==================== 场景化提示词分解 ====================
  prompt_decomposer:
    description: "将运营 prompt 分解为场景化提示词（意图/简单/中等/复杂）"
    provider: "qwen"
    model: "qwen3-max"
    api_key_env: "DASHSCOPE_API_KEY"
    region: "singapore"
    max_tokens: 32000
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 300.0
    max_retries: 2

  # ==================== 工具能力推断 ====================
  tool_capability_inference:
    description: "推断工具的业务能力分类，用于智能工具选择"
    provider: "qwen"
    model: "qwen-plus"
    api_key_env: "DASHSCOPE_API_KEY"
    region: "singapore"
    max_tokens: 100
    temperature: 0.3
    enable_thinking: false
    enable_caching: false
    timeout: 30.0
    max_retries: 2

  # ==================== 后台任务 ====================
  background_task:
    description: "后台任务（如对话标题生成），使用轻量模型"
    provider: "qwen"
    model: "qwen-plus"
    api_key_env: "DASHSCOPE_API_KEY"
    region: "singapore"
    max_tokens: 100
    temperature: 0.7
    enable_thinking: false
    enable_caching: false
    timeout: 30.0
    max_retries: 1

  # ==================== 计划生成 ====================
  plan_generator:
    description: "plan_todo 工具内部生成计划，使用轻量模型快速生成"
    provider: "qwen"
    model: "qwen-plus"
    api_key_env: "DASHSCOPE_API_KEY"
    region: "singapore"
    max_tokens: 4096
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 60.0
    max_retries: 2

  # ==================== Dazee 碎片记忆提取 ====================
  fragment_extractor:
    description: "从对话中提取隐性信息（任务、情绪、待办等），使用轻量模型快速推理"
    provider: "qwen"
    model: "qwen-plus"
    api_key_env: "DASHSCOPE_API_KEY"
    region: "singapore"
    max_tokens: 1024
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 30.0
    max_retries: 2

  # ==================== Dazee 行为分析 ====================
  behavior_analyzer:
    description: "分析用户工作规律和 5W1H 行为模式，需要深度推理"
    provider: "qwen"
    model: "qwen-plus"
    api_key_env: "DASHSCOPE_API_KEY"
    region: "singapore"
    max_tokens: 2048
    temperature: 0.3
    enable_thinking: false
    enable_caching: false
    timeout: 60.0
    max_retries: 2

  # ==================== 计划管理 ====================
  plan_manager:
    description: "智能任务规划和管理，需要深度推理能力"
    provider: "qwen"
    model: "qwen3-max"
    api_key_env: "DASHSCOPE_API_KEY"
    region: "singapore"
    max_tokens: 65536
    temperature: 0.7
    enable_thinking: true
    thinking_budget: 5000
    enable_caching: false
    timeout: 120.0
    max_retries: 2

# ============================================================
# 配置说明
# ============================================================
#
# 参数说明：
# - model: 模型名称
#   - qwen3-max: 最强推理能力，适合复杂任务
#   - qwen-plus: 轻量快速，适合简单任务
#
# - max_tokens: 最大输出 token 数
#   - 根据任务复杂度调整：简单任务 100-500，复杂任务 2048-64000
#
# - temperature: 温度参数（0-1）
#   - 0: 确定性输出，适合结构化任务
#   - 0.7-1.0: 创意输出，适合对话和内容生成
#
# - enable_thinking: 是否启用深度思考模式
#   - true: 启用深度推理（qwen3-max、qwen-plus 支持）
#   - false: 禁用
#
# - thinking_budget: Thinking token 预算
#   - 仅当 enable_thinking=true 时有效
#   - 推荐值：5000-10000
#
# - enable_caching: 是否启用 Prompt Caching
#   - 千问暂不支持自动缓存，统一设为 false
#
# - timeout: 请求超时时间（秒）
#   - 根据任务复杂度调整：简单任务 30s，复杂任务 120s
#
# - max_retries: 最大重试次数
#   - 推荐值：1-3
#
# - api_key_env: API Key 环境变量名称
#   - 从环境变量读取 API Key（推荐）
#
# - region: 千问服务地域
#   - cn-beijing: 中国大陆（默认）
#   - singapore: 新加坡
#   - us-virginia: 美国弗吉尼亚
#   - finance: 金融专区
#
# - base_url: API Base URL（可选，优先级高于 region）
#   - 默认根据 region 自动选择
#   - 自定义：代理商 API 地址
#
# - provider: 提供商
#   - qwen: 通义千问（主模型）
#   - claude: Claude AI
#   - openai: OpenAI
#
# ============================================================

# ==================== 千问模型配置 ====================

qwen_max:
  description: "千问旗舰模型"
  provider: "qwen"
  model: "qwen3-max"
  api_key_env: "DASHSCOPE_API_KEY"
  region: "cn-beijing"
  max_tokens: 65536
  temperature: 0.7
  enable_thinking: true
