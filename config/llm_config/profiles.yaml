# ============================================================
# 多模型容灾配置（🆕 V7.10+）
# ============================================================
#
# fallbacks: 备选模型列表（按优先级排序）
#   示例：主模型故障时自动切换到备选模型
#   - provider: "claude"
#     model: "claude-sonnet-4-5-20250929"
#     api_key_env: "CLAUDE_API_KEY_VENDOR_A"
#
# policy: 路由策略配置
#   - max_failures: 最大失败次数（超过进入冷却）
#   - cooldown_seconds: 冷却时间（默认 600 秒）
#
# V11.0: health_probe 已移除（云端健康探测不适用于桌面端）

# ============================================================
# 配置说明
# ============================================================
#
# 参数说明：
# - model: 模型名称
#   - claude-sonnet-4-5: 最强推理能力，适合复杂任务
#   - claude-haiku-4-5: 轻量快速，适合简单任务
#
# - max_tokens: 最大输出 token 数
#   - 根据任务复杂度调整：简单任务 100-500，复杂任务 2048-64000
#
# - temperature: 温度参数（0-1）
#   - 0: 确定性输出，适合结构化任务
#   - 0.7-1.0: 创意输出，适合对话和内容生成
#
# - enable_thinking: 是否启用 Extended Thinking
#   - true: 启用深度推理（仅 Sonnet 支持）
#   - false: 禁用（Haiku 不支持）
#
# - thinking_budget: Thinking token 预算
#   - 仅当 enable_thinking=true 时有效
#   - 推荐值：5000-10000
#
# - enable_caching: 是否启用 Prompt Caching
#   - true: 启用缓存（节省成本）
#   - false: 禁用缓存
#
# - timeout: 请求超时时间（秒）
#   - 根据任务复杂度调整：简单任务 30s，复杂任务 120s
#
# - max_retries: 最大重试次数
#   - 推荐值：1-3
#
# - api_key_env: API Key 环境变量名称
#   - 从环境变量读取 API Key（推荐）
#
# - base_url: API Base URL（可选）
#   - 默认：官方 API 地址
#   - 自定义：代理商 API 地址
#
# - provider: 提供商（🆕 V7.10）
#   - claude: Claude AI
#   - openai: OpenAI（待实现）
#   - qwen: 通义千问（待实现）
#
# - fallbacks: 备选模型列表（🆕 V7.10）
#   - 主模型故障时自动切换到备选模型
#   - 优先级：fallbacks[0] > fallbacks[1] > ...
#
# - policy: 路由策略（🆕 V7.10）
#   - max_failures: 熔断阈值（默认 2）
#   - cooldown_seconds: 冷却时间（默认 600s）
#
# ============================================================

# ==================== 千问模型配置 ====================

qwen_max:
  description: "千问旗舰模型，对标 claude-sonnet-4-5"
  provider: "qwen"
  model: "qwen3-max"
  api_key_env: "DASHSCOPE_API_KEY"
  region: "cn-beijing"  # cn-beijing, singapore, us-virginia, finance
  # base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"  # 自定义端点（可选，优先级高于 region）
  max_tokens: 65536
  temperature: 0.7
  enable_thinking: true     # 深度思考模式
  thinking_budget: 5000     # 思考长度限制
  enable_caching: false     # 千问暂不支持自动缓存
  timeout: 120.0
  max_retries: 3
  
  # 🆕 多模型容灾配置（千问 → Claude）
  fallbacks:
    # Fallback 0: 同模型，不同地域
    - provider: "qwen"
      model: "qwen3-max"
      api_key_env: "DASHSCOPE_API_KEY"
      region: "singapore"
    
    # Fallback 1: 降级到 Claude Sonnet
    - provider: "claude"
      model: "claude-sonnet-4-5"
      api_key_env: "ANTHROPIC_API_KEY"
  
  policy:
    max_failures: 2
    cooldown_seconds: 600

qwen_plus:
  description: "千问快速模型，对标 claude-haiku-4-5"
  provider: "qwen"
  model: "qwen-plus"
  api_key_env: "DASHSCOPE_API_KEY"
  region: "cn-beijing"
  max_tokens: 4096
  temperature: 0.5
  enable_thinking: true
  thinking_budget: 3000
  enable_caching: false
  timeout: 60.0
  max_retries: 3
  
  # 🆕 多模型容灾配置（千问 → Claude）
  fallbacks:
    # Fallback 0: 同模型，不同地域
    - provider: "qwen"
      model: "qwen-plus"
      api_key_env: "DASHSCOPE_API_KEY"
      region: "singapore"
    
    # Fallback 1: 降级到 Claude Haiku
    - provider: "claude"
      model: "claude-haiku-4-5"
      api_key_env: "ANTHROPIC_API_KEY"
  
  policy:
    max_failures: 2
    cooldown_seconds: 600

