# ============================================================
# LLM 调用配置文件
# ============================================================
#
# 集中管理项目中所有 LLM 调用点的超参数配置
# 开发人员可在此调整各模块的 LLM 行为，无需修改代码
#
# ============================================================

profiles:
  # ==================== 主 Agent 对话 ====================
  main_agent:
    description: "主 Agent 对话处理，需要最强推理能力和大输出窗口"
    provider: "claude"                       # 提供商
    model: "claude-sonnet-4-5"
    api_key_env: "ANTHROPIC_API_KEY"        # 主 API Key
    base_url: "https://api.anthropic.com"   # Base URL（可选，默认官方地址）
    max_tokens: 64000
    temperature: 1.0
    enable_thinking: true
    thinking_budget: 10000
    enable_caching: true  # 启用多层 Prompt Caching（节省 88% 成本）
    timeout: 120.0
    max_retries: 3
    
    # 🆕 V7.10 多模型容灾配置
    fallbacks:
      # Fallback 0: 同模型，不同 Provider (Vendor A)
      - provider: "claude"
        model: "claude-sonnet-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
      
      # Fallback 1: 同模型，不同 Provider (Vendor B)
      - provider: "claude"
        model: "claude-sonnet-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://maas-openapi.wanjiedata.com"
    
    # 路由策略
    policy:
      max_failures: 2          # 失败 2 次后进入熔断
      cooldown_seconds: 600    # 熔断冷却时间 10 分钟

  # ==================== 意图分析 ====================
  intent_analyzer:
    description: "分析用户意图，需要快速响应，使用轻量模型"
    provider: "claude"
    model: "claude-haiku-4-5"
    api_key_env: "ANTHROPIC_API_KEY"
    base_url: "https://api.anthropic.com"
    max_tokens: 2048
    temperature: 0
    enable_thinking: false
    enable_caching: true  # 启用 Prompt Caching（意图识别提示词 1h 缓存）
    timeout: 60.0
    max_retries: 2
    
    # 🆕 V7.10 多模型容灾配置
    fallbacks:
      # Fallback 0: 同模型，不同 Provider (Vendor A)
      - provider: "claude"
        model: "claude-haiku-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
      
      # Fallback 1: 同模型，不同 Provider (Vendor B)
      - provider: "claude"
        model: "claude-haiku-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://api.anthropic.com"
    
    policy:
      max_failures: 3          # 轻量模型更稳定，提高阈值
      cooldown_seconds: 300    # 冷却时间 5 分钟

  # ==================== 语义推理 ====================
  semantic_inference:
    description: "工具调用时机判断，需要确定性输出"
    model: "claude-haiku-4-5"
    max_tokens: 500
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 30.0
    max_retries: 2
    
    # 🆕 V7.10: 多模型容灾配置
    fallbacks:
      - provider: "claude"
        model: "claude-haiku-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
      - provider: "claude"
        model: "claude-haiku-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://api.anthropic.com"
    
    policy:
      max_failures: 2
      cooldown_seconds: 600

  # ==================== 提示词分析 ====================
  llm_analyzer:
    description: "分析运营写的原始提示词，生成结构化 Schema（支持超长 prompt）"
    model: "claude-sonnet-4-5"
    max_tokens: 64000
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 600.0  # 10 分钟，支持超长 prompt 分析
    max_retries: 3
    
    # 🆕 V7.10: 多模型容灾配置
    fallbacks:
      - provider: "claude"
        model: "claude-sonnet-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
      - provider: "claude"
        model: "claude-sonnet-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://api.anthropic.com"
    
    policy:
      max_failures: 2
      cooldown_seconds: 600

  # ==================== Schema 生成 ====================
  schema_generator:
    description: "根据 Prompt 动态生成 Agent Schema"
    model: "claude-sonnet-4-5"
    max_tokens: 4096
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 90.0
    max_retries: 2
    
    # 🆕 V7.10: 多模型容灾配置
    fallbacks:
      - provider: "claude"
        model: "claude-sonnet-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
      - provider: "claude"
        model: "claude-sonnet-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://api.anthropic.com"
    
    policy:
      max_failures: 2
      cooldown_seconds: 600

  # ==================== 提示词智能合并 ====================
  prompt_merger:
    description: "智能合并框架规则与运营 prompt（支持超长 prompt）"
    model: "claude-sonnet-4-5"
    max_tokens: 64000
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 600.0  # 10 分钟，支持超长 prompt 合并
    max_retries: 3
    
    # 🆕 V7.10: 多模型容灾配置
    fallbacks:
      - provider: "claude"
        model: "claude-sonnet-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
      - provider: "claude"
        model: "claude-sonnet-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://api.anthropic.com"
    
    policy:
      max_failures: 2
      cooldown_seconds: 600

  # ==================== 🆕 V5.5 场景化提示词分解 ====================
  prompt_decomposer:
    description: "将运营 prompt 分解为场景化提示词（意图/简单/中等/复杂）"
    model: "claude-sonnet-4-5"
    max_tokens: 60000  # Claude Sonnet 4.5 max output = 64000
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 300.0  # 5 分钟，单个分解任务
    max_retries: 2

  # ==================== 工具能力推断 ====================
  tool_capability_inference:
    description: "推断工具的业务能力分类，用于智能工具选择"
    model: "claude-haiku-4-5"
    max_tokens: 100
    temperature: 0.3
    enable_thinking: false
    enable_caching: false
    timeout: 30.0
    max_retries: 2

  # ==================== 后台任务 ====================
  background_task:
    description: "后台任务（如对话标题生成），使用轻量模型"
    model: "claude-haiku-4-5"
    max_tokens: 100
    temperature: 0.7
    enable_thinking: false
    enable_caching: false
    timeout: 30.0
    max_retries: 1
    
    # 🆕 V7.10: 多模型容灾配置
    fallbacks:
      - provider: "claude"
        model: "claude-haiku-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
      - provider: "claude"
        model: "claude-haiku-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://api.anthropic.com"
    
    policy:
      max_failures: 2          # 失败 2 次后熔断
      cooldown_seconds: 600    # 熔断冷却时间 10 分钟

  # ==================== 计划生成 ====================
  plan_generator:
    description: "plan_todo 工具内部生成计划，使用轻量模型快速生成"
    provider: "claude"
    model: "claude-3-5-haiku-latest"
    api_key_env: "ANTHROPIC_API_KEY"
    base_url: "https://api.anthropic.com"
    max_tokens: 4096
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 60.0
    max_retries: 2
    
    # 🆕 V7.10: 多模型容灾配置
    fallbacks:
      - provider: "claude"
        model: "claude-3-5-haiku-latest"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
      - provider: "claude"
        model: "claude-3-5-haiku-latest"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://api.anthropic.com"
    
    policy:
      max_failures: 2          # 失败 2 次后熔断
      cooldown_seconds: 600    # 熔断冷却时间 10 分钟

  # ==================== Dazee 碎片记忆提取 ====================
  fragment_extractor:
    description: "从对话中提取隐性信息（任务、情绪、待办等），使用轻量模型快速推理"
    model: "claude-haiku-4-5"
    max_tokens: 1024
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 30.0
    max_retries: 2

  # ==================== Dazee 行为分析 ====================
  behavior_analyzer:
    description: "分析用户工作规律和 5W1H 行为模式，需要深度推理"
    model: "claude-haiku-4-5"
    max_tokens: 2048
    temperature: 0.3
    enable_thinking: false
    enable_caching: false
    timeout: 60.0
    max_retries: 2

  # ==================== 计划管理 ====================
  plan_manager:
    description: "智能任务规划和管理，需要深度推理能力"
    provider: "claude"
    model: "claude-sonnet-4-5"
    api_key_env: "ANTHROPIC_API_KEY"
    base_url: "https://api.anthropic.com"
    max_tokens: 8192
    temperature: 1.0
    enable_thinking: true
    thinking_budget: 5000
    enable_caching: false
    timeout: 120.0
    max_retries: 2
    
    # 🆕 V7.10 多模型容灾配置
    fallbacks:
      # Fallback 0: 同模型，不同 Provider (Vendor A)
      - provider: "claude"
        model: "claude-sonnet-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
      
      # Fallback 1: 同模型，不同 Provider (Vendor B)
      - provider: "claude"
        model: "claude-sonnet-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://api.anthropic.com"
    
    policy:
      max_failures: 2          # 失败 2 次后进入熔断
      cooldown_seconds: 600    # 熔断冷却时间 10 分钟

# ============================================================
# 多模型容灾配置（🆕 V7.10+）
# ============================================================
#
# fallbacks: 备选模型列表（按优先级排序）
#   示例：主模型故障时自动切换到备选模型
#   - provider: "claude"
#     model: "claude-sonnet-4-5-20250929"
#     api_key_env: "CLAUDE_API_KEY_VENDOR_A"
#
# policy: 路由策略配置
#   - max_failures: 最大失败次数（超过进入冷却）
#   - cooldown_seconds: 冷却时间（默认 600 秒）
#
# health_probe: 健康探测配置
#   - request_probe: 请求级探测（条件探测，后台不健康时执行）
#   - background_probe: 后台异步探测（与用户请求解耦）
#

# ==================== 健康探测全局配置 ====================
health_probe:
  # 条件探测（V7.11：后台健康则跳过，不健康则确认）
  request_probe:
    timeout_seconds: 5.0
    max_retries: 1
  
  # 后台健康探测（定期探测所有模型）
  background_probe:
    enabled: true
    interval_seconds: 120  # 2 分钟探测一次
    timeout_seconds: 10
    profiles:
      - main_agent
      - intent_analyzer

# ============================================================
# 配置说明
# ============================================================
#
# 参数说明：
# - model: 模型名称
#   - claude-sonnet-4-5: 最强推理能力，适合复杂任务
#   - claude-haiku-4-5: 轻量快速，适合简单任务
#
# - max_tokens: 最大输出 token 数
#   - 根据任务复杂度调整：简单任务 100-500，复杂任务 2048-64000
#
# - temperature: 温度参数（0-1）
#   - 0: 确定性输出，适合结构化任务
#   - 0.7-1.0: 创意输出，适合对话和内容生成
#
# - enable_thinking: 是否启用 Extended Thinking
#   - true: 启用深度推理（仅 Sonnet 支持）
#   - false: 禁用（Haiku 不支持）
#
# - thinking_budget: Thinking token 预算
#   - 仅当 enable_thinking=true 时有效
#   - 推荐值：5000-10000
#
# - enable_caching: 是否启用 Prompt Caching
#   - true: 启用缓存（节省成本）
#   - false: 禁用缓存
#
# - timeout: 请求超时时间（秒）
#   - 根据任务复杂度调整：简单任务 30s，复杂任务 120s
#
# - max_retries: 最大重试次数
#   - 推荐值：1-3
#
# - api_key_env: API Key 环境变量名称
#   - 从环境变量读取 API Key（推荐）
#
# - base_url: API Base URL（可选）
#   - 默认：官方 API 地址
#   - 自定义：代理商 API 地址
#
# - provider: 提供商（🆕 V7.10）
#   - claude: Claude AI
#   - openai: OpenAI（待实现）
#   - qwen: 通义千问（待实现）
#
# - fallbacks: 备选模型列表（🆕 V7.10）
#   - 主模型故障时自动切换到备选模型
#   - 优先级：fallbacks[0] > fallbacks[1] > ...
#
# - policy: 路由策略（🆕 V7.10）
#   - max_failures: 熔断阈值（默认 2）
#   - cooldown_seconds: 冷却时间（默认 600s）
#
# ============================================================
