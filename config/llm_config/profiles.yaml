# ============================================================
# LLM 调用配置文件
# ============================================================
#
# 集中管理项目中所有 LLM 调用点的超参数配置
# 开发人员可在此调整各模块的 LLM 行为，无需修改代码
#
# ============================================================

profiles:
  # ==================== 主 Agent 对话 ====================
  main_agent:
    description: "主 Agent 对话处理，需要最强推理能力和大输出窗口"
    provider: "claude"                       # 提供商
    model: "claude-sonnet-4-5"
    api_key_env: "ANTHROPIC_API_KEY"        # 主 API Key
    base_url: "https://api.anthropic.com"   # Base URL（可选，默认官方地址）
    max_tokens: 32768
    temperature: 1.0
    enable_thinking: true
    thinking_budget: 10000
    enable_caching: true  # 启用多层 Prompt Caching（节省 88% 成本）
    timeout: 120.0
    max_retries: 3
    
    # 🆕 V7.10 多模型容灾配置
    fallbacks:
      # Fallback 0: 同模型，不同 Provider (Vendor A)
      - provider: "claude"
        model: "claude-sonnet-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
      
      # Fallback 1: 同模型，不同 Provider (Vendor B)
      - provider: "claude"
        model: "claude-sonnet-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://maas-openapi.wanjiedata.com/api/anthropic"
        
       # Fallback 2: 跨厂商（千问兜底，使用 OpenAI 兼容接口）
      - provider: "openai"
        model: "qwen3-max"
        api_key_env: "DASHSCOPE_API_KEY"
        base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
    # 路由策略
    policy:
      max_failures: 2          # 失败 2 次后进入熔断
      cooldown_seconds: 600    # 熔断冷却时间 10 分钟

  # ==================== 意图分析 ====================
  intent_analyzer:
    description: "分析用户意图，需要快速响应，使用轻量模型"
    provider: "claude"
    model: "claude-haiku-4-5"
    api_key_env: "ANTHROPIC_API_KEY"
    base_url: "https://api.anthropic.com"
    max_tokens: 2048
    temperature: 0
    enable_thinking: false
    enable_caching: true  # 启用 Prompt Caching（意图识别提示词 1h 缓存）
    timeout: 60.0
    max_retries: 2
    
    # 🆕 V7.10 多模型容灾配置
    fallbacks:
      # Fallback 0: 同模型，不同 Provider (Vendor A)
      - provider: "claude"
        model: "claude-haiku-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
      
      # Fallback 1: 同模型，不同 Provider (Vendor B)
      - provider: "claude"
        model: "claude-haiku-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://api.anthropic.com"
      
      # Fallback 2: 跨厂商（千问兜底，使用 OpenAI 兼容接口）
      - provider: "openai"
        model: "qwen-plus"
        api_key_env: "DASHSCOPE_API_KEY"
        base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
    
    policy:
      max_failures: 3          # 轻量模型更稳定，提高阈值
      cooldown_seconds: 300    # 冷却时间 5 分钟

  # ==================== 语义推理 ====================
  semantic_inference:
    description: "工具调用时机判断，需要确定性输出"
    model: "claude-haiku-4-5"
    max_tokens: 500
    temperature: 0
    enable_thinking: false
    enable_caching: false
    timeout: 30.0
    max_retries: 2
    
    # 🆕 V7.10: 多模型容灾配置
    fallbacks:
      # Fallback 0: 同模型，不同 Provider (Vendor A)
      - provider: "claude"
        model: "claude-haiku-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_A"
        base_url: "https://api.anthropic.com"
      
      # Fallback 1: 同模型，不同 Provider (Vendor B)
      - provider: "claude"
        model: "claude-haiku-4-5"
        api_key_env: "CLAUDE_API_KEY_VENDOR_B"
        base_url: "https://api.anthropic.com"
      
      # Fallback 2: 跨厂商（千问兜底，使用 OpenAI 兼容接口）
      - provider: "openai"
        model: "qwen-plus"
        api_key_env: "DASHSCOPE_API_KEY"
        base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
    
    policy:
      max_failures: 2
      cooldown_seconds: 600

  # ==================== 提示词分析 ====================
  llm_analyzer:
    description: "分析运营写的原始提示词，生成结构化 Schema（支持超长 prompt）"
    model: "claude-sonnet-4-5"
