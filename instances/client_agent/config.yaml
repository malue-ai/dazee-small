# ============================================================
# client_agent - 本地设备操作智能体
# ============================================================
#
# 核心能力（借鉴 clawdbot 设计）：
# - 本地 macOS/Windows 系统操作
# - 应用控制（打开、关闭、切换）
# - 文件系统操作（Finder）
# - 浏览器自动化（Safari）
# - 消息平台集成
#
# ============================================================

instance:
  name: "client_agent"
  description: "本地设备操作智能体 - 借鉴 clawdbot 设计"
  version: "1.0.0"


# ==================== Agent 配置 ====================

agent:
  model: "claude-sonnet-4-5-20250929"
  max_turns: 25
  
  llm:
    temperature: 0.7
    max_tokens: 16384
    enable_thinking: true
    thinking_budget: 8000


# ==================== 运行时环境配置 ====================
#
# 📌 控制是否自动检测并注入本地环境信息
# 本地实例需要，云端实例可禁用
#
runtime_environment:
  enabled: true           # 是否启用环境检测
  detect_apps: true       # 是否检测已安装应用
  include_capabilities: true  # 是否包含平台能力说明
  language: "zh"          # 语言：zh（中文）/ en（英文）


# ==================== Nodes 配置 ====================
#
# 📌 核心模块：本地节点操作
# 借鉴 clawdbot 的 Nodes 架构
#
nodes:
  enabled: true
  
  # 本地节点配置
  local:
    enabled: true
    platform: "auto"  # auto / darwin / windows / linux
    
    # 安全策略
    security:
      mode: "allowlist"  # deny / allowlist / full
      ask: "on-miss"     # off / on-miss / always
    
    # 命令白名单（完整路径）
    allowlist:
      # 基础命令
      - "/usr/bin/open"
      - "/usr/bin/osascript"
      - "/usr/sbin/screencapture"
      - "/usr/bin/pbcopy"
      - "/usr/bin/pbpaste"
      - "/usr/bin/say"
      - "/usr/bin/which"
      - "/bin/ls"
      - "/bin/cat"
      - "/bin/echo"
      - "/bin/pwd"
      - "/bin/date"
      - "/bin/mkdir"
      - "/bin/mv"
      - "/bin/cp"
      - "/bin/rm"
      - "/bin/rmdir"
      - "/usr/bin/touch"
      - "/bin/chmod"
      - "/usr/bin/find"
      - "/usr/bin/xargs"
      - "/usr/bin/head"
      - "/usr/bin/tail"
      - "/usr/bin/grep"
      - "/usr/bin/sort"
      - "/usr/bin/uniq"
      - "/usr/bin/wc"
      - "/usr/bin/python3"
      - "/usr/local/bin/python3"
      - "/opt/homebrew/bin/python3"
      - "/bin/bash"
      - "/bin/sh"
      - "/bin/zsh"
    
    # 安全 bins（无需完整路径）
    safe_bins:
      - "osascript"
      - "open"
      - "screencapture"
      - "pbcopy"
      - "pbpaste"
      - "say"
      - "which"
      - "ls"
      - "cat"
      - "echo"
      - "pwd"
      - "date"
      # 文件操作
      - "mkdir"
      - "mv"
      - "cp"
      - "rm"
      - "rmdir"
      - "touch"
      - "chmod"
      - "find"
      - "xargs"
      - "head"
      - "tail"
      - "grep"
      - "sort"
      - "uniq"
      - "wc"
      # 开发工具
      - "python3"
      - "bash"
      - "sh"
      - "zsh"
  
  # 远程节点（预留，暂不启用）
  remote:
    enabled: false
    # gateway_url: "ws://192.168.1.100:18789"
    # gateway_token_env: "GATEWAY_TOKEN"


# ==================== 引导文件 ====================
#
# 📌 借鉴 clawdbot 的工作区引导设计
# 这些文件会在 Agent 启动时注入到系统提示词
#
bootstrap_files:
  - SOUL.md      # 人格定义
  - TOOLS.md     # 本地工具配置


# ==================== Skills 配置 ====================
#
# 📌 借鉴 clawdbot 的 skill 机制：
#    - 从 skills/ 目录加载 SKILL.md 文件
#    - 在 system prompt 中注入 <available_skills> 描述
#    - Agent 使用 read 工具读取 SKILL.md 来执行技能
#    - 不使用 Claude API 的 container/skills 参数（避免 8 个限制）
#
# 🆕 skill_mode: prompt_injection（注入到提示词）vs api（使用 Claude Skills API）
skill_mode: "prompt_injection"

# 🆕 V9.0: Skills 加载配置
skill_loading:
  mode: "lazy"           # lazy（延迟加载，仅注入列表）/ eager（全量加载）
  # lazy 模式节省 ~90% Token，Agent 按需读取 SKILL.md
  # eager 模式适用于 Skills 数量少或需要立即可用的场景
  
  # 🆕 V9.1: Skills 发现模式（混合方案）
  discovery_mode: "hybrid"  # registry（仅注册表）/ auto（自动扫描）/ hybrid（混合）
  # - registry: 只加载 skill_registry.yaml 中声明的（最安全，生产推荐）
  # - auto: 自动扫描 skills/ 目录 + 依赖检查（开发友好）
  # - hybrid: 注册表优先 + 自动发现 enabled_skills 中启用的（推荐）

# 🆕 V9.0: Skills 依赖检查配置
skill_dependency_check:
  enabled: true          # 是否启用启动时依赖检查
  mode: "prompt"         # prompt（仅提示）/ interactive（交互式）/ skip（跳过）
  fail_on_missing: false # 缺少依赖时是否阻止启动

# 启用的本地 Skills（从 skills/ 目录加载，共 52 个 clawdbot skills）
enabled_skills:
  # --- macOS 核心自动化 ---
  peekaboo: 1             # macOS UI 自动化（核心）
  apple-notes: 1          # Apple Notes 管理
  apple-reminders: 1      # Apple Reminders 管理
  github: 1               # GitHub CLI
  tmux: 1                 # Tmux 会话管理
  things-mac: 1           # Things 3 任务管理
  bear-notes: 1           # Bear Notes
  imsg: 1                 # iMessage
  slack: 1                # Slack
  discord: 1              # Discord
  coding-agent: 1         # 代码助手
  camsnap: 1              # 相机截图
  video-frames: 1         # 视频帧提取
  openai-whisper: 1       # 语音识别
  1password: 1            # 密码管理
  notion: 1               # Notion
  obsidian: 1             # Obsidian
  trello: 1               # Trello
  openhue: 1              # Philips Hue
  sonoscli: 1             # Sonos 音响
  weather: 1              # 天气
  summarize: 1            # 摘要生成
  nano-pdf: 1             # PDF 处理
  # --- 新增 clawdbot skills ---
  bird: 1                 # Twitter/X
  blogwatcher: 1          # 博客监控
  blucli: 1               # Bluetooth CLI
  bluebubbles: 1          # BlueBubbles
  canvas: 1               # Canvas 画布
  clawdhub: 1             # ClawdHub 技能库
  eightctl: 1             # 8x8 控制
  food-order: 1           # 外卖订餐
  gemini: 1               # Google Gemini
  gifgrep: 1              # GIF 搜索
  gog: 1                  # GOG 游戏
  goplaces: 1             # 地点搜索
  himalaya: 1             # 邮件客户端
  local-places: 1         # 本地地点
  mcporter: 1             # MCP 移植
  model-usage: 1          # 模型使用统计
  nano-banana-pro: 1      # Banana Pro
  openai-image-gen: 1     # OpenAI 图像生成
  openai-whisper-api: 1   # OpenAI Whisper API
  oracle: 1               # Oracle
  ordercli: 1             # 订单 CLI
  sag: 1                  # SAG
  session-logs: 1         # 会话日志
  sherpa-onnx-tts: 1      # TTS
  skill-creator: 1        # 技能创建器
  songsee: 1              # 歌曲识别
  spotify-player: 1       # Spotify
  voice-call: 1           # 语音通话
  wacli: 1                # WhatsApp CLI


# ==================== 工具能力配置 ====================

enabled_capabilities:
  # --- Nodes 工具（核心）---
  nodes: 1                # 节点操作工具
  local_automation: 1     # 本地自动化能力
  
  # --- 信息获取 ---
  web_search: 1
  knowledge_search: 1
  
  # --- 文档生成（可选）---
  document_skills: 0


# ==================== 记忆配置 ====================

memory:
  mem0_enabled: true
  smart_retrieval: true


# ==================== 高级配置 ====================

advanced:
  intent_analyzer:
    enabled: true
    use_llm: true
  
  # Nodes 高级配置
  nodes:
    invoke_timeout_ms: 45000
    command_timeout_ms: 30000
    max_output_bytes: 200000
