# ============================================================
# test_agent 实例配置
# ============================================================
# 
# 这是一个完整的测试实例，演示如何配置：
# - MCP 工具（Dify 工作流）
# - 记忆功能
# - Agent 参数覆盖
#
# ============================================================

# ==================== 基础信息 ====================

instance:
  name: "test_agent"
  description: "测试智能体 - 支持搜索、数据分析和 Dify 工作流"
  version: "1.0.0"


# ==================== Agent 配置覆盖 ====================

agent:
  # 使用 Claude Sonnet 模型（平衡能力和成本）
  model: "claude-sonnet-4-5-20250929"
  
  # 最大对话轮数
  max_turns: 20
  
  # 启用计划管理器（处理复杂任务）
  plan_manager_enabled: true
  
  # 允许并行工具调用（提高效率）
  allow_parallel_tools: false
  
  # LLM 超参数
  llm:
    # 启用深度思考（复杂推理任务）
    enable_thinking: true
    thinking_budget: 10000
    
    # 最大输出 token 数
    max_tokens: 16384
    
    # 启用缓存（节省 API 成本）
    enable_caching: true


# ==================== 工具能力配置 ====================
#
# 📌 配置原则：
#   - 按功能类别启用/禁用工具（1=启用，0=禁用）
#   - 核心工具（plan_todo, api_calling 等）自动启用，无需配置
#
enabled_capabilities:
  # --- 信息获取类 ---
  web_search: 1              # 互联网搜索
  exa_search: 0              # Exa 语义搜索（暂不启用）
  knowledge_search: 1        # 个人知识库检索
  
  # --- 文档生成类（Claude Skills）---
  document_skills: 0         # 包含：pptx, xlsx, docx, pdf
  
  # --- PPT 生成类 ---
  ppt_generator: 0           # 闭环 PPT 生成工具
  
  # --- 代码沙盒类 ---
  sandbox_tools: 0           # 包含全部沙盒工具
  
  # --- 动态代码执行 ---
  code_execution: 0


# ==================== MCP 工具声明 ====================
#
# 📚 capability 说明：指定工具满足的用户意图类别
#   - document_creation: 文档/图表创建（flowchart 属于此类）
#   - web_search: 信息搜索
#   - data_analysis: 数据分析
#   - ppt_generation: 演示文稿生成
#   - 更多选项见 _template/config.yaml
#
mcp_tools:
  # ==================== Ontology Builder 三阶段工作流 ====================
  # 
  # 📌 系统配置构建 Skill（三阶段原子操作）
  # 完整流程：text2flowchart → part1 → part2
  # 预计耗时：约 3-5 分钟
  #
  
  # 阶段 1：自然语言 → Mermaid 流程图
  - name: text2flowchart
    server_url: "https://api.dify.ai/mcp/server/APXev1xgCP4n5XMn/mcp"
    server_name: "dify"
    auth_type: "bearer"
    auth_env: "DIFY_API_KEY"
    capability: "document_creation"
    description: "第一阶段：从自然语言描述生成 Mermaid 流程图，识别核心实体、属性及关系"
    # App ID: a83e8b00-a94e-4cdf-b5f7-ef721e7238c1
    
  # 阶段 2：预处理 Mermaid 图表
  - name: build_ontology_part1
    server_url: "https://api.dify.ai/mcp/server/KLRL4vux6cSYA48J/mcp"
    server_name: "dify_part1"
    auth_type: "bearer"
    auth_env: "DIFY_API_KEY"
    capability: "document_creation"
    description: "第二阶段：预处理图表生成中间配置（输入: chart_url, query, language → 输出: ontology_json_url）"
    # App ID: 8b372c40-0b3f-4108-b7a8-3a5ef29af729
    
  # 阶段 3：生成最终配置文件
  - name: build_ontology_part2
    server_url: "https://api.dify.ai/mcp/server/L6YRO83T8iR99uwo/mcp"
    server_name: "dify_part2"
    auth_type: "bearer"
    auth_env: "DIFY_API_KEY"
    capability: "document_creation"
    description: "第三阶段：生成最终配置 JSON（输入: ontology_url, query, language → 输出: ontology_json_url）"
    # App ID: c3046a09-1833-4914-ace3-7548844d1c35
# ==================== REST APIs 配置 ====================
#
# 📌 运营配置：只需填写 base_url + 认证
# 📄 API 用法：写在 api_desc/{doc}.md 中
# 📚 capability：指定 API 满足的用户意图类别
#
apis:
  # Dify API（通过 REST API 调用，作为 MCP 的补充）
  - name: dify_api
    base_url: "https://api.dify.ai/v1"
    auth:
      type: bearer
      header: Authorization
      env: DIFY_API_KEY
    doc: dify-api
    capability: "document_creation"  # 🆕 指定能力类别
    description: "Dify API - 工作流执行和对话"


# ==================== 记忆配置（V4.6）====================

memory:
  # 启用 Mem0 用户记忆
  mem0_enabled: true
  
  # 启用智能记忆检索（根据意图分析决定）
  smart_retrieval: true
  
  # 记忆保留策略
  retention_policy: "user"


# ==================== Multi-Agent 配置（V6.0）====================
#
# 控制复杂任务的多 Agent 协作行为
#
multi_agent:
  # mode 选项：
  #   - disabled: 禁用 Multi-Agent，始终使用 SimpleAgent
  #   - auto: 自动判断（基于任务复杂度和关键词）
  #   - enabled: 始终使用 Multi-Agent
  mode: "disabled"  # 🆕 暂时禁用，待充分验证后再启用
  
  # 最大并行 Worker 数
  max_parallel_workers: 5
  
  # 执行策略：auto | parallel | sequential
  execution_strategy: "auto"
  
  # 容错配置
  enable_checkpointing: true
  max_retries: 3
  
  # 超时配置
  task_timeout_seconds: 3600       # 总任务超时（秒）
  worker_timeout_seconds: 600      # 单 Worker 超时（秒）
  
  # Worker 配置
  workers:
    research:
      enabled: true
      max_instances: 3
    
    document:
      enabled: true
      max_instances: 2
    
    data_analysis:
      enabled: true
      max_instances: 2
  
  # 自动触发配置（mode=auto 时生效）
  auto_trigger_keywords:
    - "研究"
    - "分析"
    - "对比"
    - "调研"
    - "报告"
  auto_trigger_min_complexity: "complex"


# ==================== 高级配置 ====================

advanced:
  # 意图分析器
  intent_analyzer:
    enabled: true
    use_llm: true
  
  # 输出格式（V6.3 使用 Pydantic 校验）
  output_formatter:
    enabled: true
    default_format: "text"           # 默认文本格式（最简单）
    code_highlighting: true
    # JSON 输出配置（仅当 default_format="json" 时生效）
    # json_model_name: "SimpleResponse"  # 使用内置 Pydantic 模型
    # json_schema:                        # 或使用动态 Schema 定义
    #   status: {type: "str", required: true}
    #   message: {type: "str", default: ""}
    #   data: {type: "any", default: null}
    # strict_json_validation: false       # true=校验不通过则报错
    json_ensure_ascii: false
    json_indent: 2