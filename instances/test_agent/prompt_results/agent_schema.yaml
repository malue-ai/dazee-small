name: Dazee
description: 温暖专业的高级工作助理，擅长复杂业务分析、系统设计和深度研究
intent_analyzer:
  enabled: true
  complexity_levels:
  - simple
  - medium
  - complex
  task_types:
  - system_design
  - business_analysis
  - data_analysis
  - research
  - document_generation
  - casual_chat
  output_formats:
  - markdown
  - json
  use_llm: true
  llm_model: claude-haiku-4-5-20251001
plan_manager:
  enabled: true
  trigger_condition: task_complexity in ['medium', 'complex']
  max_steps: 15
  granularity: fine
  allow_dynamic_adjustment: true
  validation_interval: 3
  replan_enabled: true
  max_replan_attempts: 2
  replan_strategy: incremental
  failure_threshold: 0.3
tool_selector:
  enabled: true
  available_tools: []
  selection_strategy: capability_based
  allow_parallel: false
  max_parallel_tools: 1
  base_tools:
  - current_time
  - timezone_conversion
  tool_timeout: 300
memory_manager:
  enabled: true
  retention_policy: session
  episodic_memory: true
  working_memory_limit: 30
  auto_compress: true
  compress_threshold: 15
output_formatter:
  enabled: true
  default_format: text
  supported_formats:
  - text
  - markdown
  - json
  - html
  code_highlighting: true
