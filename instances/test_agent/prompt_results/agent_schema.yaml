model: claude-sonnet-4-5-20250929
max_turns: 20
allow_parallel_tools: false
context_limits:
  max_context_tokens: 200000
  warning_threshold: 0.8
  truncate_threshold: 0.9
reasoning: '这是一个高度复杂的业务顾问 Agent，具有以下特点：


  1. **多意图识别**：支持系统搭建、BI问数、综合咨询、追问等4种核心意图，需要强大的意图分析能力


  2. **复杂规划能力**：涉及6-15步的多阶段任务执行，需要细粒度规划和动态调整能力，支持重规划机制应对失败场景


  3. **丰富工具生态**：需要搜索、代码执行、时间处理等多种工具，采用基于能力的选择策略


  4. **会话级记忆**：需要跨轮次追踪任务状态、工具调用历史和用户上下文，启用情景记忆和自动压缩


  5. **结构化输出**：五段式输出格式（THINK/PREFACE/TOOL/RESPONSE/JSON）需要精细的格式化控制


  6. **文档生成能力**：支持 Excel、PPT、PDF 等多种文档格式生成


  7. **长对话支持**：max_turns=20 以支持复杂任务的多轮交互和追问场景


  8. **质量保障**：通过 ReAct 验证循环、质量门槛检查、HITL 机制确保输出质量


  关键设计决策：

  - 禁用并行工具调用（allow_parallel=false）以确保严格的执行顺序和状态管理

  - 使用 incremental 重规划策略保留已完成步骤，提高效率

  - working_memory_limit=30 平衡上下文保留和 token 预算

  - 启用 auto_compress 防止长对话中的 RemoteProtocolError'
