name: Dazee
description: 高级工作小助理和生活搭子，温暖、专业且富有同理心，致力于理解并解决复杂的、开放式的业务挑战
intent_analyzer:
  enabled: true
  complexity_levels:
  - low
  - medium
  - high
  task_types:
  - question_answering
  - data_analysis
  - content_generation
  - code_execution
  - web_search
  - file_operation
  output_formats:
  - text
  - json
  - markdown
  use_llm: true
  llm_model: claude-haiku-4-5-20251001
plan_manager:
  enabled: true
  trigger_condition: complexity == 'high' or step_count > 3
  max_steps: 10
  granularity: medium
  allow_dynamic_adjustment: true
  validation_interval: 3
  replan_enabled: true
  max_replan_attempts: 2
  replan_strategy: incremental
  failure_threshold: 0.3
tool_selector:
  enabled: true
  available_tools: []
  selection_strategy: capability_based
  allow_parallel: false
  max_parallel_tools: 3
  base_tools:
  - plan_todo
  tool_timeout: 300
memory_manager:
  enabled: true
  retention_policy: session
  episodic_memory: false
  working_memory_limit: 20
  auto_compress: true
  compress_threshold: 15
output_formatter:
  enabled: true
  default_format: text
  supported_formats:
  - text
  - markdown
  - json
  - html
  code_highlighting: true
  max_output_length: 50000
  json_model_name: null
  json_schema: null
  strict_json_validation: false
  json_ensure_ascii: false
  json_indent: 2
  include_metadata: false
skills:
- type: custom
  skill_id: pdf2markdown
  version: latest
  required: false
- type: custom
  skill_id: text2flowchart
  version: latest
  required: false
- type: custom
  skill_id: text2document
  version: latest
  required: false
- type: custom
  skill_id: ppt_create
  version: latest
  required: false
- type: custom
  skill_id: build_ontology
  version: latest
  required: false
- type: custom
  skill_id: nano_banana_omni
  version: latest
  required: false
- type: custom
  skill_id: timezone_conversion
  version: latest
  required: false
tools:
- tavily_search
- exa_search
- exa_contents
- web_search
- current_time
model: claude-haiku-4-5-20251001
max_turns: 20
allow_parallel_tools: false
context_limits:
  max_context_tokens: 200000
  warning_threshold: 0.8
  truncate_threshold: 0.9
multi_agent: null
temperature: null
max_tokens: null
enable_thinking: null
enable_caching: null
reasoning: "这是一个高度复杂的业务分析和系统设计助手，需要处理多种场景：\n\n1. **任务复杂度**：涉及系统搭建、BI分析、深度研究等多种复杂任务，需要结构化规划和迭代执行，因此启用plan_manager并设置较高的max_steps\n\
  \n2. **工具需求**：\n   - 信息搜索：tavily_search、exa_search、exa_contents用于行业调研和资料收集\n   -\
  \ 时间处理：current_time + timezone_conversion用于时效性信息\n   - 文档处理：pdf2markdown用于文档解析\n\
  \   - 可视化：text2flowchart用于流程图生成\n   - 文档生成：text2document、ppt_create用于报告和演示文稿\n \
  \  - 系统建模：build_ontology用于系统架构设计\n   - 图片生成：nano_banana_omni用于文生图\n\n3. **交互特点**：\n\
  \   - 采用五段式输出（THINK/PREFACE/TOOL/RESPONSE/JSON）\n   - 需要持续的进度反馈和状态管理\n   - 支持HITL机制和追问场景\n\
  \   - 强调温暖、专业的沟通风格\n\n4. **轮次设置**：考虑到复杂任务可能需要多次工具调用、验证和迭代，设置max_turns=25以确保有足够空间完成任务\n\
  \n5. **特殊能力**：具备原生图片理解能力（vision），无需额外工具支持"
