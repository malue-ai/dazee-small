# Workers 配置注册表
# 用于 Multi-Agent 编排器加载 Worker 专家配置

workers:
  - name: research_expert
    specialization: research
    worker_type: agent
    enabled: true
    model: claude-sonnet-4-5-20250929
    max_turns: 10
    description: "专业研究专家，擅长信息收集和整理"
    # prompt.md 会自动从 workers/research/prompt.md 加载
  
  - name: analysis_expert
    specialization: analysis
    worker_type: agent
    enabled: true
    model: claude-sonnet-4-5-20250929
    max_turns: 10
    description: "专业分析专家，擅长多维度对比和深度分析"
    # prompt.md 会自动从 workers/analysis/prompt.md 加载
  
  - name: synthesis_expert
    specialization: synthesis
    worker_type: agent
    enabled: true
    model: claude-sonnet-4-5-20250929
    max_turns: 10
    description: "专业综合专家，擅长信息整合和报告生成"
    # prompt.md 会自动从 workers/synthesis/prompt.md 加载

# 配置说明：
# - name: Worker 唯一标识
# - specialization: 专业领域（用于任务分配）
# - worker_type: Worker 类型（agent | mcp | workflow | skill | sandbox | subagent | human）
# - enabled: 是否启用
# - model: 使用的 LLM 模型
# - max_turns: 最大交互轮次
# - description: Worker 描述（用于任务分配时的 LLM 判断）
