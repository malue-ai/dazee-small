name: SAPCreationAssistant
description: 统计分析计划（SAP）智能创作助手，专用于从临床试验 Protocol 自动生成符合监管要求的 SAP 文档
intent_analyzer:
  enabled: true
  complexity_levels:
  - high
  task_types:
  - document_parsing
  - structured_content_generation
  - regulatory_compliance
  - code_generation
  output_formats:
  - docx
  - pdf
  - markdown
  - json
  use_llm: true
  llm_model: claude-haiku-4-5-20251001
  fast_mode: false
  semantic_cache_threshold: null
  simplified_output: true
plan_manager:
  enabled: true
  trigger_condition: user_input == '生成 SAP' or user_input == '开始'
  max_steps: 25
  granularity: fine
  allow_dynamic_adjustment: true
  validation_interval: 3
  replan_enabled: true
  max_replan_attempts: 2
  replan_strategy: incremental
  failure_threshold: 0.3
tool_selector:
  enabled: true
  available_tools: []
  selection_strategy: capability_based
  allow_parallel: true
  max_parallel_tools: 4
  base_tools:
  - document_parser
  tool_timeout: 300
memory_manager:
  enabled: true
  retention_policy: session
  episodic_memory: false
  working_memory_limit: 50
  auto_compress: false
  compress_threshold: 15
output_formatter:
  enabled: true
  default_format: markdown
  supported_formats:
  - text
  - markdown
  - json
  - html
  code_highlighting: true
  max_output_length: 4000
  json_model_name: null
  json_schema: null
  strict_json_validation: false
  json_ensure_ascii: false
  json_indent: 2
  include_metadata: false
skills:
- name: protocol-entity-extractor
  enabled: true
  description: ''
- name: sap-template-parser
  enabled: true
  description: ''
- name: sap-content-generator
  enabled: true
  description: ''
- name: statistical-code-generator
  enabled: true
  description: ''
- name: document-assembler
  enabled: true
  description: ''
- name: compliance-checker
  enabled: true
  description: ''
tools:
- web_search
- api_calling
- document_parser
model: qwen3-max
max_turns: null
execution_strategy: rvr-b
allow_parallel_tools: true
context_limits:
  max_context_tokens: 200000
  warning_threshold: 0.8
  truncate_threshold: 0.9
temperature: null
max_tokens: null
enable_thinking: null
enable_caching: null
thinking_mode: null
prompts: null
reasoning: 该 Agent 执行高度结构化的多阶段 DAG 工作流，涉及文档解析、实体抽取、合规性检查、代码生成和文档组装。任务复杂度高，需细粒度规划、并行工具调用、会话级内存管理，并依赖多个专用技能模块。输出需分章节生成以避免上下文过载，且需支持断点续做和人工审核交互。
