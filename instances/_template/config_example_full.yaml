# ==================== 完整配置示例 ====================
#
# 这是一个完整的实例配置示例
# 启用所有可用工具，适合复杂任务
#
# 使用场景：
# - 需要多种工具协同的复杂任务
# - 文档生成、数据处理、代码执行等
# - 完整功能验证

# ==================== 实例基本信息 ====================
instance:
  name: full-featured-agent
  description: "完整功能的智能体，包含所有可用工具"
  version: 1.0.0

# ==================== Agent 配置 ====================
agent:
  model: claude-sonnet-4-20250514
  max_turns: 30
  plan_manager_enabled: true
  allow_parallel_tools: true

# ==================== LLM 超参数 ====================
llm_params:
  temperature: 0.7
  max_tokens: 8000

# ==================== 通用工具能力配置 ====================
enabled_capabilities:
  # --- 内容生成类 (Claude Skills) ---
  pptx: 1                    # PPT 生成
  xlsx: 1                    # Excel 表格操作
  docx: 1                    # Word 文档生成
  pdf: 1                     # PDF 生成
  
  # --- 信息获取类 ---
  tavily_search: 1           # 通用网络搜索（Tavily API）
  exa_search: 1              # Exa 语义搜索
  knowledge_search: 1        # 个人知识库检索
  
  # --- 沙盒工具（E2B）---
  sandbox_write_file: 1      # 写入文件
  sandbox_read_file: 1       # 读取文件
  sandbox_list_files: 1      # 列出目录
  sandbox_run_command: 1     # 执行命令（支持 background）
  sandbox_execute_python: 1  # 执行 Python 代码
  sandbox_get_public_url: 1  # 获取公开 URL
  
  # --- PPT 生成类 ---
  ppt_generator: 1           # 闭环 PPT 生成工具
  slidespeak_render: 1       # SlideSpeak 渲染工具
  
  # --- 核心工具 ---
  plan_todo: 1               # 任务规划工具
  api_calling: 1             # 通用 API 调用
  hitl: 1  # HITL (Human-in-the-Loop)
  # file_read 已删除，请使用 sandbox_read_file
  code_execution: 1          # 动态代码执行

# ==================== MCP 工具配置 ====================
mcp_tools:
  # 示例：Dify 工作流
  - name: dify_flowchart
    server_url: "https://api.dify.ai/mcp/server/xxx/mcp"
    server_name: "dify"
    auth_type: "bearer"
    auth_env: "DIFY_API_KEY"
    description: "生成 flowchart 流程图"
    capability: "chart_generation"

# ==================== REST APIs 配置 ====================
apis:
  # 示例：天气 API
  - name: weather_api
    base_url: "https://api.weather.com/v1"
    auth:
      type: api_key
      header: X-API-Key
      env: WEATHER_API_KEY
    doc: weather
    capability: "web_search"
    description: "天气查询服务"

# ==================== 记忆配置 ====================
memory:
  mem0_enabled: true
  smart_retrieval: true
  retention_policy: user

# ==================== Multi-Agent 配置（V6.0）====================
multi_agent:
  # mode 选项：disabled / auto / enabled
  mode: "auto"
  max_parallel_workers: 5
  execution_strategy: "auto"
  
  # 自动触发配置（mode=auto 时生效）
  auto_trigger_keywords:
    - "研究"
    - "分析"
    - "对比"
    - "调研"
  auto_trigger_min_complexity: "complex"

# ==================== 高级配置 ====================
advanced:
  intent_analyzer:
    enabled: true
    use_llm: true
  
  output_formatter:
    default_format: "markdown"
    code_highlighting: true
