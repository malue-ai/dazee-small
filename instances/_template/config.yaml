# ============================================================
# 实例配置模板
# ============================================================
#
# 复制此目录为新实例后，请修改：
#   - instance.name / description（显示名与描述）
#   - agent.provider / agent.model（必填，否则前端不可见）
#   - 可选：cloud.enabled、storage、llm_profiles 等
#
# ============================================================

instance:
  name: 我的 Agent
  description: 从模板创建的新实例，请修改 config.yaml 和 prompt.md
  version: 1.0.0

# 必填：主模型，缺少会导致实例加载失败且前端不可见
agent:
  provider: claude   # 可选: qwen / claude / deepseek / glm / minimax
  model: claude-sonnet-4-6

# 云端协同（可选）：不配或 enabled: false 则不启用云端智能体
# cloud:
#   enabled: false
#   url: https://agent.dazee.ai
