# ============================================================
# 实例配置模板
# ============================================================
#
# 创建新实例时复制此目录，修改以下配置即可。
#
# 文件结构：
#   config.yaml              ← 你在看的这个文件（用户配置）
#   config/skills.yaml       ← Skills 管理（按需修改）
#   config/llm_profiles.yaml ← 框架 LLM 路由（高级，通常不改）
#   prompt.md                ← 人格提示词
#   .env                     ← API Keys（从 .env.example 复制）
#   skills/                  ← Skill 目录（每个 Skill 一个 SKILL.md）
#

# ==================== 基础信息 ====================

instance:
  name: "my-agent"                  # 改为你的实例名（与目录名一致）
  description: "我的 AI 搭子"        # 一句话描述
  version: "1.0.0"

# ==================== 个性化配置（可选） ====================

persona:
  nickname: ""                      # 小搭子怎么称呼你
  tone: ""                          # 说话风格："简洁干练" / "幽默轻松" / "专业严谨"
  language: "中文"
  detail_level: "适中"              # "简洁" / "适中" / "详细"
  work_dirs: []                     # 常用工作目录：["~/Documents/工作"]
  custom_rules: []                  # 额外规则

# ==================== 用户提示词（可选） ====================

user_prompt: ""
# 示例：
#   user_prompt: |
#     我是一名产品经理，帮我写文档时默认用 Markdown 格式。

# ==================== 大模型配置 ====================
#
# provider: 一键切换所有模型
#   "qwen"  - 通义千问（qwen3-max + qwen-plus）
#   "claude" - Anthropic（claude-sonnet-4-5 + claude-haiku-4-5）
#

agent:
  provider: "qwen"
  # model: "qwen3-max"             # 不填则由 provider 自动决定

# ==================== 实例存储（运行时数据隔离） ====================

storage:
  base_path: "~/.xiaodazi/my-agent"  # 改为你的实例名

# ==================== 知识库 ====================

knowledge:
  enabled: true
  directories: []                   # 要索引的本地目录

# ==================== 记忆配置 ====================

memory:
  enabled: true
  smart_retrieval: true
  retention_policy: "user"

# ==================== 规划系统 ====================

planning:
  mode: "implicit"

# ==================== Playbook 持续学习 ====================

playbook:
  enabled: true
  auto_extract: true
  min_reward_threshold: 0.7
  require_user_confirm: true
  storage_backend: "file"
