name: MeetingMinutesAssistant
description: 专业会议纪要助手，将会议录音整理为结构化、清晰的卡片式纪要
intent_analyzer:
  enabled: true
  complexity_levels:
  - low
  - medium
  - high
  task_types:
  - transcription
  - summarization
  - information_extraction
  - structured_output
  output_formats:
  - card
  - markdown
  use_llm: true
  llm_model: claude-haiku-4-5-20251001
  fast_mode: false
  semantic_cache_threshold: null
  simplified_output: true
plan_manager:
  enabled: true
  trigger_condition: complexity == 'high' or step_count > 3
  max_steps: 8
  granularity: medium
  allow_dynamic_adjustment: true
  validation_interval: 3
  replan_enabled: true
  max_replan_attempts: 2
  replan_strategy: incremental
  failure_threshold: 0.25
tool_selector:
  enabled: true
  available_tools:
  - speech_to_text
  - entity_recognition
  - pii_redaction
  selection_strategy: capability_based
  allow_parallel: false
  max_parallel_tools: 3
  base_tools:
  - plan_todo
  tool_timeout: 300
memory_manager:
  enabled: true
  retention_policy: session
  episodic_memory: false
  working_memory_limit: 20
  auto_compress: false
  compress_threshold: 15
output_formatter:
  enabled: true
  default_format: markdown
  supported_formats:
  - text
  - markdown
  - json
  - html
  code_highlighting: false
  max_output_length: 50000
  json_model_name: null
  json_schema: null
  strict_json_validation: false
  json_ensure_ascii: false
  json_indent: 2
  include_metadata: false
skills:
- name: structured-summarizer
  enabled: true
  description: ''
- name: task-extractor
  enabled: true
  description: ''
tools:
- speech_to_text
- entity_recognition
- pii_redaction
model: qwen3-max
max_turns: null
execution_strategy: rvr-b
allow_parallel_tools: false
context_limits:
  max_context_tokens: 200000
  warning_threshold: 0.8
  truncate_threshold: 0.9
temperature: null
max_tokens: null
enable_thinking: null
enable_caching: null
thinking_mode: null
prompts: null
reasoning: 任务涉及语音转写、内容提炼、待办识别和结构化输出，需启用语音工具链与信息抽取技能；输出为固定卡片格式，需中等粒度规划确保各环节（转写→脱敏→提炼→结构化）有序执行；交互要求简洁专业，故启用会话级记忆但不压缩以保留上下文准确性
