name: Dazee
description: 温暖专业的高级工作助理和生活搭子，擅长任务调度、多模态理解和智能规划
intent_analyzer:
  enabled: true
  complexity_levels:
  - simple
  - medium
  - complex
  task_types:
  - system_building        # 意图1：系统搭建（严格触发条件）
  - bi_data_analysis       # 意图2：BI智能问数（需已有数据）
  - general_consultation   # 意图3：综合咨询（兜底意图）
  output_formats:
  - text
  - markdown
  - structured
  use_llm: true
  llm_model: claude-haiku-4-5
plan_manager:
  enabled: true
  trigger_condition: task_type not in ['qa', 'simple_query']
  max_steps: 20
  granularity: fine
  allow_dynamic_adjustment: true
  validation_interval: 3
  replan_enabled: true
  max_replan_attempts: 3
  replan_strategy: incremental
  failure_threshold: 0.25
tool_selector:
  enabled: true
  available_tools:
  - tavily_search
  - exa_search
  - exa_contents
  - pdf2markdown
  - mcp_dify_Ontology_TextToChart_zen0
  - ppt_create
  - text2document
  - nano-banana-omni
  - current_time
  - timezone_conversion
  - api_calling
  - plan_todo
  - hitl
  selection_strategy: capability_based
  allow_parallel: false
  max_parallel_tools: 1
  base_tools:
  - plan_todo
  - hitl
  tool_timeout: 300
memory_manager:
  enabled: true
  retention_policy: session
  episodic_memory: true
  working_memory_limit: 50
  auto_compress: true
  compress_threshold: 15
output_formatter:
  enabled: true
  default_format: markdown
  supported_formats:
  - text
  - markdown
  - json
  - html
  code_highlighting: false
  max_output_length: 8000
  json_model_name: null
  json_schema: null
  strict_json_validation: false
  json_ensure_ascii: false
  json_indent: 2
  include_metadata: true
capabilities:
- 信息检索
- 深度搜索
- API调用
model: claude-sonnet-4-5
max_turns: 20
allow_parallel_tools: false
context_limits:
  max_context_tokens: 200000
  warning_threshold: 0.8
  truncate_threshold: 0.9
reasoning: |
  这是一个高度复杂的多功能助理Agent，具有以下特点：

  1. **三意图识别体系**：
     - 意图1（系统搭建）：严格触发条件，需≥3个业务实体+业务流程+明确关键词
     - 意图2（BI问数）：用户必须已提供数据（文件/图片）
     - 意图3（综合咨询）：兜底意图，处理其他所有场景
     - 追问归入原意图，不作为独立意图

  2. **复杂任务规划**：需要强大的Plan Manager支持系统搭建、BI分析、报告生成等多步骤任务，设置max_steps=20以应对复杂流程
  3. **丰富工具生态**：涉及搜索、文档处理、图表生成、API调用等多种工具，需要capability_based智能选择策略
  4. **强制规划机制**：非简单问答必须使用plan_todo工具，需要在tool_selector中将其设为base_tools
  5. **HITL交互**：多处需要用户确认（风格选择、方案决策等），hitl为核心工具
  6. **质量验证**：最终验证协议需要replan能力，设置max_replan_attempts=3
  7. **安全约束**：文件处理、URL诚信等规则需要通过memory和plan机制保障
  8. **禁用并行**：系统强调顺序执行和状态追踪，设置allow_parallel=false
