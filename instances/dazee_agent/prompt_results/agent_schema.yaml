name: Dazee
description: 温暖专业的高级工作助理和生活搭子，擅长任务调度、多模态理解和智能规划
intent_analyzer:
  enabled: true
  complexity_levels:
  - simple
  - medium
  - complex
  task_types:
  - system_design
  - data_analysis
  - consultation
  - follow_up
  - qa
  output_formats:
  - text
  - markdown
  - structured
  use_llm: true
  llm_model: claude-haiku-4-5-20251001
plan_manager:
  enabled: true
  trigger_condition: task_type not in ['qa', 'simple_query']
  max_steps: 20
  granularity: fine
  allow_dynamic_adjustment: true
  validation_interval: 3
  replan_enabled: true
  max_replan_attempts: 3
  replan_strategy: incremental
  failure_threshold: 0.25
tool_selector:
  enabled: true
  available_tools:
  - tavily_search
  - exa_search
  - exa_contents
  - web_search
  - pdf2markdown
  - text2flowchart
  - ppt_create
  - text2document
  - nano-banana-omni
  - current_time
  - timezone_conversion
  - api_calling
  - plan_todo
  - request_human_confirmation
  selection_strategy: capability_based
  allow_parallel: false
  max_parallel_tools: 1
  base_tools:
  - plan_todo
  - request_human_confirmation
  tool_timeout: 300
memory_manager:
  enabled: true
  retention_policy: session
  episodic_memory: true
  working_memory_limit: 50
  auto_compress: true
  compress_threshold: 15
output_formatter:
  enabled: true
  default_format: markdown
  supported_formats:
  - text
  - markdown
  - json
  - html
  code_highlighting: false
  max_output_length: 8000
  json_model_name: null
  json_schema: null
  strict_json_validation: false
  json_ensure_ascii: false
  json_indent: 2
  include_metadata: true
skills:
- type: custom
  skill_id: ppt_create
  version: latest
  required: false
- type: custom
  skill_id: text2document
  version: latest
  required: false
- type: custom
  skill_id: text2flowchart
  version: latest
  required: false
- type: custom
  skill_id: pdf2markdown
  version: latest
  required: false
- type: custom
  skill_id: nano-banana-omni
  version: latest
  required: false
tools:
- tavily_search
- exa_search
- web_search
- api_calling
model: claude-sonnet-4-5-20250929
max_turns: 20
allow_parallel_tools: false
context_limits:
  max_context_tokens: 200000
  warning_threshold: 0.8
  truncate_threshold: 0.9
reasoning: '这是一个高度复杂的多功能助理Agent，具有以下特点：


  1. **复杂任务规划**：需要强大的Plan Manager支持系统搭建、BI分析、报告生成等多步骤任务，设置max_steps=20以应对复杂流程


  2. **精细意图识别**：需要区分4种意图类型（系统搭建/BI问数/综合咨询/追问），启用LLM增强的Intent Analyzer


  3. **丰富工具生态**：涉及搜索、文档处理、图表生成、API调用等多种工具，需要capability_based智能选择策略


  4. **强制规划机制**：非简单问答必须使用plan_todo工具，需要在tool_selector中将其设为base_tools


  5. **HITL交互**：多处需要用户确认（风格选择、方案决策等），request_human_confirmation为核心工具


  6. **会话记忆**：需要追踪历史文件、追问上下文，启用episodic_memory和较大的working_memory_limit(50)


  7. **质量验证**：最终验证协议需要replan能力，设置max_replan_attempts=3


  8. **安全约束**：文件处理、URL诚信等规则需要通过memory和plan机制保障


  9. **禁用并行**：系统强调顺序执行和状态追踪，设置allow_parallel=false


  10. **长对话支持**：复杂任务可能需要多轮交互，设置max_turns=25'
