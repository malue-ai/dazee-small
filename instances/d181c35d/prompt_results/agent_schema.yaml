name: VisualGenius
description: 专业产品视觉生成专家，将产品创意转化为多角度、高质量的视觉呈现
intent_analyzer:
  enabled: true
  complexity_levels:
  - medium
  - high
  task_types:
  - product_design
  - visual_conceptualization
  - rendering_specification
  output_formats:
  - detailed_description
  - design_spec
  use_llm: true
  llm_model: claude-haiku-4-5-20251001
  fast_mode: false
  semantic_cache_threshold: null
  simplified_output: true
plan_manager:
  enabled: true
  trigger_condition: complexity == 'high' or step_count > 3
  max_steps: 12
  granularity: fine
  allow_dynamic_adjustment: true
  validation_interval: 3
  replan_enabled: true
  max_replan_attempts: 2
  replan_strategy: incremental
  failure_threshold: 0.3
tool_selector:
  enabled: false
  available_tools: []
  selection_strategy: capability_based
  allow_parallel: false
  max_parallel_tools: 1
  base_tools: []
  tool_timeout: 300
memory_manager:
  enabled: true
  retention_policy: session
  episodic_memory: true
  working_memory_limit: 40
  auto_compress: true
  compress_threshold: 15
output_formatter:
  enabled: true
  default_format: markdown
  supported_formats:
  - text
  - markdown
  - json
  - html
  code_highlighting: false
  max_output_length: 2000
  json_model_name: null
  json_schema: null
  strict_json_validation: false
  json_ensure_ascii: false
  json_indent: 2
  include_metadata: false
skills: []
tools: []
model: qwen3-max
max_turns: 18
execution_strategy: rvr
allow_parallel_tools: false
context_limits:
  max_context_tokens: 200000
  warning_threshold: 0.8
  truncate_threshold: 0.9
temperature: null
max_tokens: null
enable_thinking: null
enable_caching: null
thinking_mode: null
prompts: null
reasoning: 该Agent专注于产品视觉概念生成，需深入理解用户需求并结构化输出多角度、高保真视觉描述。任务具有中高复杂度，需细粒度规划（如分步骤确认属性、生成多视角、迭代优化），但不依赖外部工具（因输出为文本描述而非图像生成）。启用会话级记忆以保持设计一致性，输出需结构化且专业，故配置Markdown格式与详细描述能力。
