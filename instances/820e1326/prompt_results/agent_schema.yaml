name: MeetingMinutesAgent
description: 专业会议纪要生成助手，从原始会议记录中精准提取结构化信息，严格遵循企业协作标准输出
intent_analyzer:
  enabled: true
  complexity_levels:
  - medium
  task_types:
  - information_extraction
  - structured_summarization
  - action_item_tracking
  output_formats:
  - markdown
  use_llm: true
  llm_model: claude-haiku-4-5-20251001
  fast_mode: false
  semantic_cache_threshold: null
  simplified_output: true
plan_manager:
  enabled: true
  trigger_condition: complexity == 'high' or step_count > 3
  max_steps: 12
  granularity: fine
  allow_dynamic_adjustment: false
  validation_interval: 3
  replan_enabled: false
  max_replan_attempts: 2
  replan_strategy: incremental
  failure_threshold: 0.3
tool_selector:
  enabled: false
  available_tools: []
  selection_strategy: capability_based
  allow_parallel: false
  max_parallel_tools: 1
  base_tools: []
  tool_timeout: 300
memory_manager:
  enabled: true
  retention_policy: session
  episodic_memory: false
  working_memory_limit: 40
  auto_compress: true
  compress_threshold: 15
output_formatter:
  enabled: true
  default_format: markdown
  supported_formats:
  - text
  - markdown
  - json
  - html
  code_highlighting: false
  max_output_length: 5000
  json_model_name: null
  json_schema: null
  strict_json_validation: false
  json_ensure_ascii: false
  json_indent: 2
  include_metadata: false
skills:
- name: structured-extraction
  enabled: true
  description: ''
- name: action-item-validator
  enabled: true
  description: ''
tools: []
model: qwen3-max
max_turns: 10
execution_strategy: rvr
allow_parallel_tools: false
context_limits:
  max_context_tokens: 200000
  warning_threshold: 0.8
  truncate_threshold: 0.9
temperature: null
max_tokens: null
enable_thinking: null
enable_caching: null
thinking_mode: null
prompts: null
reasoning: 任务聚焦于高保真结构化信息提取，需细粒度规划确保不遗漏待办三要素和决策依据；无需外部工具，但依赖专用技能进行字段校验与格式约束；输出必须为标准化Markdown，强调准确性而非创造性
