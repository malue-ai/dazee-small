name: XiaoDaziDesktopCompanion
description: 桌面端本地 AI 搭子，面向普通用户，擅长文件处理、桌面操作、写作整理、数据处理与个性化陪伴式协助。
intent_analyzer:
  enabled: true
  complexity_levels:
  - simple
  - medium
  - complex
  task_types:
  - desktop_operation
  - file_management
  - writing
  - data_analysis
  - translation
  - knowledge_search
  - memory_query
  - screenshot
  - ui_automation
  output_formats:
  - text
  - markdown
  - file
  use_llm: true
  llm_model: claude-haiku-4-5-20251001
  fast_mode: false
  semantic_cache_threshold: null
  simplified_output: true
plan_manager:
  enabled: true
  trigger_condition: task_complexity in ['medium','complex'] or involves_multi_file_modification
    or requires_ui_automation or unavailable_skill_fallback_needed
  max_steps: 20
  granularity: medium
  allow_dynamic_adjustment: true
  validation_interval: 3
  replan_enabled: true
  max_replan_attempts: 3
  replan_strategy: incremental
  failure_threshold: 0.34
tool_selector:
  enabled: true
  available_tools:
  - nodes
  - knowledge_search
  - open_system_preferences
  - hitl
  - plan
  - plan-todo
  selection_strategy: capability_based
  allow_parallel: false
  max_parallel_tools: 1
  base_tools:
  - nodes
  - hitl
  - plan
  tool_timeout: 300
memory_manager:
  enabled: true
  retention_policy: user
  episodic_memory: true
  working_memory_limit: 40
  auto_compress: true
  compress_threshold: 15
output_formatter:
  enabled: true
  default_format: markdown
  supported_formats:
  - text
  - markdown
  - json
  - html
  code_highlighting: false
  max_output_length: 12000
  json_model_name: null
  json_schema: null
  strict_json_validation: false
  json_ensure_ascii: false
  json_indent: 2
  include_metadata: false
skills: []
tools:
- nodes
- knowledge_search
- open_system_preferences
- hitl
- plan
- plan-todo
model: gpt-5.4
max_turns: null
execution_strategy: rvr-b
allow_parallel_tools: false
context_limits:
  max_context_tokens: 200000
  warning_threshold: 0.8
  truncate_threshold: 0.9
temperature: null
max_tokens: null
enable_thinking: null
enable_caching: null
thinking_mode: null
prompts: null
reasoning: 该 Prompt 描述的是一个本地桌面 AI 助手，而非纯问答或单一文档生成器。它需要理解任务复杂度、在文件操作/桌面 UI 操作/知识库检索/用户记忆之间切换，并在复杂任务时进行规划，因此必须启用
  intent_analyzer 和 plan_manager。由于强调‘只用已启用的 Skills’、优先本地执行、敏感操作确认、多文件修改协议、不可用 Skill
  的替代规划，所以需要显式配置 tool_selector，并保守地限制并行，避免桌面操作和文件修改出现竞态。Prompt 强调记住用户偏好、项目隔离、回答记忆相关问题前先查
  `<user_memory>`，因此应启用 user 级 memory_manager，并保留较大的会话工作记忆。输出需要亲切、结构化、通俗，因此启用 markdown
  输出格式。Schema 中不额外臆造具体 Skills，因为 Prompt 明确要求只使用运行时已启用的能力；这里保留工具层能力，具体 Skills 由运行时注入更合适。
