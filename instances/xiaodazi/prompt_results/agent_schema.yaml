name: XiaoDazi
description: 桌面端 AI 搭子，亲切主动、本地优先、会干活会思考的本机伙伴
intent_analyzer:
  enabled: true
  complexity_levels:
  - simple
  - medium
  - complex
  task_types:
  - file_operation
  - writing
  - data_analysis
  - translation
  - app_automation
  - email_composition
  - organization
  output_formats:
  - text
  - markdown
  - structured_list
  - table
  use_llm: true
  llm_model: claude-haiku-4-5-20251001
  fast_mode: false
  semantic_cache_threshold: null
  simplified_output: true
plan_manager:
  enabled: true
  trigger_condition: complexity == 'high' or step_count > 3
  max_steps: 20
  granularity: fine
  allow_dynamic_adjustment: true
  validation_interval: 3
  replan_enabled: true
  max_replan_attempts: 2
  replan_strategy: incremental
  failure_threshold: 0.4
tool_selector:
  enabled: true
  available_tools: []
  selection_strategy: capability_based
  allow_parallel: false
  max_parallel_tools: 1
  base_tools:
  - hitl_confirm
  tool_timeout: 300
memory_manager:
  enabled: true
  retention_policy: user
  episodic_memory: true
  working_memory_limit: 50
  auto_compress: true
  compress_threshold: 15
output_formatter:
  enabled: true
  default_format: markdown
  supported_formats:
  - text
  - markdown
  - json
  - html
  code_highlighting: false
  max_output_length: 2000
  json_model_name: null
  json_schema: null
  strict_json_validation: false
  json_ensure_ascii: false
  json_indent: 2
  include_metadata: false
skills:
- name: file-organizer
  enabled: true
  description: ''
- name: excel-analyzer
  enabled: true
  description: ''
- name: text-writer
  enabled: true
  description: ''
- name: translator
  enabled: true
  description: ''
- name: screenshot-capturer
  enabled: true
  description: ''
- name: ui-automator
  enabled: true
  description: ''
- name: weather-fetcher
  enabled: true
  description: ''
tools:
- web_search
- api_calling
- hitl_confirm
model: claude-sonnet-4-5-20250929
max_turns: 20
execution_strategy: rvr
allow_parallel_tools: false
context_limits:
  max_context_tokens: 200000
  warning_threshold: 0.8
  truncate_threshold: 0.9
temperature: null
max_tokens: null
enable_thinking: null
enable_caching: null
thinking_mode: null
prompts: null
reasoning: 小搭子需处理从简单查询到复杂桌面自动化的多类任务，强调本地执行、主动规划、用户记忆和安全确认。启用细粒度规划以支持 UI 自动化等多步操作，记忆管理设为
  user 级别以长期学习偏好，工具选择保守（禁用并行）确保操作安全，所有敏感操作通过 HITL 确认。输出风格要求通俗友好，故默认 markdown 并禁用代码高亮。
