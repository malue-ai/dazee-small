name: XiaoDazi
description: 桌面端 AI 搭子 - 住在用户电脑里的智能助手
intent_analyzer:
  enabled: true
  complexity_levels:
  - simple
  - medium
  - complex
  task_types:
  - file_operation
  - writing
  - data_analysis
  - translation
  - desktop_automation
  - knowledge_search
  - memory_query
  output_formats:
  - text
  - markdown
  - structured
  use_llm: true
  llm_model: claude-haiku-4-5-20251001
  fast_mode: false
  semantic_cache_threshold: null
  simplified_output: true
plan_manager:
  enabled: true
  trigger_condition: complexity == 'complex' or (complexity == 'medium' and step_count
    > 3)
  max_steps: 15
  granularity: medium
  allow_dynamic_adjustment: true
  validation_interval: 3
  replan_enabled: true
  max_replan_attempts: 2
  replan_strategy: incremental
  failure_threshold: 0.3
tool_selector:
  enabled: true
  available_tools: []
  selection_strategy: capability_based
  allow_parallel: false
  max_parallel_tools: 1
  base_tools:
  - hitl
  - knowledge_search
  tool_timeout: 300
memory_manager:
  enabled: true
  retention_policy: user
  episodic_memory: true
  working_memory_limit: 50
  auto_compress: true
  compress_threshold: 15
output_formatter:
  enabled: true
  default_format: markdown
  supported_formats:
  - text
  - markdown
  - json
  - html
  code_highlighting: false
  max_output_length: 4000
  json_model_name: null
  json_schema: null
  strict_json_validation: false
  json_ensure_ascii: false
  json_indent: 2
  include_metadata: false
skills:
- name: nodes
  enabled: true
  description: 本地文件系统操作（shell 命令）
- name: excel-generator
  enabled: true
  description: Excel 表格生成和分析
- name: desktop-automation
  enabled: true
  description: 桌面应用界面操作（观察-操作-验证循环）
tools:
- hitl
- knowledge_search
model: claude-sonnet-4-5-20250929
execution_strategy: rvr-b
allow_parallel_tools: false
context_limits:
  max_context_tokens: 200000
  warning_threshold: 0.8
  truncate_threshold: 0.9
temperature: null
max_tokens: null
enable_thinking: null
enable_caching: null
thinking_mode: null
prompts: null
reasoning: '这是一个复杂的桌面助手场景，具有以下特点：


  1. **高度交互性**：需要频繁的 HITL 确认（敏感操作、Skill 安装、用户中止等），因此 hitl 工具是基础工具


  2. **复杂任务规划**：涉及多步骤文件操作、桌面自动化、多文件修改等复杂场景，需要启用 plan_manager，采用 medium 粒度平衡灵活性和可控性


  3. **强记忆依赖**：需要记住用户偏好、习惯、项目风格等，启用 user 级别的持久化记忆，episodic_memory 用于回忆过往交互


  4. **本地优先**：主要依赖本地 Skills（nodes、desktop-automation）而非云端工具，tool_selector 策略为 capability_based


  5. **安全保护**：文件修改有自动备份和事务语义，需要 replan 能力处理失败场景（incremental 策略保留已完成步骤）


  6. **知识检索**：需要 knowledge_search 工具查询用户知识库


  7. **输出友好**：markdown 格式适合结构化展示（列表、表格），max_output_length 4000 适合桌面端阅读


  8. **不需要并行工具**：桌面操作和文件修改需要串行执行以保证安全性'
