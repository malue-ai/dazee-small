name: XiaoDazi
description: 住在用户电脑里的 AI 搭子，亲切、主动、靠谱的本地智能助手
intent_analyzer:
  enabled: true
  complexity_levels:
  - simple
  - medium
  - complex
  task_types:
  - file_management
  - writing
  - translation
  - data_analysis
  - desktop_automation
  - communication
  output_formats:
  - text
  - markdown
  - structured_list
  use_llm: true
  llm_model: claude-haiku-4-5-20251001
  fast_mode: false
  semantic_cache_threshold: null
  simplified_output: true
plan_manager:
  enabled: true
  trigger_condition: complexity == 'complex' or requires_multiple_skills or involves_ui_operations
  max_steps: 20
  granularity: fine
  allow_dynamic_adjustment: true
  validation_interval: 3
  replan_enabled: true
  max_replan_attempts: 3
  replan_strategy: incremental
  failure_threshold: 0.4
tool_selector:
  enabled: true
  available_tools: []
  selection_strategy: capability_based
  allow_parallel: false
  max_parallel_tools: 1
  base_tools:
  - hitl_confirm
  - file_reader
  - file_writer
  - app_launcher
  tool_timeout: 300
memory_manager:
  enabled: true
  retention_policy: user
  episodic_memory: true
  working_memory_limit: 50
  auto_compress: true
  compress_threshold: 15
output_formatter:
  enabled: true
  default_format: markdown
  supported_formats:
  - text
  - markdown
  - json
  - html
  code_highlighting: false
  max_output_length: 2000
  json_model_name: null
  json_schema: null
  strict_json_validation: false
  json_ensure_ascii: false
  json_indent: 2
  include_metadata: false
skills:
- name: excel-generator
  enabled: true
  description: ''
- name: file-organizer
  enabled: true
  description: ''
- name: text-writer
  enabled: true
  description: ''
- name: translator
  enabled: true
  description: ''
- name: screenshot-capture
  enabled: true
  description: ''
- name: desktop-ui-controller
  enabled: true
  description: ''
tools:
- web_search
- api_calling
- hitl_confirm
- file_system_access
- app_control
model: qwen3-max
max_turns: 25
execution_strategy: rvr
allow_parallel_tools: false
context_limits:
  max_context_tokens: 200000
  warning_threshold: 0.8
  truncate_threshold: 0.9
temperature: null
max_tokens: null
enable_thinking: null
enable_caching: null
thinking_mode: null
prompts: null
reasoning: 这是一个高度本地化、具备主动性与记忆能力的桌面AI搭子，需支持复杂任务规划（如文件整理+UI操作）、用户偏好记忆、安全确认机制和替代方案生成。任务常涉及多步骤执行和环境感知，因此启用细粒度计划管理、用户级记忆保留、HITL确认工具，并配置多种本地技能。为保障普通用户体验，禁用并行工具调用，强调通俗输出和错误恢复能力。
