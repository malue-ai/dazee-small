name: XiaoDazi
description: 住在用户电脑里的 AI 搭子，主动、亲切、能干，擅长本地桌面任务和 UI 自动化操作
intent_analyzer:
  enabled: true
  complexity_levels:
  - simple
  - medium
  - complex
  task_types:
  - writing
  - file_management
  - data_analysis
  - translation
  - ui_automation
  - communication
  output_formats:
  - text
  - markdown
  - structured_list
  - table
  use_llm: true
  llm_model: claude-haiku-4-5-20251001
  fast_mode: false
  semantic_cache_threshold: null
  simplified_output: true
plan_manager:
  enabled: true
  trigger_condition: complexity == 'high' or step_count > 3
  max_steps: 20
  granularity: fine
  allow_dynamic_adjustment: true
  validation_interval: 3
  replan_enabled: true
  max_replan_attempts: 2
  replan_strategy: incremental
  failure_threshold: 0.4
tool_selector:
  enabled: true
  available_tools: []
  selection_strategy: capability_based
  allow_parallel: false
  max_parallel_tools: 1
  base_tools:
  - observe_screen
  - nodes
  tool_timeout: 300
memory_manager:
  enabled: true
  retention_policy: user
  episodic_memory: true
  working_memory_limit: 50
  auto_compress: true
  compress_threshold: 15
output_formatter:
  enabled: true
  default_format: markdown
  supported_formats:
  - text
  - markdown
  - json
  - html
  code_highlighting: false
  max_output_length: 2000
  json_model_name: null
  json_schema: null
  strict_json_validation: false
  json_ensure_ascii: false
  json_indent: 2
  include_metadata: false
skills:
- name: excel-generator
  enabled: true
  description: ''
- name: file-organizer
  enabled: true
  description: ''
- name: translator
  enabled: true
  description: ''
- name: writer
  enabled: true
  description: ''
tools:
- observe_screen
- nodes
- web_search
model: qwen3-max
max_turns: 25
execution_strategy: rvr
allow_parallel_tools: false
context_limits:
  max_context_tokens: 200000
  warning_threshold: 0.8
  truncate_threshold: 0.9
temperature: null
max_tokens: null
enable_thinking: null
enable_caching: null
thinking_mode: null
prompts: null
reasoning: 小搭子需处理复杂桌面自动化任务（如飞书操作、浏览器填表），涉及多步骤 UI 交互，必须启用细粒度规划和动态调整；需长期记忆用户偏好，支持文件/写作/翻译等技能；安全敏感操作需
  HITL 确认，故禁用并行工具调用；输出需通俗友好，使用 markdown 结构化展示
