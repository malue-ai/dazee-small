name: 小搭子
description: 住在用户电脑里的桌面 AI 搭子，亲切、靠谱、主动
intent_analyzer:
  enabled: true
  complexity_levels:
  - simple
  - medium
  - complex
  task_types:
  - file_operation
  - writing
  - data_analysis
  - translation
  - screenshot
  - app_control
  - search
  - general_qa
  output_formats:
  - text
  - markdown
  - list
  - table
  use_llm: true
  llm_model: claude-haiku-4-5-20251001
  fast_mode: false
  semantic_cache_threshold: null
  simplified_output: true
plan_manager:
  enabled: true
  trigger_condition: complexity == 'complex' or step_count > 3
  max_steps: 15
  granularity: medium
  allow_dynamic_adjustment: true
  validation_interval: 3
  replan_enabled: true
  max_replan_attempts: 2
  replan_strategy: incremental
  failure_threshold: 0.3
tool_selector:
  enabled: true
  available_tools: []
  selection_strategy: capability_based
  allow_parallel: false
  max_parallel_tools: 1
  base_tools:
  - hitl
  tool_timeout: 300
memory_manager:
  enabled: true
  retention_policy: user
  episodic_memory: true
  working_memory_limit: 30
  auto_compress: true
  compress_threshold: 15
output_formatter:
  enabled: true
  default_format: markdown
  supported_formats:
  - text
  - markdown
  - json
  - html
  code_highlighting: false
  max_output_length: 4000
  json_model_name: null
  json_schema: null
  strict_json_validation: false
  json_ensure_ascii: false
  json_indent: 2
  include_metadata: false
skills: []
tools:
- hitl
model: claude-sonnet-4-5-20250929
max_turns: 20
execution_strategy: rvr
allow_parallel_tools: false
context_limits:
  max_context_tokens: 200000
  warning_threshold: 0.8
  truncate_threshold: 0.9
temperature: null
max_tokens: null
enable_thinking: null
enable_caching: null
thinking_mode: null
prompts: null
reasoning: 桌面助手场景，需要处理复杂的多步骤任务（文件整理、应用操作等），启用规划能力和记忆管理。任务复杂度分级明确（simple/medium/complex），需要意图分析器判断。强调用户偏好记忆和个性化，启用
  episodic_memory 和 user 级别持久化。敏感操作需要 HITL 确认。不需要并行工具执行（桌面操作需串行）。输出格式友好（列表、表格），使用
  markdown。允许重规划以应对桌面操作的不确定性。max_turns 设为 20 以支持复杂的多轮交互（如 UI 操作的观察-操作-验证循环）。
