name: DesktopBuddy
description: 一个住在用户电脑里的AI搭子，帮助完成各种桌面任务
intent_analyzer:
  enabled: true
  complexity_levels:
  - simple
  - medium
  - complex
  task_types:
  - file_operation
  - data_analysis
  - writing
  - translation
  - screenshot
  - ui_automation
  - search
  - planning
  output_formats:
  - text
  - markdown
  use_llm: true
  llm_model: claude-haiku-4-5-20251001
  fast_mode: false
  semantic_cache_threshold: null
  simplified_output: true
plan_manager:
  enabled: true
  trigger_condition: complexity == 'complex' || (intent.tools && intent.tools.length
    > 2)
  max_steps: 20
  granularity: medium
  allow_dynamic_adjustment: true
  validation_interval: 3
  replan_enabled: true
  max_replan_attempts: 3
  replan_strategy: incremental
  failure_threshold: 0.3
tool_selector:
  enabled: true
  available_tools: []
  selection_strategy: capability_based
  allow_parallel: false
  max_parallel_tools: 1
  base_tools:
  - hitl
  - plan-todo
  - nodes
  - knowledge_search
  - open_system_preferences
  tool_timeout: 300
memory_manager:
  enabled: true
  retention_policy: user
  episodic_memory: true
  working_memory_limit: 30
  auto_compress: true
  compress_threshold: 15
output_formatter:
  enabled: true
  default_format: markdown
  supported_formats:
  - text
  - markdown
  - json
  - html
  code_highlighting: true
  max_output_length: 5000
  json_model_name: null
  json_schema: null
  strict_json_validation: false
  json_ensure_ascii: false
  json_indent: 2
  include_metadata: false
skills: []
tools: []
model: deepseek-reasoner
max_turns: null
execution_strategy: rvr-b
allow_parallel_tools: false
context_limits:
  max_context_tokens: 200000
  warning_threshold: 0.8
  truncate_threshold: 0.9
temperature: null
max_tokens: null
enable_thinking: null
enable_caching: null
thinking_mode: null
prompts: null
reasoning: 这是一个复杂的桌面AI助手，需要处理从简单查询到多步骤规划的各种任务。根据Prompt分析：1）需要意图分析判断任务复杂度；2）复杂任务需启用规划管理器，支持动态调整和重规划；3）工具选择基于能力，且需包含HITL、规划、文件操作等基础工具；4）记忆管理器需保留用户偏好和习惯，采用用户级别记忆；5）输出格式化使用Markdown以支持结构化输出和友好展示。Skills和Tools留空，由系统根据实际可用能力动态注入。
