# ============================================================
# 小搭子实例配置
# ============================================================
#
# 这是你唯一需要关心的配置文件。
# 更多配置见 config/ 目录（通常不需要修改）：
#   config/skills.yaml        - Skills 管理（启用/禁用技能）
#   config/llm_profiles.yaml  - 框架内部 LLM 路由（高级）
#

# ==================== 基础信息 ====================

instance:
  name: "xiaodazi"
  description: "养在电脑里的 AI 小搭子"
  version: "1.0.0"

# ==================== 个性化配置（可选） ====================
#
# 所有字段都可以不填，不填就用默认值。
# 填了之后小搭子会记住你的偏好，不用每次都说。
#
persona:
  # 你希望小搭子怎么称呼你？（默认："你"）
  nickname: ""

  # 小搭子的说话风格（默认：亲切自然）
  # 建议：用一句话描述，比如 "简洁干练" / "幽默轻松" / "专业严谨" / "毒舌但有干货"
  tone: ""

  # 你的主要语言（默认：中文）
  # 如果你经常用英文或中英混合，可以改成 "英文" 或 "中英混合"
  language: "中文"

  # 你希望小搭子回答的详细程度（默认：适中）
  # 可选："简洁" / "适中" / "详细"
  detail_level: "适中"

  # 你的常用工作目录（可选，填了后小搭子会优先在这里找文件）
  # 示例：["~/Documents/工作", "~/Desktop"]
  work_dirs: []

  # 你的个性化规则（可选，想让小搭子额外遵守的规则）
  # 示例：
  #   - "写邮件时默认用正式语气"
  #   - "整理文件时不要删除 .DS_Store"
  #   - "翻译时保留原文专有名词不翻译"
  custom_rules: []

# ==================== 用户提示词（可选） ====================
#
# 在这里写你希望小搭子额外遵守的指令，支持多行文本。
# 比如你的工作场景、沟通习惯、特殊要求等。
# 不填则使用默认行为。
#
# 示例：
#   user_prompt: |
#     我是一名产品经理，经常需要写 PRD 和竞品分析。
#     帮我写文档时，默认用 Markdown 格式，标题用中文。
#     涉及数据分析时，优先用图表展示，其次用表格。
#
user_prompt: ""

# ==================== 大模型配置 ====================
#
# provider: 一键切换所有模型。改这一个字段，
#           主 Agent 和框架内部 13 个调用点全部切换。
#
#   "qwen"   - 通义千问系列
#   "claude"  - Anthropic Claude 系列
#
# 各 provider 的默认模型分配：
#
#   ┌──────────┬───────────────────────────┬──────────────────────────┐
#   │ 角色     │ qwen                      │ claude                   │
#   ├──────────┼───────────────────────────┼──────────────────────────┤
#   │ 主 Agent │ qwen3-max                 │ claude-sonnet-4-5        │
#   │ heavy    │ qwen3-max                 │ claude-sonnet-4-5        │
#   │ light    │ qwen-plus                 │ claude-haiku-4-5         │
#   └──────────┴───────────────────────────┴──────────────────────────┘
#
# 想用更强模型？在下方 model 字段填写：
#   model: "claude-opus-4-6"   # Opus 4.6（$5/$25，最强但贵）
#
# model: 主 Agent 对话模型。
#        不填则由 provider 自动决定（推荐）。
#        填了则覆盖 provider 的默认值。
#

agent:
  provider: "qwen"
  # model: "qwen3-max"           # 不填则由 provider 自动决定
  #
  # llm 参数已内置在 provider 模板中，随 provider 自动切换。
  # 如需覆盖个别参数，取消注释：
  # llm:
  #   temperature: 0.8           # 0=精准（默认），0.8=生成/创意
  #   thinking_budget: 20000     # 覆盖思考预算
  #
  # 注意：enable_thinking=true 时，temperature 由框架自动设置
  #       （Claude 强制 1.0），此处设置无效。

# ==================== 存储（自动管理，无需配置） ====================
#
# 运行时数据自动按实例名隔离，你不需要配置任何路径：
#   data/instances/{instance.name}/db/        → 数据库（消息/会话/知识索引）
#   data/instances/{instance.name}/memory/    → 记忆文件（MEMORY.md + 日志）
#   data/instances/{instance.name}/store/     → 向量存储 + FTS5 索引
#   data/instances/{instance.name}/storage/   → 上传文件
#   data/instances/{instance.name}/playbooks/ → Playbook 策略
#   data/instances/{instance.name}/snapshots/ → 状态快照
#

# ==================== 知识库（本地文件索引） ====================
#
# 指定该实例管理的本地目录，小搭子会自动索引其中的文件。
# 不同实例可以管理不同的目录，互不干扰。
#
knowledge:
  enabled: true
  directories: []
  # 示例：
  #   - "~/Documents/工作"
  #   - "~/Desktop/projects"

  # 语义搜索（可选，开启后使用 FTS5 + 向量混合搜索，效果更好）
  # 需要 OpenAI API Key 或本地安装 sentence-transformers
  semantic_enabled: false
  embedding_provider: "auto"        # "auto"=本地优先→OpenAI降级 / "openai" / "local"
  # embedding_model: ""             # 覆盖默认模型（OpenAI: text-embedding-3-small, 本地: BAAI/bge-m3）

# ==================== 记忆配置 ====================

memory:
  enabled: true
  smart_retrieval: true
  retention_policy: "user"

# ==================== 规划系统配置 ====================
#
# 核心原则：内部复杂，外部简单
# - implicit 模式：内部 plan_todo 规划，用户只看友好进度
# - explicit 模式：步骤超多/时间超长时展示详细步骤
#

planning:
  mode: "implicit"

  implicit:
    internal_planning: true
    ui_mode: "progress_bar"
    progress_style: "friendly"
    progress_messages:
      analyzing: "正在分析你的{file_type}..."
      fixing: "检测到问题，自动修复中..."
      processing: "处理中..."
      almost_done: "快好了..."
      done: "搞定！"

  explicit_threshold:
    estimated_steps: 10
    estimated_duration_minutes: 5

# ==================== Playbook 持续学习 ====================

playbook:
  enabled: true
  auto_extract: true               # 任务完成后自动 LLM 初筛
  min_reward_threshold: 0.7        # 初筛最低分
  require_user_confirm: true       # 用户确认闸门（核心原则）
  storage_backend: "file"
  # storage_path 自动从 storage.base_path 派生，通常不需要填
  matching:
    semantic_enabled: true          # Mem0 语义匹配（零额外 LLM 调用）
    min_match_score: 0.3            # 匹配最低分
    top_k: 3                        # 最多返回策略数

# ==================== 状态一致性（文件修改回滚安全） ====================

state_consistency:
  enabled: true
  snapshot:
    storage_path: "~/.xiaodazi/snapshots"
    retention_hours: 24
  rollback:
    auto_rollback_on_consecutive_failures: 3
    auto_rollback_on_critical_error: true

