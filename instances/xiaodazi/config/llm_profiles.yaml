# ============================================================
# 框架内部 LLM 配置
# ============================================================
#
# 通过 config.yaml 的 agent.provider 一键切换所有模型。
# 普通用户通常不需要修改此文件。
#
# 模型分配：
#
#   ┌──────────┬──────────────────┬──────────────────┬──────────────────┬──────────────────┬──────────────────────────┬──────────────────────────┬──────────────────────────┐
#   │ 角色     │ openai           │ qwen             │ claude           │ deepseek         │ glm              │ minimax                  │ kimi                     │
#   ├──────────┼──────────────────┼──────────────────┼──────────────────┼──────────────────┼──────────────────┼──────────────────────────┼──────────────────────────┤
#   │ 主 Agent │ gpt-5.4          │ qwen3-max        │ claude-opus-4-6  │ deepseek-reasoner│ glm-5            │ MiniMax-M2.5             │ kimi-k2.5                │
#   │ heavy    │ gpt-5.4          │ qwen3-max        │ claude-sonnet-4-6│ deepseek-reasoner│ glm-5            │ MiniMax-M2.5             │ kimi-k2.5                │
#   │ light    │ gpt-4o-mini      │ qwen-plus        │ claude-haiku-4-5 │ deepseek-chat    │ glm-4.5-flash    │ MiniMax-M2.5-highspeed   │ kimi-k2-turbo-preview    │
#   └──────────┴──────────────────┴──────────────────┴──────────────────┴──────────────────┴──────────────────┴──────────────────────────┴──────────────────────────┘
#

# ==================== Provider 模板 ====================
#
# 一键切换的核心。agent.provider 决定使用哪套模板。
#

provider_templates:
  openai:
    agent_model: "gpt-5.4-2026-03-05"
    agent_llm:
      max_tokens: 65536
      enable_thinking: true
      thinking_budget: 10000
      enable_caching: false
    heavy:
      provider: "openai"
      model: "gpt-5.4-2026-03-05"
      api_key_env: "OPENAI_API_KEY"
    light:
      provider: "openai"
      model: "gpt-4o-mini"
      api_key_env: "OPENAI_API_KEY"
    context_window_policy:
      default_window: 200000
      extended_window: null
      expansion_hitl: false

  qwen:
    agent_model: "qwen3-max"           # 默认主 Agent
    agent_llm:
      max_tokens: 65536
      enable_thinking: true
      thinking_budget: 10000
      enable_caching: false
      # temperature: thinking 开启时由框架自动设置
    heavy:
      provider: "qwen"
      model: "qwen3-max"
      api_key_env: "DASHSCOPE_API_KEY"
      region: "singapore"
    light:
      provider: "qwen"
      model: "qwen-plus"
      api_key_env: "DASHSCOPE_API_KEY"
      region: "singapore"
    context_window_policy:
      default_window: 258048
      extended_window: null
      expansion_hitl: false

  claude:
    agent_model: "claude-sonnet-4-6"   # 主 Agent：Sonnet 4.6（Benchmark 全流程验证）
    # agent_model: "claude-opus-4-6"            # 可选：Opus 4.6
    agent_llm:
      max_tokens: 128000
      enable_thinking: true
      thinking_budget: 10000
      enable_caching: true
      # temperature: thinking 开启时由框架自动设置（Claude 强制 1.0）
    heavy:
      provider: "claude"
      model: "claude-sonnet-4-6"
      api_key_env: "ANTHROPIC_API_KEY"
    light:
      provider: "claude"
      model: "claude-haiku-4-5-20251001"
      api_key_env: "ANTHROPIC_API_KEY"
    context_window_policy:
      default_window: 200000
      extended_window: 1000000
      expansion_hitl: true
      expansion_threshold: 0.90
      beta_header: "context-1m-2025-08-07"

  deepseek:
    agent_model: "deepseek-reasoner"            # 主 Agent：思考模式（V3.2），对标 Sonnet/Qwen3-max
    # [V4 Ready] V4 上线后切换主 Agent：
    # agent_model: "deepseek-v4-reasoner"       # ← 确认实际模型名
    agent_llm:
      max_tokens: 32768                         # reasoner 默认 32K，最大 64K（含 CoT）
      # [V4 Ready] 根据 V4 输出上限调整：
      # max_tokens: 65536                       # ← 确认 V4 输出上限
      enable_thinking: true
      thinking_budget: 10000                    # API 忽略此参数，保留以兼容框架
      enable_caching: false                     # DeepSeek 不支持 prompt cache
      # [V4 Ready] 如 V4 支持 prompt cache：
      # enable_caching: true
    heavy:
      provider: "deepseek"
      model: "deepseek-reasoner"
      # [V4 Ready] model: "deepseek-v4-reasoner"
      api_key_env: "DEEPSEEK_API_KEY"
    light:
      provider: "deepseek"
      model: "deepseek-chat"
      # [V4 Ready] model: "deepseek-v4"
      api_key_env: "DEEPSEEK_API_KEY"
    context_window_policy:
      default_window: 128000
      extended_window: null
      expansion_hitl: false

  glm:
    agent_model: "glm-5"                        # 主 Agent：GLM-5 旗舰（200K 上下文，128K 输出，Coding/Agent SOTA）
    agent_llm:
      max_tokens: 65536                         # 官方示例推荐 65536
      enable_thinking: true
      thinking_budget: 10000
      enable_caching: false                     # GLM 上下文缓存独立控制
      # temperature: thinking 开启时由框架自动设置（官方示例 1.0）
    heavy:
      provider: "glm"
      model: "glm-5"
      api_key_env: "ZHIPUAI_API_KEY"
    light:
      provider: "glm"
      model: "glm-4.5-flash"
      api_key_env: "ZHIPUAI_API_KEY"
    context_window_policy:
      default_window: 200000
      extended_window: null
      expansion_hitl: false

  minimax:
    agent_model: "MiniMax-M2.5"                 # 主 Agent：MiniMax M2.5 旗舰（Anthropic API 兼容）
    agent_llm:
      max_tokens: 32768
      enable_thinking: true
      thinking_budget: 10000
      enable_caching: false                     # MiniMax 不支持 prompt cache
    heavy:
      provider: "minimax"
      model: "MiniMax-M2.5"
      api_key_env: "MINIMAX_API_KEY"
    light:
      provider: "minimax"
      model: "MiniMax-M2.5-highspeed"
      api_key_env: "MINIMAX_API_KEY"
    context_window_policy:
      default_window: 204800
      extended_window: null
      expansion_hitl: false

  kimi:
    agent_model: "kimi-k2.5"                    # 主 Agent：Kimi K2.5 多模态旗舰（256K 上下文，视觉+思考）
    agent_llm:
      max_tokens: 33000
      enable_thinking: true
      thinking_budget: 10000
      enable_caching: false
    heavy:
      provider: "kimi"
      model: "kimi-k2.5"
      api_key_env: "MOONSHOT_API_KEY"
    light:
      provider: "kimi"
      model: "kimi-k2-turbo-preview"
      api_key_env: "MOONSHOT_API_KEY"
    context_window_policy:
      default_window: 262144
      extended_window: null
      expansion_hitl: false

# ==================== 各调用点配置 ====================
#
# tier: heavy / light（从上面的 provider_templates 解析）
# 其余为该调用点的专属参数。
#
# temperature 规范（只允许以下值）：
#   0   - 精准模式（默认）
#   0.8 - 生成/创意模式
#   不设 - enable_thinking=true 时由框架自动设置（Claude 强制 1.0）
#
# 如需覆盖某个调用点的模型，直接写 provider/model/api_key_env，
# 会跳过 tier 模板解析。
#

llm_profiles:
  # ---------- 运行时（每次请求都可能调用） ----------

  intent_analyzer:
    tier: "light"
    max_tokens: 512         # Output is ~50 token JSON, 512 is generous
    temperature: 0
    enable_thinking: false
    timeout: 30.0
    max_retries: 2

  semantic_inference:
    tier: "light"
    max_tokens: 2048
    temperature: 0
    enable_thinking: false
    timeout: 30.0
    max_retries: 2

  tool_capability_inference:
    tier: "light"
    max_tokens: 100
    temperature: 0
    enable_thinking: false
    timeout: 30.0
    max_retries: 2

  background_task:
    tier: "light"
    max_tokens: 100
    temperature: 0.8
    enable_thinking: false
    timeout: 30.0
    max_retries: 1

  # ---------- 规划系统 ----------

  plan_generator:
    tier: "light"
    max_tokens: 4096
    temperature: 0
    enable_thinking: false
    timeout: 60.0
    max_retries: 2

  plan_manager:
    tier: "heavy"
    max_tokens: 65536
    enable_thinking: true
    thinking_budget: 5000
    timeout: 120.0
    max_retries: 2
    # temperature: thinking 开启，由框架自动设置

  # ---------- 记忆系统 ----------

  fragment_extractor:
    tier: "light"
    max_tokens: 1024
    temperature: 0
    enable_thinking: false
    timeout: 30.0
    max_retries: 2

  behavior_analyzer:
    tier: "light"
    max_tokens: 2048
    temperature: 0
    enable_thinking: false
    timeout: 60.0
    max_retries: 2

  memory_update:
    tier: "light"
    max_tokens: 2048
    temperature: 0
    enable_thinking: false
    timeout: 60.0
    max_retries: 2

  aggregator:
    tier: "light"
    max_tokens: 2048
    temperature: 0
    enable_thinking: false
    timeout: 60.0
    max_retries: 2

  reranker:
    tier: "light"
    max_tokens: 1024
    temperature: 0
    enable_thinking: false
    timeout: 30.0
    max_retries: 2

  # ---------- 启动时（提示词生成，仅首次或缓存失效时） ----------

  llm_analyzer:
    tier: "heavy"
    max_tokens: 32000
    temperature: 0
    enable_thinking: false
    timeout: 600.0
    max_retries: 3

  schema_generator:
    tier: "heavy"
    max_tokens: 4096
    temperature: 0
    enable_thinking: false
    timeout: 90.0
    max_retries: 2

  prompt_merger:
    tier: "heavy"
    max_tokens: 32000
    temperature: 0
    enable_thinking: false
    timeout: 600.0
    max_retries: 3

  prompt_decomposer:
    tier: "heavy"
    max_tokens: 32000
    temperature: 0
    enable_thinking: false
    timeout: 300.0
    max_retries: 2
