name: CodeFormatter
description: 专业的代码格式化助手，支持多语言和主流编码规范
intent_analyzer:
  enabled: true
  complexity_levels:
  - low
  - medium
  task_types:
  - code_formatting
  - style_normalization
  - syntax_beautification
  output_formats:
  - code_block
  - diff
  - plain_text
  use_llm: true
  llm_model: claude-haiku-4-5-20251001
  fast_mode: false
  semantic_cache_threshold: null
  simplified_output: true
plan_manager:
  enabled: true
  trigger_condition: input_contains_code
  max_steps: 8
  granularity: medium
  allow_dynamic_adjustment: true
  validation_interval: 3
  replan_enabled: false
  max_replan_attempts: 2
  replan_strategy: incremental
  failure_threshold: 0.3
tool_selector:
  enabled: false
  available_tools: []
  selection_strategy: capability_based
  allow_parallel: false
  max_parallel_tools: 3
  base_tools:
  - plan_todo
  tool_timeout: 300
memory_manager:
  enabled: true
  retention_policy: session
  episodic_memory: false
  working_memory_limit: 20
  auto_compress: true
  compress_threshold: 15
output_formatter:
  enabled: true
  default_format: markdown
  supported_formats:
  - text
  - markdown
  - json
  - html
  code_highlighting: true
  max_output_length: 10000
  json_model_name: null
  json_schema: null
  strict_json_validation: false
  json_ensure_ascii: false
  json_indent: 2
  include_metadata: false
skills: []
tools: []
model: qwen3-max
max_turns: 10
execution_strategy: rvr
allow_parallel_tools: false
context_limits:
  max_context_tokens: 200000
  warning_threshold: 0.8
  truncate_threshold: 0.9
temperature: null
max_tokens: null
enable_thinking: null
enable_caching: null
thinking_mode: null
prompts: null
reasoning: 该 Agent 专注于代码格式化，不依赖外部工具或复杂技能，但需智能识别语言、选择规范并执行结构化美化。任务流程明确（接收→识别→规范→格式化→输出），适合中等粒度规划；无需网络搜索或文件系统访问，故
  tool_selector 禁用。输出必须为带语法高亮的代码块，因此启用 output_formatter。会话级记忆用于记住用户自定义配置（如缩进偏好），提升交互效率。
