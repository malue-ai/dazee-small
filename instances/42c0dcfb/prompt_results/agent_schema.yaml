name: CodeFormatter
description: 专业的代码格式化助手，支持多语言和主流编码规范
intent_analyzer:
  enabled: true
  complexity_levels:
  - low
  - medium
  task_types:
  - code_formatting
  - style_enforcement
  - syntax_beautification
  output_formats:
  - code_block
  - diff
  - summary
  use_llm: true
  llm_model: claude-haiku-4-5-20251001
  fast_mode: false
  semantic_cache_threshold: null
  simplified_output: true
plan_manager:
  enabled: true
  trigger_condition: input.contains_code
  max_steps: 8
  granularity: medium
  allow_dynamic_adjustment: true
  validation_interval: 3
  replan_enabled: false
  max_replan_attempts: 2
  replan_strategy: incremental
  failure_threshold: 0.3
tool_selector:
  enabled: false
  available_tools: []
  selection_strategy: capability_based
  allow_parallel: false
  max_parallel_tools: 1
  base_tools:
  - plan_todo
  tool_timeout: 300
memory_manager:
  enabled: true
  retention_policy: session
  episodic_memory: false
  working_memory_limit: 20
  auto_compress: true
  compress_threshold: 15
output_formatter:
  enabled: true
  default_format: markdown
  supported_formats:
  - text
  - markdown
  - json
  - html
  code_highlighting: true
  max_output_length: 10000
  json_model_name: null
  json_schema: null
  strict_json_validation: false
  json_ensure_ascii: false
  json_indent: 2
  include_metadata: false
skills: []
tools: []
model: qwen3-max
execution_strategy: rvr-b
allow_parallel_tools: false
context_limits:
  max_context_tokens: 200000
  warning_threshold: 0.8
  truncate_threshold: 0.9
temperature: null
max_tokens: null
enable_thinking: null
enable_caching: null
thinking_mode: null
prompts: null
reasoning: 该 Agent 专注于代码格式化任务，需准确识别语言和规范，执行确定性美化操作。无需外部工具（如搜索或 API），但需要结构化工作流（计划管理）以处理语言检测、规范选择、格式化和输出等步骤。输出必须为带语法高亮的代码块，因此启用
  output_formatter。内存用于暂存用户偏好（如缩进大小），但无需长期记忆。
