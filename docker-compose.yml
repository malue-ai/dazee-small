# ============================================================
# Zenflux Agent - Docker Compose 配置
# 兼容 docker-compose V1
# ============================================================

version: '3.8'

services:
  # ============================================================
  # 后端服务 - FastAPI（使用 SQLite）
  # ============================================================
  backend:
    image: zenflux-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zenflux-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8010:8000"  # 本地 8010，由 Nginx 代理
    environment:
      # 从 .env 文件加载环境变量
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - E2B_API_KEY=${E2B_API_KEY}
      - RAGIE_API_KEY=${RAGIE_API_KEY:-}
      
      # 使用 SQLite（无需外部数据库）
      - DATABASE_URL=sqlite+aiosqlite:///./workspace/database/zenflux.db
      
      # Redis 配置（SSE 支持）
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      
      # 应用配置
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_TOKENS=${MAX_TOKENS:-8192}
      - TEMPERATURE=${TEMPERATURE:-0.7}
      
      # CORS 允许所有源（开发环境）
      - ALLOWED_ORIGINS=*
    volumes:
      # 持久化数据
      - ./workspace:/app/workspace
      - ./logs:/app/logs
      - ./config:/app/config
    depends_on:
      - redis
    networks:
      - zenflux-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # Redis - 官方镜像
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: zenflux-redis
    restart: unless-stopped
    ports:
      - "0.0.0.0:6379:6379"  # 监听所有网络接口
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - zenflux-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================================
# 数据卷
# ============================================================
volumes:
  redis-data:
    driver: local

# ============================================================
# 网络
# ============================================================
networks:
  zenflux-network:
    driver: bridge

