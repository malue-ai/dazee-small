# ============================================================
# Zenflux Agent - Docker Compose 配置
# ============================================================

version: '3.8'

services:
  # ============================================================
  # 后端服务 - FastAPI
  # ============================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zenflux-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # 从 .env 文件加载环境变量
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - E2B_API_KEY=${E2B_API_KEY}
      - RAGIE_API_KEY=${RAGIE_API_KEY:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      
      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      
      # 数据库配置（PostgreSQL）
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-zenflux}
      - DB_USER=${DB_USER:-zenflux}
      - DB_PASSWORD=${DB_PASSWORD:-zenflux_password}
      
      # 应用配置
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_TOKENS=${MAX_TOKENS:-8192}
      - TEMPERATURE=${TEMPERATURE:-0.7}
    volumes:
      # 持久化数据
      - ./workspace:/app/workspace
      - ./logs:/app/logs
      - ./config:/app/config
    depends_on:
      - redis
      - postgres
    networks:
      - zenflux-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # 前端服务 - Vue + Nginx
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zenflux-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - zenflux-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # Redis - Session 管理和 SSE 重连
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: zenflux-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - zenflux-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # PostgreSQL - 主数据库
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: zenflux-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${DB_NAME:-zenflux}
      - POSTGRES_USER=${DB_USER:-zenflux}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-zenflux_password}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - zenflux-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zenflux}"]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================================
# 数据卷
# ============================================================
volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local

# ============================================================
# 网络
# ============================================================
networks:
  zenflux-network:
    driver: bridge

