# Zenflux Agent - Nginx 反向代理配置
# 域名: agent.yeejay.com
# 后端: 127.0.0.1:8010

# HTTP 配置
server {
    listen 80;
    server_name agent.yeejay.com;

    # 请求体大小限制
    client_max_body_size 10M;

    # 日志配置
    access_log /var/log/nginx/agent-access.log;
    error_log /var/log/nginx/agent-error.log;

    # SSE 流式接口特殊处理
    location ~ ^/api/v1/chat {
        proxy_pass http://127.0.0.1:8010;
        
        # 转发真实客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # SSE 必须配置
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        
        # 禁用缓冲（SSE 关键）
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        
        # 长超时（1小时）
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # 所有其他 API 和路径
    location / {
        proxy_pass http://127.0.0.1:8010;
        
        # 转发真实客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

# HTTPS 配置（如果需要）
server {
    listen 443 ssl http2;
    server_name agent.yeejay.com;

    # SSL 证书配置（使用 yeejay.com 通配符证书）
    ssl_certificate /etc/nginx/yeejay.com_bundle.crt;
    ssl_certificate_key /etc/nginx/yeejay.com.key;

    # SSL 优化配置
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # 请求体大小限制
    client_max_body_size 10M;

    # 日志配置
    access_log /var/log/nginx/agent-access.log;
    error_log /var/log/nginx/agent-error.log;

    # SSE 流式接口特殊处理
