# ============================================================================
# Zenflux Agent Nginx 配置文件
# 域名: agent.yeejay.com
# 后端 API: 本机 80 端口（Docker 容器）
# 协议: HTTP
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name agent.yeejay.com;

    # ========================================================================
    # 字符集和编码
    # ========================================================================
    charset utf-8;

    # ========================================================================
    # 日志配置
    # ========================================================================
    access_log /var/log/nginx/agent-access.log;
    error_log /var/log/nginx/agent-error.log warn;

    # ========================================================================
    # 客户端配置
    # ========================================================================
    client_max_body_size 100M;  # 允许上传大文件

    # ========================================================================
    # Gzip 压缩配置
    # ========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;
    gzip_min_length 1000;

    # ========================================================================
    # SSE (Server-Sent Events) 流式响应配置
    # 用于 AI 对话的流式输出
    # ========================================================================
    location ~ ^/api/v1/chat {
        proxy_pass http://127.0.0.1:8080;

        # 代理请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # SSE 超时配置（10 分钟）
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # 禁用缓冲（SSE 必须禁用）
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        # HTTP/1.1 + keep-alive（SSE 需要）
        proxy_http_version 1.1;
        proxy_set_header Connection '';

        # 禁用 Nginx 缓冲
        chunked_transfer_encoding on;
    }

    # ========================================================================
    # WebSocket 代理配置（如果需要）
    # ========================================================================
    location /api/v1/ws {
        proxy_pass http://127.0.0.1:8080;

        # WebSocket 升级头
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 代理请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 超时配置
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # 禁用缓冲
        proxy_buffering off;
    }

    # ========================================================================
    # API 代理配置
    # ========================================================================
    location /api {
        proxy_pass http://127.0.0.1:8080;

        # 代理请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 缓冲配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # ========================================================================
    # Swagger/OpenAPI 文档
    # ========================================================================
    location /docs {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /redoc {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================================================
    # 健康检查
    # ========================================================================
    location /health {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        access_log off;
    }

    # ========================================================================
    # 默认 location - 代理所有其他请求到后端
    # ========================================================================
    location / {
        proxy_pass http://127.0.0.1:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ========================================================================
    # 禁止访问隐藏文件
    # ========================================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

