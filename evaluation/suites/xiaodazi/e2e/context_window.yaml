# 上下文窗口扩展 E2E 测试用例
# 验证动态窗口扩展 HITL 机制

id: xiaodazi_e2e_context_window
name: E2E 上下文窗口扩展
description: 验证动态上下文窗口扩展 HITL 机制
category: e2e_context_window
default_trials: 1

metadata:
  version: "1.0.0"
  dimension: e2e
  runner: run_e2e_eval

tasks:
  - id: CW1
    description: "Claude 长对话触发上下文窗口扩展 HITL"
    category: e2e_context_window
    input:
      user_query: "请帮我详细分析以下 10 个竞品的商业模式、定价策略、技术架构和市场定位，每个竞品至少 2000 字。竞品列表：Notion、Slack、Trello、Asana、Monday、ClickUp、Linear、Jira、Basecamp、Airtable。"
      conversation_history: []
      context: {}
    graders:
      - type: code
        name: check_no_tool_errors
        check: "check_no_tool_errors()"
    trials: 1
    timeout_seconds: 600

  - id: CW3
    description: "Qwen3-Max 不触发扩展 HITL（不支持扩展的模型）"
    category: e2e_context_window
    input:
      user_query: "你好，介绍一下自己"
      conversation_history: []
      context: {}
    graders:
      - type: code
        name: check_no_tool_errors
        check: "check_no_tool_errors()"
    trials: 1
    timeout_seconds: 120
