# ============================================================
# Skill Hub Index — 社区 Skill 索引
# ============================================================
#
# 轻量级 Skill 发现和分发机制。
# 索引文件托管在 GitHub，skill-finder 从此文件搜索和安装 Skill。
#
# 字段说明：
#   name:        Skill 唯一标识（小写+连字符）
#   version:     语义版本号
#   description: 一句话描述（用于搜索匹配）
#   author:      作者
#   repo:        GitHub 仓库（owner/repo 格式）
#   path:        SKILL.md 在仓库中的路径
#   tags:        标签列表（用于分类搜索）
#   os:          支持的平台 [common/darwin/win32/linux]
#   backend_type: local/tool/mcp/api
#   requires:    依赖声明
#     bins:      需要的命令行工具
#     env:       需要的环境变量（API Key 等）
#     packages:  需要的 Python 包
#   stars:       推荐指数（1-5）
#   updated_at:  最后更新时间
#
# 新增 Skill 流程：
#   1. 在你的 GitHub 仓库创建 skills/<skill-name>/SKILL.md
#   2. 在此文件 skills 列表末尾追加一条记录
#   3. 提交 PR 到本仓库

hub:
  name: "ZenFlux Skill Hub"
  version: "1.0.0"
  description: "社区 Skill 索引 — 发现、安装、共享"
  updated_at: "2026-03-02"

