  # ==================== 搜索与信息获取 ====================

  - name: tavily-search
    version: "1.0.0"
    description: "Tavily AI 优化搜索引擎，为 AI Agent 设计的搜索 API"
    author: zenflux
    repo: zenflux-ai/skill-hub
    path: skills/tavily-search/SKILL.md
    tags: [search, web, ai-search]
    os: [common]
    backend_type: local
    requires:
      env: [TAVILY_API_KEY]
    stars: 5
    updated_at: "2026-03-01"

  - name: serper-search
