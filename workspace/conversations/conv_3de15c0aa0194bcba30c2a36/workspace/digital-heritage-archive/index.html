<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字遗产档案 | Digital Heritage Archive</title>
    <link rel="stylesheet" href="https://unpkg.com/vue@3/dist/vue.global.js">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', 'Songti SC', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e5e5e5;
        }
        header {
            padding: 60px 20px;
            text-align: center;
            background: rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: 0.5em;
            margin-bottom: 20px;
        }
        .subtitle { font-size: 1.1rem; opacity: 0.8; letter-spacing: 0.3em; }
        .stats {
            display: flex;
            justify-content: center;
            gap: 80px;
            padding: 60px 20px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 3rem;
            font-family: 'SF Mono', monospace;
            color: #gold;
        }
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>数字遗产<br>永久档案</h1>
        <p class="subtitle">DIGITAL HERITAGE ARCHIVE SYSTEM</p>
    </header>
    <section class="stats">
        <div class="stat-item">
            <div class="stat-number">14,209</div>
            <div class="stat-label">档案总数</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">98.7%</div>
            <div class="stat-label">数字化比例</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">156</div>
            <div class="stat-label">合作机构</div>
        </div>
    </section>
</body>
</html>
