# ============================================================
# Zenflux Agent - 纯后端配置（不需要 Redis）
# 只部署后端 API，使用 SQLite，不支持 SSE
# ============================================================

version: '3.8'

services:
  # ============================================================
  # 后端服务 - FastAPI（纯净版）
  # ============================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zenflux-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # 必需的 API Keys
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - E2B_API_KEY=${E2B_API_KEY}
      - RAGIE_API_KEY=${RAGIE_API_KEY:-}
      
      # 使用 SQLite
      - DATABASE_URL=sqlite+aiosqlite:///./workspace/database/zenflux.db
      
      # 禁用 Redis（不支持 SSE）
      - REDIS_HOST=
      - REDIS_PORT=
      
      # 应用配置
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_TOKENS=${MAX_TOKENS:-8192}
      - TEMPERATURE=${TEMPERATURE:-0.7}
      - ALLOWED_ORIGINS=*
    volumes:
      # 持久化数据
      - ./workspace:/app/workspace
      - ./logs:/app/logs
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

