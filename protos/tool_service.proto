syntax = "proto3";

package zenflux;

// Go 包路径配置（用于生成 Go 客户端）
option go_package = "github.com/zenflux/agent-client-go/zenflux";

// ==================== Chat 服务（对应 routers/chat.py） ====================
service ChatService {
  // 聊天接口（同步模式）
  rpc Chat(ChatRequest) returns (ChatResponse);
  
  // 聊天接口（流式模式）
  rpc ChatStream(ChatRequest) returns (stream ChatEvent);
  
  // 重连到已存在的会话（流式）
  rpc ReconnectStream(ReconnectRequest) returns (stream ChatEvent);
}

// ==================== Session 服务（会话管理） ====================
service SessionService {
  // 获取会话状态
  rpc GetSessionStatus(SessionStatusRequest) returns (SessionStatusResponse);
  
  // 获取会话事件列表
  rpc GetSessionEvents(SessionEventsRequest) returns (SessionEventsResponse);
  
  // 获取用户的所有活跃会话
  rpc GetUserSessions(UserSessionsRequest) returns (UserSessionsResponse);
  
  // 停止会话
  rpc StopSession(StopSessionRequest) returns (StopSessionResponse);
  
  // 结束会话
  rpc EndSession(EndSessionRequest) returns (EndSessionResponse);
  
  // 列出所有活跃会话
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
}

// ==================== Tool 服务（工具执行） ====================
service ToolService {
  // 执行工具（同步模式）
  rpc ExecuteTool(ToolRequest) returns (ToolResponse);
  
  // 执行工具（流式模式）
  rpc ExecuteToolStream(ToolRequest) returns (stream ToolChunk);
  
  // 批量执行工具
  rpc ExecuteToolBatch(ToolBatchRequest) returns (ToolBatchResponse);
}

// ==================== Agent 服务（多 Agent 协作） ====================
service AgentService {
  // 执行 Agent 任务
  rpc ExecuteTask(AgentTaskRequest) returns (AgentTaskResponse);
  
  // 流式执行 Agent 任务
  rpc ExecuteTaskStream(AgentTaskRequest) returns (stream AgentTaskEvent);
  
  // 获取 Agent 状态
  rpc GetAgentStatus(AgentStatusRequest) returns (AgentStatusResponse);
}

// ==================== Chat 服务消息定义 ====================

message ChatRequest {
  string message = 1;                 // 用户消息（文本或JSON字符串）
  string user_id = 2;                 // 用户 ID
  optional string conversation_id = 3; // 对话 ID（可选）
  optional string message_id = 4;      // 消息 ID（可选）
  bool stream = 5;                     // 是否流式返回
  repeated string background_tasks = 6; // 后台任务列表
  repeated FileReference files = 7;    // 文件引用列表
  map<string, string> variables = 8;   // 前端上下文变量
}

message FileReference {
  optional string file_id = 1;         // 文件 ID
  optional string file_url = 2;        // 文件 URL
  optional string file_name = 3;       // 文件名
}

message ChatResponse {
  int32 code = 1;                      // 响应码
  string message = 2;                  // 响应消息
  string task_id = 3;                  // 任务 ID（session_id）
  optional string conversation_id = 4; // 对话 ID
  string status = 5;                   // 状态：running, completed, failed
  optional string result = 6;          // 结果（JSON 字符串）
}

message ChatEvent {
  string event_type = 1;               // 事件类型
  string data = 2;                     // 事件数据（JSON 字符串）
  int64 timestamp = 3;                 // 时间戳
  optional int32 seq = 4;              // 序列号
  optional string event_uuid = 5;      // 事件 UUID
}

message ReconnectRequest {
  string session_id = 1;               // Session ID
  optional int32 after_seq = 2;        // 从哪个序号之后开始
}

// ==================== Session 服务消息定义 ====================

message SessionStatusRequest {
  string session_id = 1;
}

message SessionStatusResponse {
  string session_id = 1;
  string user_id = 2;
  optional string conversation_id = 3;
  optional string message_id = 4;
  string status = 5;                   // running, completed, failed, timeout
  int32 last_event_seq = 6;
  string start_time = 7;
  optional string last_heartbeat = 8;
  double progress = 9;                 // 0.0-1.0
  int32 total_turns = 10;
  optional string message_preview = 11;
}

message SessionEventsRequest {
  string session_id = 1;
  optional int32 after_id = 2;
  int32 limit = 3;                     // 默认 100
}

message SessionEventsResponse {
  string session_id = 1;
  repeated ChatEvent events = 2;
  int32 total = 3;
  bool has_more = 4;
  int32 last_event_id = 5;
}

message UserSessionsRequest {
  string user_id = 1;
}

message UserSessionsResponse {
  string user_id = 1;
  repeated SessionInfo sessions = 2;
  int32 total = 3;
}

message SessionInfo {
  string session_id = 1;
  optional string conversation_id = 2;
  optional string message_id = 3;
  string status = 4;
  double progress = 5;
  string start_time = 6;
  optional string message_preview = 7;
}

message StopSessionRequest {
  string session_id = 1;
}

message StopSessionResponse {
  string session_id = 1;
  string status = 2;
  string stopped_at = 3;
}

message EndSessionRequest {
  string session_id = 1;
}

message EndSessionResponse {
  string session_id = 1;
  string summary = 2;                  // 会话摘要（JSON 字符串）
}

message ListSessionsRequest {
  // 空请求
}

message ListSessionsResponse {
  repeated SessionInfo sessions = 1;
  int32 total = 2;
}

// ==================== 工具服务消息定义 ====================

message ToolRequest {
  string tool_name = 1;           // 工具名称
  string input_data = 2;          // 输入数据（JSON 字符串）
  string invocation_id = 3;       // 调用 ID
  string conversation_id = 4;     // 对话 ID（可选）
  map<string, string> metadata = 5; // 元数据
}

message ToolResponse {
  bool success = 1;               // 是否成功
  string result = 2;              // 结果（JSON 字符串）
  string error = 3;               // 错误信息
  int32 execution_time_ms = 4;    // 执行时间（毫秒）
}

message ToolChunk {
  string chunk_type = 1;          // 块类型：stdout, stderr, result, error
  string content = 2;             // 内容
  bool is_final = 3;              // 是否最终块
}

message ToolBatchRequest {
  repeated ToolRequest requests = 1;
}

message ToolBatchResponse {
  repeated ToolResponse responses = 1;
}

// ==================== Agent 服务消息定义 ====================

message AgentTaskRequest {
  string task_id = 1;                  // 任务 ID
  string user_input = 2;               // 用户输入
  string conversation_id = 3;          // 对话 ID
  string user_id = 4;                  // 用户 ID
  map<string, string> context = 5;     // 上下文信息
}

message AgentTaskResponse {
  bool success = 1;
  string result = 2;                   // 最终结果（JSON 字符串）
  string error = 3;
  int32 turns = 4;                     // 执行轮数
  int32 execution_time_ms = 5;
}

message AgentTaskEvent {
  string event_type = 1;               // 事件类型
  string data = 2;                     // 事件数据（JSON 字符串）
  int64 timestamp = 3;                 // 时间戳
}

message AgentStatusRequest {
  string agent_id = 1;
  string conversation_id = 2;
}

message AgentStatusResponse {
  string status = 1;                   // pending, running, completed, failed
  string current_step = 2;
  int32 progress = 3;                  // 进度 0-100
  repeated string active_tools = 4;
}

